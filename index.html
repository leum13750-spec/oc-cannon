<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================= 1. 전역 변수 & 기본 초기화 ================= */
        :root {
            --bg-main: #0a0a0a;
            --bg-surface: #151515;
            --bg-surface-light: #202020;
            --accent-color: #d8b4fe;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --border-color: #262626;
            --danger-color: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .app-content {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* ================= 2. 헤더 & 공지사항 ================= */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: var(--bg-main);
        }

        .logo {
            color: var(--accent-color);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
        }

        .notice-bar {
            margin: 0 16px 16px 16px;
            padding: 16px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .notice-tag {
            display: block;
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .notice-text {
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.4;
        }

        .edit-notice-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ================= 3. 메인 탭 네비게이션 ================= */
        .main-tabs {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding: 0 16px;
            flex-shrink: 0;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            flex-grow: 1;
            position: relative;
            transition: color 0.2s;
        }

        .tab-btn.active {
            color: var(--text-primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 15%;
            width: 70%;
            height: 3px;
            background-color: var(--accent-color);
            border-radius: 3px 3px 0 0;
        }

        /* ================= 4. 탭 콘텐츠 영역 ================= */
        .tab-content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            padding-bottom: 100px;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
            animation: fadeIn 0.2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .create-btn {
            width: 100%;
            background-color: var(--bg-surface);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .create-btn:hover {
            background-color: var(--bg-surface-light);
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .empty-text {
            color: var(--text-secondary);
            font-size: 14px;
            text-align: center;
            padding-top: 20px;
        }

        /* ================= 5. API & 설정 ================= */
        .api-container {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .api-container input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background-color: var(--bg-surface-light);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .link-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 13px;
            cursor: pointer;
        }

        .settings-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .sub-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }

        .danger-text {
            color: var(--danger-color);
            border-color: rgba(255, 107, 107, 0.3);
        }

        hr {
            width: 100%;
            border-color: var(--border-color);
            margin: 16px 0;
        }

        /* ================= 6. 사이드바 ================= */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background-color: var(--bg-surface);
            z-index: 1000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
        }

        .sidebar-menu {
            list-style: none;
            padding: 10px 0;
            overflow-y: auto;
        }

        .sidebar-menu li {
            padding: 16px 20px;
            font-size: 15px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .sidebar-menu li:hover {
            background-color: var(--bg-surface-light);
        }

        .sidebar-menu i {
            width: 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        .sidebar-menu .logout-menu {
            color: var(--danger-color);
            margin-top: 20px;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .sidebar-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* ================= 7. 플로팅 버튼 ================= */
        .bug-report-btn {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom));
            right: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: var(--bg-surface);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= 8. 로그인 화면 ================= */
        .screen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .screen-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-surface);
            padding: 40px 24px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .login-container .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            margin-bottom: 16px;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
        }

        .primary-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--text-primary);
            color: #000000;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .login-links {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .login-links .link {
            cursor: pointer;
        }

        /* ================= 9. 리스트 카드 ================= */
        .swipe-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 12px;
            background: var(--bg-surface);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .delete-btn-bg {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 80px;
            background-color: var(--danger-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 1;
        }

        .list-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 16px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 2;
            width: 100%;
        }

        .list-img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--bg-surface-light);
            flex-shrink: 0;
        }

        .list-info {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .list-title {
            font-size: 16px;
            font-weight: 700;
            color: white;
            display: block;
            margin-bottom: 4px;
        }

        .list-sub {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: normal;
        }

        .edit-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
        }

        .edit-btn:hover {
            color: var(--accent-color);
        }

        /* ================= 10. 에디터 ================= */
        .editor-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            z-index: 7000;
            display: flex;
            flex-direction: column;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .editor-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background-color: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            padding-top: calc(16px + env(safe-area-inset-top));
        }

        .close-editor-btn,
        .save-editor-btn {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .save-editor-btn {
            color: var(--accent-color);
            font-weight: bold;
        }

        .editor-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: var(--accent-color);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent-color);
        }

        .char-count {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 4px;
        }

        .img-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--bg-surface-light);
            border: 2px dashed var(--border-color);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            color: var(--text-secondary);
            font-size: 12px;
            margin: 0 auto;
            transition: border-color 0.2s;
        }

        .img-preview:hover {
            border-color: var(--accent-color);
        }

        /* ================= 11. 톡썰메이커 ================= */
        .talk-maker-body {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 0;
        }

        #talk-maker-chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg-main);
        }

        .talk-maker-guide {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 20px;
        }

        .talk-maker-input-area {
            padding: 16px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }

        .name-inputs {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .name-inputs input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--bg-surface-light);
            color: white;
            font-size: 14px;
        }

        #tm-msg-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--bg-surface-light);
            color: white;
            margin-bottom: 8px;
            resize: none;
            font-size: 14px;
            outline: none;
            min-height: 60px;
        }

        .msg-buttons {
            display: flex;
            gap: 8px;
        }

        .msg-btn {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .char-btn {
            background: #333;
            color: white;
        }

        .user-btn {
            background: var(--accent-color);
            color: black;
        }

        .talk-bubble .msg-name {
            font-size: 13px;
            font-weight: bold;
            color: white;
            margin-bottom: 6px;
            margin-left: 4px;
        }
        
        .talk-bubble.align-end .msg-name {
            margin-left: 0;
            margin-right: 4px;
            text-align: right;
        }
        
        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 85%;
            word-break: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
        
        .char-msg {
            background: var(--bg-surface-light);
            color: white;
            border-radius: 18px 18px 18px 4px;
        }
        
        .user-msg {
            background: var(--accent-color);
            color: black;
            border-radius: 18px 18px 4px 18px;
        }

        /* ================= 12. 반응형 ================= */
        @media (max-width: 480px) {
            .app-header {
                padding: 12px 16px;
            }
            
            .tab-content-area {
                padding: 16px 12px;
            }
            
            .editor-body {
                padding: 16px 12px;
            }
            
            .create-btn {
                padding: 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="login-screen" class="screen-overlay">
        <div class="login-container">
            <h1 class="logo">dreamer.ai</h1>
            <p class="subtitle">로그인이 필요합니다.</p>
            <div class="input-group">
                <input type="text" id="login-id" placeholder="핸들명(아이디)">
                <input type="password" id="login-pw" placeholder="비밀번호">
            </div>
            <button class="primary-btn" id="btn-login">로그인</button>
            <div class="login-links">
                <span class="link" id="link-register">가입하기</span>
                <span class="link" id="link-find-pw">비밀번호 찾기</span>
            </div>
        </div>
    </div>
    
    <!-- 사이드바 -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" id="btn-close-sidebar"><i class="fas fa-times"></i></button>
        </div>
        <ul class="sidebar-menu">
            <li id="btn-open-talk-maker"><i class="fas fa-comments"></i> 수동 대화 백업</li>
            <li class="logout-menu" id="btn-logout"><i class="fas fa-sign-out-alt"></i> 로그아웃</li>
        </ul>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- 메인 앱 -->
    <div id="app-content" class="app-content">
        <header class="app-header">
            <button class="menu-btn" id="btn-open-sidebar"><i class="fas fa-bars"></i></button>
            <h1 class="logo header-logo">dreamer.ai</h1>
            <div style="width: 24px;"></div>
        </header>

        <div class="notice-bar">
            <div class="notice-content">
                <span class="notice-tag">User Manual</span>
                <span class="notice-text">dreamer.ai에 오신 것을 환영합니다!</span>
            </div>
            <button class="edit-notice-btn" id="btn-edit-notice">Edit</button>
        </div>

        <nav class="main-tabs">
            <button class="tab-btn active" data-tab="character">캐릭터</button>
            <button class="tab-btn" data-tab="scene">장면</button>
            <button class="tab-btn" data-tab="persona">페르소나</button>
            <button class="tab-btn" data-tab="api">API</button>
            <button class="tab-btn" data-tab="settings">설정</button>
        </nav>

        <main class="tab-content-area">
            <div id="tab-character" class="tab-pane active">
                <button class="create-btn">+ 새 캐릭터 만들기</button>
                <div class="content-list" id="character-list-container"></div>
            </div>

            <div id="tab-scene" class="tab-pane">
                <h3 class="section-title">저장된 장면(Scene)</h3>
                <div class="content-list" id="scene-list-container">
                    <p class="empty-text">저장된 장면이 없습니다.</p>
                </div>
            </div>

            <div id="tab-persona" class="tab-pane">
                <button class="create-btn">+ 새 페르소나 만들기</button>
                <div class="content-list" id="persona-list-container"></div>
            </div>

            <div id="tab-api" class="tab-pane">
                <div class="api-container">
                    <span class="notice-tag">Infermatic API Key</span>
                    <input type="password" id="api-key-input" placeholder="sk-...">
                    <button class="link-btn" id="btn-check-api">연동 상태 확인</button>
                </div>
            </div>

            <div id="tab-settings" class="tab-pane">
                <div class="settings-profile">
                    <div class="form-group" style="width: 100%; text-align: left;">
                        <label>닉네임</label>
                        <input type="text" id="settings-nickname" placeholder="유저 닉네임">
                    </div>
                    <div class="form-group" style="width: 100%; text-align: left;">
                        <label>핸들명 (아이디)</label>
                        <input type="text" id="settings-handle" placeholder="@handle">
                    </div>
                    <button class="primary-btn" id="btn-save-profile">프로필 저장</button>
                    
                    <hr>

                    <button class="sub-btn">데이터 백업 코드 복사</button>
                    <button class="sub-btn danger-text" id="btn-settings-logout">로그아웃</button>
                </div>
            </div>
        </main>
    </div>

    <button class="bug-report-btn" id="btn-bug-report">
        <i class="fas fa-bug"></i>
    </button>

    <!-- 에디터들 -->
    <div id="character-editor-screen" class="editor-screen hidden">
        <header class="editor-header">
            <button class="close-editor-btn" data-editor="character"><i class="fas fa-times"></i></button>
            <strong>새 캐릭터 만들기</strong>
            <button class="save-editor-btn" data-type="character">저장</button>
        </header>
        <div class="editor-body">

            static set(key, data) {
                localStorage.setItem(key, JSON.stringify(data));

            initImageUpload() {
                const charPreview = DOMUtils.$('#edit-char-img-preview');

            handleImageUpload(event, type) {
                const file = event.target.files[0];
                if (!file) return;
                
                this.compressImage(file, (base64) => {
                    if (type === 'char') {
                        appState.tempCharBase64 = base64;
                        DOMUtils.$('#edit-char-img-preview').innerHTML = 
                            `<img src="${base64}" style="width:100%; height:100%; object-fit:cover;">`;
                    } else {
                        appState.tempPersonaBase64 = base64;
                        DOMUtils.$('#edit-persona-img-preview').innerHTML = 
                            `<img src="${base64}" style="width:100%; height:100%; object-fit:cover;">`;
                    }
                });
            }
            
            compressImage(file, callback) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const maxSize = 400;
                        
                        if (width > height) {
                            if (width > maxSize) {
                                height *= maxSize / width;
                                width = maxSize;
                            }
                        } else {
                            if (height > maxSize) {
                                width *= maxSize / height;
                                height = maxSize;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        callback(compressedBase64);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
            
            initCharCounters() {
                DOMUtils.$$('.editor-screen input[maxlength], .editor-screen textarea[maxlength]').forEach(el => {

                });
            }
            
            updateCharCounters(containerSelector) {
                DOMUtils.$$(`${containerSelector} input[maxlength], ${containerSelector} textarea[maxlength]`).forEach(el => {

                    if (countDiv) {

                const charName = DOMUtils.$('#tm-char-name').value || '캐릭터';

                const name = type === 'char' ? charName : userName;
                
                const bubble = document.createElement('div');
                bubble.className = 'talk-bubble';
                bubble.style.marginBottom = '16px';
                bubble.style.display = 'flex';
                bubble.style.flexDirection = 'column';
                
                if (type === 'char') {
                    bubble.style.alignItems = 'flex-start';
                    bubble.innerHTML = `
                        <span class="msg-name">${name}</span>
                        <div class="msg-bubble char-msg">${text}</div>
                    `;
                } else {
                    bubble.style.alignItems = 'flex-end';
                    bubble.innerHTML = `
                        <span class="msg-name">${name}</span>
                        <div class="msg-bubble user-msg">${text}</div>
                    `;
                }
                
                chatBox.appendChild(bubble);
                msgInput.value = '';
                chatBox.scrollTop = chatBox.scrollHeight;
            }

                }
            }
        }

                    const charData = {
                        name,
                        sub: DOMUtils.$('#edit-char-sub')?.value.trim(),
                        relation: DOMUtils.$('#edit-char-relation')?.value,
                        lang: DOMUtils.$('#edit-char-lang')?.value,
                        greeting: DOMUtils.$('#edit-char-greeting')?.value,
                        profile: DOMUtils.$('#edit-char-profile')?.value,
                        appearance: DOMUtils.$('#edit-char-appearance')?.value,
                        updatedAt: Date.now()
                    };
                    
                    if (appState.tempCharBase64) charData.photoUrl = appState.tempCharBase64;
                    
                    if (auth.currentUser) {
                        // Firebase 저장
                        if (appState.editingCharId) {
                            await updateDoc(doc(db, `users/${auth.currentUser.uid}/characters/${appState.editingCharId}`), charData);
                        } else {
                            charData.createdAt = Date.now();
                            await addDoc(collection(db, `users/${auth.currentUser.uid}/characters`), charData);
                        }
                        await this.loadFirebaseData(auth.currentUser.uid);
                    } else {
                        // 로컬 저장
                        this.saveCharacterLocal(charData);
                    }
                    
                    DOMUtils.hide(DOMUtils.$('#character-editor-screen'));
                    alert("✨ 캐릭터가 안전하게 저장되었습니다!");
                } catch (error) {
                    alert("저장 오류: " + error.message);
                } finally {
                    saveBtn.textContent = '저장';
                    saveBtn.disabled = false;
                }
            }
            
            saveCharacterLocal(charData) {
                let chars = StorageManager.get('dreamer_characters');
                
                if (appState.editingCharId) {
                    const index = chars.findIndex(c => c.id.toString() === appState.editingCharId.toString());
                    if (index !== -1) {
                        Object.assign(chars[index], charData);
                    }
                } else {
                    chars.unshift({
                        id: Date.now(),
                        ...charData
                    });
                }
                
                StorageManager.set('dreamer_characters', chars);
                this.renderCharactersLocal();
            }
            
            async savePersona() {
                const name = DOMUtils.$('#edit-persona-name')?.value.trim();
                if (!name) {
                    alert("페르소나 이름은 필수 입력 사항입니다.");
                    return;
                }
                
                const saveBtn = DOMUtils.querySelector('#persona-editor-screen .save-editor-btn');
                saveBtn.textContent = '저장중...';
                saveBtn.disabled = true;
                
                try {
                    const personaData = {
                        name,
                        info: DOMUtils.$('#edit-persona-info')?.value.trim(),
                        appearance: DOMUtils.$('#edit-persona-appearance')?.value.trim(),
                        bg: DOMUtils.$('#edit-persona-bg')?.value.trim(),
                        updatedAt: Date.now()
                    };
                    
                    if (appState.tempPersonaBase64) personaData.photoUrl = appState.tempPersonaBase64;
                    
                    if (auth.currentUser) {
                        // Firebase 저장
                        if (appState.editingPersonaId) {
                            await updateDoc(doc(db, `users/${auth.currentUser.uid}/personas/${appState.editingPersonaId}`), personaData);
                        } else {
                            personaData.createdAt = Date.now();
                            await addDoc(collection(db, `users/${auth.currentUser.uid}/personas`), personaData);
                        }
                        await this.loadFirebaseData(auth.currentUser.uid);
                    } else {
                        // 로컬 저장
                        this.savePersonaLocal(personaData);
                    }
                    
                    DOMUtils.hide(DOMUtils.$('#persona-editor-screen'));
                    alert("✨ 페르소나가 안전하게 저장되었습니다!");
                } catch (error) {
                    alert("저장 오류: " + error.message);
                } finally {
                    saveBtn.textContent = '저장';
                    saveBtn.disabled = false;
                }
            }
            
            savePersonaLocal(personaData) {
                let personas = StorageManager.get('dreamer_personas');
                
                if (appState.editingPersonaId) {
                    const index = personas.findIndex(p => p.id.toString() === appState.editingPersonaId.toString());
                    if (index !== -1) {
                        Object.assign(personas[index], personaData);
                    }
                } else {
                    personas.unshift({
                        id: Date.now(),
                        ...personaData
                    });
                }
                
                StorageManager.set('dreamer_personas', personas);
                this.renderPersonasLocal();
            }
            
            renderCharactersLocal() {
                const container = DOMUtils.$('#character-list-container');
                const chars = StorageManager.get('dreamer_characters');
                
                if (chars.length === 0) {
                    container.innerHTML = '<p class="empty-text">생성된 캐릭터가 없습니다.</p>';
                    return;
                }
                
                container.innerHTML = '';
                chars.forEach(char => {
                    container.appendChild(this.createCharacterCard(char, false));
                });
            }
            
            renderPersonasLocal() {
                const container = DOMUtils.$('#persona-list-container');
                const personas = StorageManager.get('dreamer_personas');
                
                if (personas.length === 0) {
                    container.innerHTML = '<p class="empty-text">생성된 페르소나가 없습니다.</p>';
                    return;
                }
                
                container.innerHTML = '';
                personas.forEach(persona => {
                    container.appendChild(this.createPersonaCard(persona, false));
                });
            }
            
            async loadFirebaseData(uid) {
                await Promise.all([
                    this.loadFirebaseCharacters(uid),
                    this.loadFirebasePersonas(uid)
                ]);
            }
            
            async loadFirebaseCharacters(uid) {
                const container = DOMUtils.$('#character-list-container');
                
                try {
                    const snapshot = await getDocs(collection(db, `users/${uid}/characters`));
                    
                    if (snapshot.empty) {
                        container.innerHTML = '<p class="empty-text">서버에 저장된 캐릭터가 없습니다.</p>';
                        return;
                    }
                    
                    container.innerHTML = '';
                    snapshot.forEach(doc => {
                        const char = { id: doc.id, ...doc.data() };
                        container.appendChild(this.createCharacterCard(char, true));
                    });
                } catch (error) {
                    console.error("캐릭터 불러오기 실패:", error);
                }
            }
            
            async loadFirebasePersonas(uid) {
                const container = DOMUtils.$('#persona-list-container');
                
                try {
                    const snapshot = await getDocs(collection(db, `users/${uid}/personas`));
                    
                    if (snapshot.empty) {
                        container.innerHTML = '<p class="empty-text">서버에 저장된 페르소나가 없습니다.</p>';
                        return;
                    }
                    
                    container.innerHTML = '';
                    snapshot.forEach(doc => {
                        const persona = { id: doc.id, ...doc.data() };
                        container.appendChild(this.createPersonaCard(persona, true));
                    });
                } catch (error) {
                    console.error("페르소나 불러오기 실패:", error);
                }
            }
            
            createCharacterCard(char, isFirebase) {
                const wrapper = document.createElement('div');
                wrapper.className = 'swipe-container';
                
                const imgSrc = char.photoUrl || this.placeholderImg;
                
                wrapper.innerHTML = `
                    <div class="delete-btn-bg" data-id="${char.id}" data-name="${char.name}" data-type="characters" data-firebase="${isFirebase}">
                        <i class="fas fa-trash"></i>
                    </div>
                    <div class="list-card swipe-card">
                        <img src="${imgSrc}" class="list-img">
                        <div class="list-info">
                            <span class="list-title">${char.name}</span>
                            <span class="list-sub">${char.sub || char.greeting || "설정이 없습니다."}</span>
                        </div>
                        <button class="edit-btn" data-id="${char.id}" data-type="character">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                `;
                
                this.attachCardEvents(wrapper, char, 'character', isFirebase);
                return wrapper;
            }
            
            createPersonaCard(persona, isFirebase) {
                const wrapper = document.createElement('div');
                wrapper.className = 'swipe-container';
                
                const imgSrc = persona.photoUrl || this.placeholderImg;
                
                wrapper.innerHTML = `
                    <div class="delete-btn-bg" data-id="${persona.id}" data-name="${persona.name}" data-type="personas" data-firebase="${isFirebase}">
                        <i class="fas fa-trash"></i>
                    </div>
                    <div class="list-card swipe-card">
                        <img src="${imgSrc}" class="list-img">
                        <div class="list-info">
                            <span class="list-title">${persona.name}</span>
                            <span class="list-sub">${persona.info || persona.bg || "기본 페르소나"}</span>
                        </div>
                        <button class="edit-btn" data-id="${persona.id}" data-type="persona">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                `;
                
                this.attachCardEvents(wrapper, persona, 'persona', isFirebase);
                return wrapper;
            }
            
            attachCardEvents(wrapper, data, type, isFirebase) {
                const card = wrapper.querySelector('.list-card');
                const deleteBtn = wrapper.querySelector('.delete-btn-bg');
                const editBtn = wrapper.querySelector('.edit-btn');
                
                // 스와이프 기능
                this.attachSwipeEvents(card);
                
                // 카드 클릭
                card.addEventListener('click', () => {
                    alert(`${data.name} 상세 정보/대화방으로 이동합니다.`);
                });
                
                // 수정 버튼
                editBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (type === 'character') {
                        uiManager.openCharacterEditor(data.id, data);
                    } else {
                        uiManager.openPersonaEditor(data.id, data);
                    }
                });
                
                // 삭제 버튼
                deleteBtn.addEventListener('click', () => {
                    this.deleteItem(data.id, data.name, deleteBtn.dataset.type, isFirebase === 'true');
                });
            }
            
            attachSwipeEvents(cardElement) {
                let startX = 0;
                let currentX = 0;
                const threshold = -60;
                
                cardElement.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    cardElement.style.transition = 'none';
                }, {passive: true});
                
                cardElement.addEventListener('touchmove', (e) => {
                    currentX = e.touches[0].clientX - startX;
                    if (currentX < 0 && currentX > -100) {
                        cardElement.style.transform = `translateX(${currentX}px)`;
                    }
                }, {passive: true});
                
                cardElement.addEventListener('touchend', () => {
                    cardElement.style.transition = 'transform 0.3s ease';
                    if (currentX < threshold) {
                        cardElement.style.transform = `translateX(-80px)`;
                    } else {
                        cardElement.style.transform = `translateX(0px)`;
                    }
                    currentX = 0;
                });
            }
            
            async deleteItem(id, name, type, isFirebase) {
                if (!confirm(`정말 '${name}'을(를) 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) {
                    return;
                }
                
                try {
                    if (isFirebase && auth.currentUser) {
                        await deleteDoc(doc(db, `users/${auth.currentUser.uid}/${type}/${id}`));
                        await this.loadFirebaseData(auth.currentUser.uid);
                    } else {
                        const storageKey = type === 'characters' ? 'dreamer_characters' : 'dreamer_personas';
                        let items = StorageManager.get(storageKey);
                        items = items.filter(item => item.id.toString() !== id.toString());
                        StorageManager.set(storageKey, items);
                        
                        if (type === 'characters') {
                            this.renderCharactersLocal();
                        } else {
                            this.renderPersonasLocal();
                        }
                    }
                    alert('삭제가 완료되었습니다.');
                } catch (error) {
                    alert('삭제 실패: ' + error.message);
                }
            }
            
            async loadUserProfile(uid) {
                try {
                    const userDoc = await getDoc(doc(db, "users", uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        DOMUtils.$('#settings-nickname').value = data.nickname || '';
                        DOMUtils.$('#settings-handle').value = data.handle || '';
                    }
                } catch (error) {
                    console.error("프로필 불러오기 실패:", error);
                }
            }
            
            loadSavedData() {
                this.renderCharactersLocal();
                this.renderPersonasLocal();
                
                const savedApiKey = StorageManager.getItem('dreamer_api_key');
                if (savedApiKey && DOMUtils.$('#api-key-input')) {
                    DOMUtils.$('#api-key-input').value = savedApiKey;
                }
            }
        }

        // ================= 앱 초기화 =================
        const uiManager = new UIManager();
        const dataManager = new DataManager();

        // Firebase 인증 상태 감지
        onAuthStateChanged(auth, async (user) => {
            const loginScreen = DOMUtils.$('#login-screen');
            
            if (user) {
                appState.currentUser = user;
                StorageManager.setItem('dreamer_logged_in', 'true');
                DOMUtils.hide(loginScreen);
                loginScreen.style.pointerEvents = 'none';
                
                await dataManager.loadFirebaseData(user.uid);
                await dataManager.loadUserProfile(user.uid);
            } else {
                appState.currentUser = null;
                DOMUtils.show(loginScreen);
                loginScreen.style.pointerEvents = 'auto';
                
                DOMUtils.$('#character-list-container').innerHTML = '';
                DOMUtils.$('#persona-list-container').innerHTML = '';
                
                dataManager.loadSavedData();
            }
        });

        // 앱 시작 시 데이터 로드
        window.addEventListener('DOMContentLoaded', () => {
            dataManager.loadSavedData();
        });

        // 전역 함수로 노출 (기존 코드 호환성)
        window.saveCharacter = () => dataManager.saveCharacter();
        window.savePersona = () => dataManager.savePersona();
        window.openCharEditor = (id, data) => uiManager.openCharacterEditor(id, data);
        window.openPersonaEditor = (id, data) => uiManager.openPersonaEditor(id, data);
        window.attachSwipeEvents = (card) => dataManager.attachSwipeEvents(card);
        window.executeDelete = (id, name, type, isFirebase) => dataManager.deleteItem(id, name, type, isFirebase);
    </script>
</body>
</html>
