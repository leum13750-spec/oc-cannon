<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <style>
        :root {
            --bg: #0d0d0d; --panel: #181818; --accent: #bb86fc;
            --text: #e0e0e0; --dim: #9e9e9e; --border: #262626; --input: #222;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        button { cursor: pointer; border: none; background: none; color: white; }
        .hidden { display: none !important; }

        /* [1] 상단 고정 헤더 영역 */
        #header-area { padding-top: env(safe-area-inset-top); background: var(--bg); flex-shrink: 0; border-bottom: 1px solid var(--border); }
        #site-title { font-size: 1.4rem; font-weight: 900; color: var(--accent); text-align: center; padding: 12px 0 5px; }
        #site-notice { background: #1a1a1a; margin: 5px 15px 10px; padding: 8px 12px; border-radius: 8px; font-size: 0.75rem; color: var(--dim); border: 1px solid #222; text-align: center; line-height: 1.3; }

        /* [2] 네비게이션 탭 (모바일 최적화 비율) */
        #nav-bar { display: flex; background: var(--bg); padding: 0 5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; font-size: 0.7rem; font-weight: bold; color: var(--dim); display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
        .nav-item.active { color: white; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; background: white; }
        .nav-item span { font-size: 1.1rem; }

        /* [3] 메인 콘텐츠 영역 (스크롤) */
        main { flex: 1; overflow-y: auto; background: var(--bg); padding-bottom: env(safe-area-inset-bottom); }
        .view { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }

        /* 캐릭터/세션 리스트 디자인 */
        .btn-add { background: var(--panel); border: 1px solid var(--border); color: var(--accent); padding: 10px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-bottom: 20px; }
        .item-list { display: flex; flex-direction: column; gap: 10px; }
        .card-item { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 12px; }
        .card-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #222; }

        /* 유저 설정 카드 */
        .profile-box { background: var(--panel); border-radius: 15px; padding: 20px; border: 1px solid var(--border); text-align: center; }
        .u-avatar-large { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin-bottom: 15px; background: #222; }
        .input-label { font-size: 0.75rem; color: var(--accent); text-align: left; display: block; margin-bottom: 6px; font-weight: bold; }
        .input-field { width: 100%; background: var(--input); border: 1px solid #333; border-radius: 10px; color: white; padding: 12px; margin-bottom: 15px; font-size: 0.9rem; outline: none; }

        /* 로그인/가입 화면 (Full Overlay) */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; border: 1px solid var(--border); }
        .btn-full { background: white; color: black; padding: 14px; border-radius: 30px; font-weight: 900; width: 100%; margin-top: 10px; font-size: 1rem; }

        /* 하단 공통 버튼 */
        .btn-danger { background: #3d0a0a; color: #ff6b6b; width: 100%; padding: 12px; border-radius: 12px; margin-top: 20px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<!-- [A] 로그인 화면 -->
<div id="auth-overlay">
    <div class="auth-box">
        <h1 style="color:var(--accent); font-size: 2rem; margin-bottom: 10px;">dreamer.ai</h1>
        <p id="auth-msg" style="color:var(--dim); font-size:0.85rem; margin-bottom:25px;">계정에 로그인하세요.</p>
        
        <div id="login-form">
            <input id="login-handle" class="input-field" placeholder="핸들명 (ID)">
            <input type="password" id="login-pw" class="input-field" placeholder="비밀번호">
            <button class="btn-full" onclick="handleLogin()">로그인</button>
            <button style="margin-top:20px; font-size:0.8rem; color:var(--dim)" onclick="showAuth('signup')">처음이신가요? 가입하기</button>
        </div>

        <div id="signup-form" class="hidden">
            <input id="sign-email" class="input-field" placeholder="지메일 (@gmail.com 필수)">
            <input id="sign-handle" class="input-field" placeholder="사용할 핸들명 (ID)">
            <input type="password" id="sign-pw" class="input-field" placeholder="비밀번호 설정">
            <button class="btn-full" onclick="handleSignup()">가입하기</button>
            <button style="margin-top:20px; font-size:0.8rem; color:var(--dim)" onclick="showAuth('login')">이미 계정이 있나요? 로그인</button>
        </div>
    </div>
</div>

<!-- [B] 메인 UI 영역 -->
<header id="header-area">
    <div id="site-title">dreamer.ai</div>
    <div id="site-notice">공지: dreamer.ai 모바일 최적화 패치가 완료되었습니다.</div>
</header>

<nav id="nav-bar">
    <div class="nav-item active" onclick="switchTab(this, 'chars')"><span>👤</span>캐릭터</div>
    <div class="nav-item" onclick="switchTab(this, 'chats')"><span>💬</span>대화</div>
    <div class="nav-item" onclick="switchTab(this, 'personas')"><span>🎭</span>페르소나</div>
    <div class="nav-item" onclick="switchTab(this, 'api')"><span>🔑</span>API</div>
    <div class="nav-item" onclick="switchTab(this, 'user')"><span>⚙️</span>설정</div>
</nav>

<main>
    <!-- 캐릭터 탭 -->
    <div id="view-chars" class="view">
        <button class="btn-add" onclick="alert('캐릭터 생성 기능 준비중')">+ 새 캐릭터 만들기</button>
        <div class="item-list" id="char-list"></div>
    </div>

    <!-- 대화 내역 탭 -->
    <div id="view-chats" class="view hidden">
        <h3 style="font-size:1rem; margin-bottom:15px;">최근 대화</h3>
        <div class="item-list" id="session-list"></div>
    </div>

    <!-- 페르소나 탭 -->
    <div id="view-personas" class="view hidden">
        <button class="btn-add">+ 새 페르소나</button>
        <div class="item-list" id="persona-list"></div>
    </div>

    <!-- API 탭 -->
    <div id="view-api" class="view hidden">
        <div class="profile-box">
            <label class="input-label">Infermatic API Key</label>
            <input type="password" id="api-key" class="input-field" placeholder="sk-..." onchange="saveData()">
            <button class="btn-full" style="background:#222; color:white;" onclick="alert('키가 저장되었습니다.')">키 적용</button>
        </div>
    </div>

    <!-- 유저 설정 탭 -->
    <div id="view-user" class="view hidden">
        <div class="profile-box">
            <div onclick="document.getElementById('u-file').click()">
                <img id="u-avatar" src="https://via.placeholder.com/100" class="u-avatar-large">
                <input type="file" id="u-file" hidden onchange="uploadUserImg(this)">
                <p style="font-size:0.7rem; color:var(--dim); margin-top:-10px;">사진 변경</p>
            </div>
            
            <div style="text-align:left; margin-top:20px;">
                <label class="input-label">표시 이름</label>
                <input id="u-display-name" class="input-field" onchange="saveData()">
                
                <label class="input-label">핸들명 (ID)</label>
                <input id="u-handle" class="input-field" disabled style="opacity:0.4">

                <label class="input-label">비밀번호 변경</label>
                <input type="password" id="u-new-pw" class="input-field" placeholder="새 비밀번호 입력">
            </div>
            
            <button class="btn-full" onclick="saveData()">설정 저장</button>
            <button class="btn-danger" onclick="handleLogout()">로그아웃</button>
            <button class="btn-full" style="background:none; color:var(--dim); font-size:0.75rem;" onclick="exportSyncData()">백업 코드 복사</button>
        </div>
    </div>
</main>

<script>
    // --- 데이터 엔진 ---
    let db = JSON.parse(localStorage.getItem('dreamer_mobile_v1')) || {
        users: {}, currentUser: null, chars: [], sessions: [], personas: [], apiKey: ""
    };

    function saveData() {
        if(db.currentUser) {
            const user = db.users[db.currentUser];
            user.name = document.getElementById('u-display-name').value;
            if(document.getElementById('u-new-pw').value) user.pw = document.getElementById('u-new-pw').value;
            user.avatar = document.getElementById('u-avatar').src;
        }
        db.apiKey = document.getElementById('api-key').value;
        localStorage.setItem('dreamer_mobile_v1', JSON.stringify(db));
    }

    // --- 인증 ---
    function showAuth(type) {
        document.getElementById('login-form').classList.toggle('hidden', type !== 'login');
        document.getElementById('signup-form').classList.toggle('hidden', type !== 'signup');
    }

    function handleSignup() {
        const email = document.getElementById('sign-email').value;
        const handle = document.getElementById('sign-handle').value;
        const pw = document.getElementById('sign-pw').value;
        if(!email.endsWith('@gmail.com')) return alert("지메일만 가입 가능합니다.");
        if(db.users[handle]) return alert("중복된 핸들명입니다.");
        db.users[handle] = { email, pw, name: handle, avatar: "" };
        alert("가입 성공! 로그인 하세요."); showAuth('login'); saveData();
    }

    function handleLogin() {
        const handle = document.getElementById('login-handle').value;
        const pw = document.getElementById('login-pw').value;
        if(db.users[handle] && db.users[handle].pw === pw) {
            db.currentUser = handle;
            document.getElementById('auth-overlay').classList.add('hidden');
            initUser(); saveData();
        } else alert("정보가 틀립니다.");
    }

    function handleLogout() { db.currentUser = null; saveData(); location.reload(); }

    function initUser() {
        const user = db.users[db.currentUser];
        document.getElementById('u-display-name').value = user.name;
        document.getElementById('u-handle').value = db.currentUser;
        if(user.avatar) document.getElementById('u-avatar').src = user.avatar;
        document.getElementById('api-key').value = db.apiKey;
    }

    function uploadUserImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => { document.getElementById('u-avatar').src = e.target.result; saveData(); };
        reader.readAsDataURL(input.files[0]);
    }

    // --- 탭 이동 ---
    function switchTab(el, tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + tabId).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function exportSyncData() {
        navigator.clipboard.writeText(btoa(JSON.stringify(db)));
        alert("백업 코드가 복사되었습니다.");
    }

    // 초기화
    if(db.currentUser) {
        document.getElementById('auth-overlay').classList.add('hidden');
        initUser();
    }
</script>
</body>
</html>
