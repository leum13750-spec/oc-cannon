<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>dreamer.ai</title>
    
    <!-- Appwrite SDK & Icons -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0/dist/appwrite.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 새로고침 시 로그인창 깜빡임(FOUC) 및 초기화 방지 스크립트 -->
    <script>
        if (localStorage.getItem('dreamer_logged_in') === 'true') {
            document.documentElement.style.setProperty('--login-display', 'none');
        }
    </script>

    <style>
        :root {
            --bg-main: #0a0a0a; --bg-surface: #151515; --bg-surface-light: #202020;
            --accent-color: #d8b4fe; --text-primary: #ffffff; --text-secondary: #9ca3af;
            --border-color: #262626; --danger-color: #ff6b6b;
            --z-overlay: 2000; --z-editor: 7000; --z-chat: 9000; --z-sidebar: 10000; --z-alert: 20000;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
        
        /* 공통 유틸리티 */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-center { display: flex; justify-content: center; align-items: center; }
        .empty-text { color: var(--text-secondary); font-size: 14px; text-align: center; margin-top: 20px; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; display: none !important; }
        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        /* 레이아웃 & 탭 */
        .app-header { padding: 16px 20px; background-color: var(--bg-main); }
        .logo { color: var(--accent-color); font-size: 22px; font-weight: bold; }
        .main-tabs { display: flex; border-bottom: 1px solid var(--border-color); padding: 0 16px; overflow-x: auto; scrollbar-width: none; justify-content: space-around; }
        .main-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: none; border: none; color: var(--text-secondary); padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; flex: 1; position: relative; }
        .tab-btn.active { color: var(--text-primary); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 20%; width: 60%; height: 3px; background-color: var(--accent-color); border-radius: 3px 3px 0 0; }
        .tab-content-area { padding: 24px 16px 100px; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 버튼 및 입력폼 */
        .btn-main { width: 100%; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 12px; }
        .btn-fill { background: var(--text-primary); color: black; border: none; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: white; }
        .btn-create { background: var(--bg-surface); color: var(--accent-color); border: 1px solid var(--border-color); padding: 16px; border-radius: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 16px; }
        
        .form-group { margin-bottom: 24px; text-align: left; }
        .form-group label { display: block; color: var(--accent-color); font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; color: white; font-size: 15px; outline: none; }
        .auto-resize { resize: none; overflow-y: auto; min-height: 20px; }
        
        /* 리스트 카드 & 스와이프 */
        .swipe-container { position: relative; width: 100%; overflow: hidden; border-radius: 16px; margin-bottom: 12px; background: var(--bg-surface); }
        .delete-btn-bg { position: absolute; top: 0; right: 0; bottom: 0; width: 80px; background-color: var(--danger-color); color: white; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; z-index: 1; }
        .list-card { display: flex; align-items: center; gap: 14px; background: var(--bg-surface); padding: 14px 16px; border-radius: 16px; position: relative; cursor: pointer; z-index: 2; width: 100%; transition: transform 0.3s; }
        .item-img { width: 48px; height: 48px; object-fit: cover; flex-shrink: 0; background: var(--bg-surface-light); border-radius: 12px; }
        .item-img.circle { border-radius: 50%; }
        .list-title { font-size: 16px; font-weight: bold; color: white; margin-bottom: 4px; }
        .list-sub { font-size: 13px; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 오버레이 & 모달 */
        .screen-overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: var(--z-overlay); display: flex; justify-content: center; align-items: center; padding: 20px; transition: 0.3s; }
        .modal-box { width: 100%; max-width: 400px; background: var(--bg-surface); padding: 30px 24px; border-radius: 20px; border: 1px solid var(--border-color); text-align: center; }
        
        /* 로그인 스크린 상태 (스크립트 변수 연동) */
        #login-screen { display: var(--login-display, flex) !important; }

        /* 사이드바 */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--bg-surface); z-index: var(--z-sidebar); transition: left 0.3s; display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-menu li { padding: 16px 20px; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #1a1a1a; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: calc(var(--z-sidebar) - 1); opacity: 0; visibility: hidden; transition: 0.3s; }
        .sidebar-overlay.show { opacity: 1; visibility: visible; }

        /* 에디터 & 채팅 */
        .editor-screen { position: fixed; inset: 0; background: var(--bg-main); z-index: var(--z-editor); display: flex; flex-direction: column; }
        .editor-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
        .editor-body { flex: 1; overflow-y: auto; padding: 24px 20px; }
        
        .chat-wrap { display: flex; flex-direction: column; background: #121212; z-index: var(--z-chat); position: fixed; inset: 0; }
        #chat-log { flex: 1; overflow-y: auto; padding: 20px 15px; }
        .msg-block { padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; }
        .msg-block:active { background: #1a1a1a; }
        .msg-header { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .msg-content { font-size: 14px; line-height: 1.6; color: #e0e0e0; word-break: break-word; }
        
        /* 컴포넌트 간소화 클래스 */
        .info-card { background: var(--bg-surface-light); padding: 16px; border-radius: 12px; margin-bottom: 12px; }
    </style>
</head>
<body>

    <!-- 범용 모달 -->
    <div id="d-modal" class="screen-overlay hidden" style="z-index: var(--z-alert);">
        <div class="modal-box">
            <h3 id="dm-title" style="margin-bottom: 15px; font-size: 18px;">알림</h3>
            <p id="dm-msg" style="color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; white-space: pre-wrap;"></p>
            <input type="text" id="dm-input" class="hidden" style="width: 100%; padding: 14px; margin-bottom: 20px; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 12px; color: white;">
            <div style="display: flex; gap: 10px;">
                <button id="dm-cancel" class="btn-main btn-outline hidden" style="flex:1;">취소</button>
                <button id="dm-confirm" class="btn-main btn-fill" style="flex:1;">확인</button>
            </div>
        </div>
    </div>

    <!-- 로그인 -->
    <div id="login-screen" class="screen-overlay">
        <div class="modal-box">
            <h1 class="logo" style="margin-bottom:10px;">dreamer.ai</h1>
            <p style="color:var(--text-secondary); margin-bottom:20px;">로그인이 필요합니다.</p>
            <input type="text" id="login-id" placeholder="핸들명(아이디)" style="width:100%; padding:14px; margin-bottom:10px; border-radius:10px; background:var(--bg-main); border:none; color:white;">
            <input type="password" id="login-pw" placeholder="비밀번호" style="width:100%; padding:14px; margin-bottom:20px; border-radius:10px; background:var(--bg-main); border:none; color:white;">
            <button class="btn-main btn-fill" onclick="login()">로그인</button>
        </div>
    </div>
    
    <!-- 좌측 사이드바 -->
    <div id="sidebar" class="sidebar">
        <div class="flex-between" style="padding: 20px; border-bottom: 1px solid var(--border-color);">
            <h2>메뉴</h2><button class="icon-btn" onclick="toggleSide()"><i class="fas fa-times"></i></button>
        </div>
        <ul class="sidebar-menu" style="flex:1; overflow-y:auto; list-style:none;">
            <li onclick="goTab('character'); toggleSide();"><i class="fas fa-home"></i> 홈</li>
            <li onclick="toggleSide(); dAlert('준비중입니다.');"><i class="fas fa-sliders-h"></i> 출력 설정</li>
            <li onclick="dAlert('과거 기록 열람 기능 준비중입니다.')"><i class="fas fa-history"></i> 과거 내역</li>
            <li onclick="logout()" style="color:var(--danger-color);"><i class="fas fa-sign-out-alt"></i> 로그아웃</li>
        </ul>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSide()"></div>

    <!-- 메인 앱 -->
    <div class="app-content">
        <header class="app-header flex-between">
            <button class="icon-btn" onclick="toggleSide()"><i class="fas fa-bars"></i></button>
            <h1 class="logo">dreamer.ai</h1><div style="width:24px;"></div>
        </header>

        <nav class="main-tabs">
            <button class="tab-btn active" data-tab="character">캐릭터</button>
            <button class="tab-btn" data-tab="scene" onclick="renderAll()">장면</button>
            <button class="tab-btn" data-tab="persona">페르소나</button>
            <button class="tab-btn" data-tab="settings">설정</button>
        </nav>

        <main class="tab-content-area">
            <!-- 캐릭터 탭 -->
            <div id="tab-character" class="tab-pane active">
                <button class="btn-create" onclick="openEditor('character')">+ 캐릭터 생성</button>
                <div id="list-character"></div>
            </div>
            
            <!-- 장면 탭 -->
            <div id="tab-scene" class="tab-pane">
                <div class="flex-between" style="margin-bottom:12px;">
                    <h3>저장된 장면</h3>
                    <button onclick="createFolder()" style="background:none; border:none; color:var(--accent-color); font-weight:bold; cursor:pointer;"><i class="fas fa-folder-plus"></i> 폴더 생성</button>
                </div>
                <div style="margin-bottom: 16px; font-size: 13px; color: var(--text-secondary);">
                    <i class="fas fa-folder-open"></i> <span onclick="renderAll(null)" style="cursor:pointer; color:var(--accent-color);">루트 폴더</span> <span id="folder-path" style="color:white;"></span>
                </div>
                <div id="list-scene"><p class="empty-text">장면이 없습니다.</p></div>
            </div>
            
            <!-- 페르소나 탭 -->
            <div id="tab-persona" class="tab-pane">
                <button class="btn-create" onclick="openEditor('persona')">+ 페르소나 생성</button>
                <div id="list-persona"></div>
            </div>
            
            <!-- 설정 탭 -->
            <div id="tab-settings" class="tab-pane">
                <div class="info-card">
                    <label style="color:var(--accent-color); font-weight:bold;"><i class="fas fa-sync-alt"></i> Supabase 클라우드 백업</label>
                    <div style="display:flex; gap:8px; margin-top:12px;">
                        <button class="btn-main btn-fill" style="margin:0; padding:10px;" onclick="doBackup()"><i class="fas fa-cloud-upload-alt"></i> 백업</button>
                        <button class="btn-main btn-outline" style="margin:0; padding:10px; border-color:var(--accent-color); color:var(--accent-color);" onclick="doRestore()"><i class="fas fa-cloud-download-alt"></i> 복구</button>
                    </div>
                </div>
                <div class="form-group"><label>Supabase Key</label><input type="password" id="set-supabase-key"></div>
                <div class="form-group"><label>API URL</label><input type="text" id="set-api-url" placeholder="https://api..."></div>
                <div class="form-group"><label>API Key</label><input type="password" id="set-api-key"></div>
                <div class="form-group"><label>닉네임</label><input type="text" id="set-nickname"></div>
                <button class="btn-main btn-fill" onclick="saveSettings()">설정 저장</button>
                <button class="btn-main btn-outline hidden" id="btn-admin" style="color:#fcc419; border-color:#fcc419;" onclick="dAlert('관리자 패널 준비중');"><i class="fas fa-crown"></i> 관리자 패널</button>
            </div>
        </main>
    </div>

    <!-- 에디터 화면들 -->
    <div id="screen-character" class="editor-screen hidden">
        <header class="editor-header">
            <button class="icon-btn" onclick="$('screen-character').classList.add('hidden')"><i class="fas fa-arrow-left"></i></button>
            <strong id="char-title">캐릭터 편집</strong>
            <button class="icon-btn" style="color:var(--accent-color); font-size:16px;" onclick="saveChar()">저장</button>
        </header>
        <div class="editor-body">
            <div class="flex-center" style="margin-bottom:20px;">
                <div id="c-img-preview" onclick="$('c-img-file').click()" style="width:100px; height:100px; border-radius:50%; background:var(--bg-surface); border:2px dashed var(--border-color); display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden;">+ 사진</div>
                <input type="file" id="c-img-file" class="hidden" accept="image/*" onchange="handleImg(this, 'c-img-preview')">
            </div>
            <div class="form-group"><label>Name *</label><input type="text" id="c-name"></div>
            <div class="form-group"><label>Tagline</label><input type="text" id="c-sub"></div>
            <div class="form-group"><label>Greeting *</label><textarea id="c-greet" class="auto-resize" rows="3"></textarea></div>
            <div class="form-group"><label>Profile</label><textarea id="c-prof" class="auto-resize" rows="3"></textarea></div>
        </div>
    </div>

    <div id="screen-persona" class="editor-screen hidden">
        <header class="editor-header">
            <button class="icon-btn" onclick="$('screen-persona').classList.add('hidden')"><i class="fas fa-arrow-left"></i></button>
            <strong id="p-title">페르소나 편집</strong>
            <button class="icon-btn" style="color:var(--accent-color); font-size:16px;" onclick="savePersona()">저장</button>
        </header>
        <div class="editor-body">
            <div class="flex-center" style="margin-bottom:20px;">
                <div id="p-img-preview" onclick="$('p-img-file').click()" style="width:100px; height:100px; border-radius:50%; background:var(--bg-surface); border:2px dashed var(--border-color); display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden;">+ 사진</div>
                <input type="file" id="p-img-file" class="hidden" accept="image/*" onchange="handleImg(this, 'p-img-preview')">
            </div>
            <div class="form-group"><label>Name *</label><input type="text" id="p-name"></div>
            <div class="form-group"><label>Appearance</label><textarea id="p-app" class="auto-resize"></textarea></div>
            <div class="form-group"><label>Background</label><textarea id="p-bg" class="auto-resize"></textarea></div>
            <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="p-def"> 기본값 설정</label>
        </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="screen-chat" class="chat-wrap hidden">
        <header class="editor-header" style="padding-top: calc(16px + env(safe-area-inset-top));">
            <button class="icon-btn" onclick="$('screen-chat').classList.add('hidden')"><i class="fas fa-arrow-left"></i></button>
            <div style="text-align:center;"><div id="chat-name" style="font-weight:bold;"></div><div id="chat-sub" style="font-size:12px; color:gray;"></div></div>
            <button class="icon-btn" onclick="dAlert('설정 준비중')"><i class="fas fa-cog"></i></button>
        </header>
        <div id="chat-log"></div>
        <footer style="padding: 15px; background: #121212; border-top: 1px solid #222;">
            <div style="display: flex; gap: 8px;">
                <textarea id="chat-input" class="auto-resize" placeholder="메시지 입력..." style="flex:1; border-radius:20px; padding:12px 16px; background:#2a2a2a; border:none; color:white;"></textarea>
                <button onclick="sendMsg()" style="background:var(--accent-color); border:none; border-radius:50%; width:44px; height:44px; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </div>

<script>
    // === 유틸리티 & 원본 완벽 호환 DB 래퍼 ===
    const $ = id => document.getElementById(id);
    const db = {
        get: (k, d = []) => { 
            try { const v = localStorage.getItem('dreamer_' + k); return v ? JSON.parse(v) : d; } 
            catch { return d; } 
        },
        set: (k, v) => localStorage.setItem('dreamer_' + k, JSON.stringify(v))
    };
    
    // 통합 모달 로직
    const showModal = (msg, title, type, def = '') => new Promise(res => {
        $('dm-title').innerText = title; $('dm-msg').innerText = msg;
        $('dm-input').style.display = type === 'prompt' ? 'block' : 'none';
        $('dm-input').value = def;
        $('dm-cancel').style.display = type !== 'alert' ? 'block' : 'none';
        $('d-modal').classList.remove('hidden');
        
        const close = (val) => {
            $('d-modal').classList.add('hidden');
            $('dm-confirm').onclick = $('dm-cancel').onclick = null;
            res(val);
        };
        $('dm-confirm').onclick = () => close(type === 'prompt' ? $('dm-input').value : true);
        $('dm-cancel').onclick = () => close(type === 'prompt' ? null : false);
        if(type === 'prompt') setTimeout(() => $('dm-input').focus(), 100);
    });
    
    window.dAlert = (m, t='알림') => showModal(m, t, 'alert');
    window.dConfirm = (m, t='확인') => showModal(m, t, 'confirm');
    window.dPrompt = (m, d='', t='입력') => showModal(m, t, 'prompt', d);

    // === 상태 변수 ===
    let state = { characterId: null, personaId: null, folderId: null, tempImg: null };
    const defImg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23666"><circle cx="12" cy="12" r="12"/></svg>';

    // === 초기화 & UI 제어 ===
    document.addEventListener('DOMContentLoaded', () => {
        // 관리자 버튼
        const handle = localStorage.getItem('dreamer_handle');
        if(handle === 'admin' || handle === 'ReschaRiley') $('btn-admin').classList.remove('hidden');
        
        // 탭 리스너 연결
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => goTab(btn.dataset.tab);
        });
        
        // 기존 설정값 복구
        ['api-url', 'api-key', 'supabase-key', 'nickname'].forEach(k => {
            if($(`set-${k}`)) $(`set-${k}`).value = localStorage.getItem(`dreamer_${k}`) || '';
        });
        
        goTab(localStorage.getItem('dreamer_current_tab') || 'character');
    });

    const goTab = (tab) => {
        document.querySelectorAll('.tab-btn, .tab-pane').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tab}"]`)?.classList.add('active');
        $(`tab-${tab}`)?.classList.add('active');
        localStorage.setItem('dreamer_current_tab', tab);
        renderAll();
    };

    const toggleSide = () => {
        $('sidebar').classList.toggle('open');
        $('sidebar-overlay').classList.toggle('show');
    };

    // === 로그인 / 설정 저장 ===
    const login = () => {
        const id = $('login-id').value.trim();
        if(!id) return dAlert('아이디를 입력하세요.');
        localStorage.setItem('dreamer_logged_in', 'true');
        localStorage.setItem('dreamer_handle', id);
        $('login-screen').style.display = 'none';
        if(id === 'admin' || id === 'ReschaRiley') $('btn-admin').classList.remove('hidden');
        renderAll();
    };
    
    const logout = () => dConfirm('로그아웃 하시겠습니까?').then(r => r && (localStorage.clear(), location.reload()));
    
    const saveSettings = () => {
        localStorage.setItem('dreamer_api-url', $('set-api-url').value); 
        localStorage.setItem('dreamer_api-key', $('set-api-key').value);
        localStorage.setItem('dreamer_supabase-key', $('set-supabase-key').value); 
        localStorage.setItem('dreamer_nickname', $('set-nickname').value);
        dAlert('설정이 저장되었습니다.');
    };

    // === 데이터 렌더링 ===
    const renderAll = (fId = state.folderId) => {
        state.folderId = fId;
        renderList('characters', 'character', c => `<div class="list-title">${c.name}</div><div class="list-sub">${c.sub || '설명 없음'}</div>`);
        renderList('personas', 'persona', p => `<div class="list-title">${p.name} ${p.def?'⭐':''}</div><div class="list-sub">${p.app || '설명 없음'}</div>`);
        renderScenes();
    };

    const renderList = (storeKey, type, htmlFn) => {
        const items = db.get(storeKey);
        const box = $(`list-${type}`);
        if(!box) return;
        if(!items.length) return box.innerHTML = `<p class="empty-text">저장된 항목이 없습니다.</p>`;
        
        box.innerHTML = items.map(i => `
            <div class="swipe-container">
                <div class="delete-btn-bg" onclick="delItem('${storeKey}', '${i.id}', '${i.name}')"><i class="fas fa-trash"></i></div>
                <div class="list-card" onclick="${type==='character' ? `openChat('${i.id}')` : `openEditor('${type}','${i.id}')`}" ontouchstart="initSwipe(event, this)">
                    <img src="${i.photoUrl || i.img || defImg}" class="item-img ${type==='persona'?'circle':''}">
                    <div style="flex:1; overflow:hidden;">${htmlFn(i)}</div>
                    <button class="icon-btn" style="color:gray;" onclick="event.stopPropagation(); openEditor('${type}','${i.id}')"><i class="fas fa-edit"></i></button>
                </div>
            </div>
        `).join('');
    };

    const renderScenes = () => {
        const box = $('list-scene'); if(!box) return;
        const folders = db.get('scene_folders').filter(f => f.parentId === state.folderId || f.pid === state.folderId);
        const scenes = db.get('scenes').filter(s => s.folderId === state.folderId || s.fid === state.folderId);
        $('folder-path').innerText = state.folderId ? ` > 하위폴더` : '';
        
        if(!folders.length && !scenes.length) return box.innerHTML = `<p class="empty-text">저장된 장면이 없습니다.</p>`;
        
        let html = folders.map(f => `
            <div class="swipe-container"><div class="delete-btn-bg" onclick="delFolder('${f.id}')"><i class="fas fa-trash"></i></div>
            <div class="list-card" onclick="renderAll('${f.id}')" ontouchstart="initSwipe(event, this)">
            <div class="flex-center item-img"><i class="fas fa-folder" style="color:#fcc419;"></i></div>
            <div><div class="list-title">${f.name}</div><div class="list-sub">장면 폴더</div></div></div></div>
        `).join('');
        
        html += scenes.map(s => `
            <div class="swipe-container"><div class="delete-btn-bg" onclick="delItem('scenes', '${s.id}', '${s.name}')"><i class="fas fa-trash"></i></div>
            <div class="list-card" ontouchstart="initSwipe(event, this)">
            <div class="flex-center item-img"><i class="fas fa-film" style="color:var(--accent-color);"></i></div>
            <div style="flex:1; overflow:hidden;"><div class="list-title">${s.name}</div><div class="list-sub">${s.charName} • ${s.date}</div></div></div></div>
        `).join('');
        box.innerHTML = html;
    };

    // === 아이템 관리 ===
    const delItem = async (storeKey, id, nm) => { 
        if(await dConfirm(`'${nm}'을(를) 삭제하시겠습니까?`)) { 
            db.set(storeKey, db.get(storeKey).filter(i=>i.id!==id)); 
            renderAll(); 
        }
    };
    
    const delFolder = async (id) => { 
        if(await dConfirm('폴더를 삭제하시겠습니까?\n(폴더 안의 장면들은 삭제되지 않고 최상단으로 이동합니다)')) {
            db.set('scene_folders', db.get('scene_folders').filter(f=>f.id!==id));
            db.set('scenes', db.get('scenes').map(s=>s.folderId===id || s.fid===id ? {...s, folderId:null, fid:null} : s));
            renderAll();
        }
    };
    
    const createFolder = async () => {
        const nm = await dPrompt('폴더 이름을 입력하세요:');
        if(nm) { 
            db.set('scene_folders', [...db.get('scene_folders'), {id:Date.now().toString(), name:nm, parentId:state.folderId}]); 
            renderAll(); 
        }
    };

    // === 에디터 ===
    const openEditor = (type, id=null) => {
        const storeKey = type === 'character' ? 'characters' : 'personas';
        state[`${type}Id`] = id; state.tempImg = null;
        const item = id ? db.get(storeKey).find(i=>i.id===id) : {};
        
        if(type==='character') {
            ['name','sub','greet','prof'].forEach(k => {
                const mappedKey = k === 'greet' ? 'greeting' : k === 'prof' ? 'profile' : k;
                $(`c-${k}`).value = item[mappedKey] || '';
            });
            const imgUrl = item.photoUrl || item.img;
            $('c-img-preview').innerHTML = imgUrl ? `<img src="${imgUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : '+ 사진';
        } else {
            ['name','app','bg'].forEach(k => {
                const mappedKey = k === 'app' ? 'appearance' : k === 'bg' ? 'background' : k;
                $(`p-${k}`).value = item[mappedKey] || '';
            });
            $('p-def').checked = item.isDefault || item.def || false;
            const imgUrl = item.photoUrl || item.img;
            $('p-img-preview').innerHTML = imgUrl ? `<img src="${imgUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : '+ 사진';
        }
        $(`screen-${type}`).classList.remove('hidden');
    };

    const saveChar = () => {
        const data = { name: $('c-name').value, sub: $('c-sub').value, greeting: $('c-greet').value, profile: $('c-prof').value };
        if(!data.name || !data.greeting) return dAlert('Name과 Greeting은 필수 항목입니다.');
        saveLogic('character', state.characterId, data);
    };
    
    const savePersona = () => {
        const data = { name: $('p-name').value, appearance: $('p-app').value, background: $('p-bg').value, isDefault: $('p-def').checked };
        if(!data.name) return dAlert('페르소나 이름은 필수 항목입니다.');
        let list = db.get('personas');
        if(data.isDefault) list = list.map(p => ({...p, isDefault:false, def:false})); 
        db.set('personas', list);
        saveLogic('persona', state.personaId, data);
    };

    const saveLogic = (type, id, data) => {
        const storeKey = type === 'character' ? 'characters' : 'personas';
        let items = db.get(storeKey);
        
        data.photoUrl = state.tempImg || (id ? items.find(i=>i.id===id)?.photoUrl : defImg);
        data.date = new Date().toLocaleDateString();
        
        if(id) items = items.map(i => i.id === id ? {...i, ...data} : i);
        else items.push({ id: Date.now().toString(), ...data });
        
        db.set(storeKey, items); 
        $(`screen-${type}`).classList.add('hidden'); 
        renderAll(); 
        dAlert('저장되었습니다.');
    };

    // === 이미지 리사이징 ===
    const handleImg = (el, viewId) => {
        if(!el.files[0]) return;
        const r = new FileReader();
        r.onload = e => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d');
                const scale = Math.min(400/img.width, 400/img.height, 1);
                cvs.width = img.width*scale; cvs.height = img.height*scale;
                ctx.drawImage(img, 0, 0, cvs.width, cvs.height);
                state.tempImg = cvs.toDataURL('image/jpeg', 0.8);
                $(viewId).innerHTML = `<img src="${state.tempImg}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
            };
            img.src = e.target.result;
        };
        r.readAsDataURL(el.files[0]);
    };

    // === 터치 스와이프 (삭제 버튼 표시) ===
    window.initSwipe = (e, card) => {
        let start = e.touches[0].clientX, cur = 0;
        card.style.transition = 'none';
        const move = e => { cur = e.touches[0].clientX - start; if(cur<0 && cur>-100) card.style.transform = `translateX(${cur}px)`; };
        const end = () => { card.style.transition = '0.3s'; card.style.transform = `translateX(${cur < -50 ? -80 : 0}px)`; 
            card.removeEventListener('touchmove', move); card.removeEventListener('touchend', end); };
        card.addEventListener('touchmove', move, {passive:true}); card.addEventListener('touchend', end);
    };

    // 텍스트 영역 높이 자동 조절
    document.addEventListener('input', e => {
        if(e.target.classList.contains('auto-resize')) {
            e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 140) + 'px';
        }
    });

    // === 간이 채팅 (시뮬레이션) ===
    let chatHist = [];
    const openChat = (cId) => {
        state.characterId = cId;
        const c = db.get('characters').find(i=>i.id===cId);
        $('chat-name').innerText = c.name; 
        $('chat-sub').innerText = 'By @' + (localStorage.getItem('dreamer_handle') || 'User');
        chatHist = [{r:'char', n:c.name, c:c.greeting || c.greet || '반가워요.'}];
        renderChat();
        $('screen-chat').classList.remove('hidden');
    };
    
    const renderChat = () => {
        $('chat-log').innerHTML = chatHist.map(m => `<div class="msg-block"><div class="msg-header">${m.r==='char'?m.n:'나'}</div><div class="msg-content">${m.c}</div></div>`).join('');
        $('chat-log').scrollTop = $('chat-log').scrollHeight;
    };
    
    const sendMsg = () => {
        const v = $('chat-input').value.trim(); if(!v) return;
        chatHist.push({r:'user', c:v}); $('chat-input').value = ''; renderChat();
        setTimeout(() => { chatHist.push({r:'char', n:$('chat-name').innerText, c:'*(AI 응답 시뮬레이션)*\n\n정상적으로 메시지를 수신했습니다.'}); renderChat(); }, 600);
    };
    
    // === 백업 및 복구 ===
    const doBackup = () => {
        const data = {
            characters: localStorage.getItem('dreamer_characters'),
            personas: localStorage.getItem('dreamer_personas'),
            scenes: localStorage.getItem('dreamer_scenes'),
            scene_folders: localStorage.getItem('dreamer_scene_folders')
        };
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}));
        a.download = `dreamer_backup_${new Date().toISOString().split('T')[0]}.json`; 
        a.click(); 
        dAlert('백업 파일이 다운로드 되었습니다.');
    };
    
    const doRestore = () => {
        const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
        input.onchange = e => {
            const r = new FileReader(); 
            r.onload = ev => {
                try {
                    const d = JSON.parse(ev.target.result); 
                    Object.keys(d).forEach(k => { if(d[k]) localStorage.setItem(`dreamer_${k}`, d[k]); });
                    renderAll(); 
                    dAlert('데이터가 복구되었습니다.');
                } catch(err) { dAlert('잘못된 백업 파일입니다.'); }
            }; 
            r.readAsText(e.target.files[0]);
        }; 
        input.click();
    };
</script>
</body>
</html>
