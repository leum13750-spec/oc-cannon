<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <style>
        :root { --bg: #0d0d0d; --panel: #181818; --accent: #bb86fc; --text: #e0e0e0; --dim: #9e9e9e; --border: #262626; --input: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-y: auto; }
        button { cursor: pointer; border: none; background: none; color: white; transition: 0.2s; }
        .hidden { display: none !important; }
        
        /* 헤더 & 브랜드 */
        #top-brand { padding: 40px 20px 10px; text-align: center; }
        #site-logo { font-size: 2.2rem; font-weight: 900; color: var(--accent); letter-spacing: -1.5px; }
        #site-guide { background: rgba(187, 134, 252, 0.05); border: 1px solid rgba(187, 134, 252, 0.2); margin: 15px auto; padding: 15px; border-radius: 12px; font-size: 0.85rem; color: var(--dim); max-width: 500px; line-height: 1.5; text-align: left; position: relative; }

        /* 네비게이션 */
        #nav-bar { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 0.75rem; font-weight: bold; color: var(--dim); }
        .nav-item.active { color: white; border-bottom: 2px solid var(--accent); }

        /* 메인 콘텐츠 */
        .view { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }
        .btn-add { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--accent); padding: 15px; border-radius: 15px; font-weight: bold; margin-bottom: 20px; }
        
        /* 리스트 스타일 */
        .item-card { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .item-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #222; }

        /* 채팅 화면 */
        #chat-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; }
        #chat-header { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg-wrapper { max-width: 100%; display: flex; flex-direction: column; }
        .msg-content { font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; }
        .msg-content em { color: var(--dim); font-style: italic; }
        .swipe-control { display: flex; align-items: center; gap: 10px; margin-top: 5px; color: var(--dim); font-size: 0.8rem; }

        /* 모달 및 입력란 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; padding: 20px; overflow-y: auto; }
        .input-field { width: 100%; background: var(--input); border: 1px solid #333; border-radius: 12px; color: white; padding: 14px; font-size: 0.95rem; outline: none; margin-bottom: 15px; }
        .cai-textarea { width: 100%; background: var(--input); border: 1px solid #333; border-radius: 12px; color: white; padding: 15px; min-height: 100px; resize: none; margin-bottom: 15px; }

        /* 로그인 */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<!-- [A] 로그인 화면 -->
<div id="auth-overlay">
    <div class="auth-box">
        <h1 style="color:var(--accent)">dreamer.ai</h1>
        <div id="login-form">
            <input id="login-handle" class="input-field" placeholder="핸들명 (ID)">
            <input type="password" id="login-pw" class="input-field" placeholder="비밀번호">
            <button onclick="handleLogin()" style="background:white; color:black; width:100%; padding:15px; border-radius:30px; font-weight:bold;">로그인</button>
            <button onclick="showAuth('signup')" style="margin-top:20px; font-size:0.8rem; color:var(--dim)">새 계정 만들기</button>
        </div>
        <div id="signup-form" class="hidden">
            <input id="sign-email" class="input-field" placeholder="지메일 (@gmail.com)">
            <input id="sign-handle" class="input-field" placeholder="사용할 핸들명 (ID)">
            <input type="password" id="sign-pw" class="input-field" placeholder="비밀번호">
            <button onclick="handleSignup()" style="background:white; color:black; width:100%; padding:15px; border-radius:30px; font-weight:bold;">가입하기</button>
            <button onclick="showAuth('login')" style="margin-top:20px; font-size:0.8rem; color:var(--dim)">로그인으로 돌아가기</button>
        </div>
    </div>
</div>

<!-- [B] 메인 UI -->
<div id="main-content">
    <div id="top-brand">
        <div id="site-logo">dreamer.ai</div>
        <div id="site-guide">
            <div style="display:flex; justify-content:space-between;"><b>User Manual</b> <button onclick="editManual()" style="font-size:0.7rem; color:var(--accent)">Edit</button></div>
            <div id="manual-text" style="margin-top:8px;">캐릭터를 생성하고 API 키를 등록해 대화를 시작하세요.</div>
        </div>
    </div>

    <nav id="nav-bar">
        <div class="nav-item active" onclick="switchTab(this, 'chars')">캐릭터</div>
        <div class="nav-item" onclick="switchTab(this, 'chats')">대화</div>
        <div class="nav-item" onclick="switchTab(this, 'personas')">페르소나</div>
        <div class="nav-item" onclick="switchTab(this, 'api')">API</div>
        <div class="nav-item" onclick="switchTab(this, 'user')">설정</div>
    </nav>

    <main>
        <div id="view-chars" class="view">
            <button class="btn-add" onclick="openModal('char-modal')">+ 새 캐릭터 만들기</button>
            <div id="char-list"></div>
        </div>
        <div id="view-chats" class="view hidden"><h3>최근 대화</h3><div id="session-list"></div></div>
        <div id="view-personas" class="view hidden">
            <button class="btn-add" onclick="openModal('persona-modal')">+ 새 페르소나 만들기</button>
            <div id="persona-list"></div>
        </div>
        <div id="view-api" class="view hidden">
            <div class="profile-card" style="text-align:left;">
                <label style="font-size:0.8rem; color:var(--accent)">API Key</label>
                <input type="password" id="api-key" class="input-field" placeholder="sk-..." onchange="saveData()">
                <label style="font-size:0.8rem; color:var(--accent)">Model</label>
                <select id="model-select" class="input-field" onchange="saveData()" style="background:var(--input)">
                    <option value="midnight-miqu-70b-v1.5">Midnight Miqu 70B</option>
                    <option value="llama-3.1-70b-instruct">Llama 3.1 70B</option>
                </select>
            </div>
        </div>
        <div id="view-user" class="view hidden">
            <div class="profile-card">
                <div onclick="document.getElementById('u-file').click()">
                    <img id="u-avatar" src="https://via.placeholder.com/100" class="item-avatar" style="width:80px; height:80px; border:2px solid var(--accent)">
                    <input type="file" id="u-file" hidden onchange="handleImg(this, 'u-avatar')">
                </div>
                <input id="u-display-name" class="input-field" placeholder="표시 이름" onchange="saveData()">
                <button class="btn-add" style="color:white" onclick="openPwModal()">비밀번호 변경</button>
                <button class="btn-add" style="color:#ff6b6b; border-color:#3d0a0a" onclick="handleLogout()">로그아웃</button>
                <hr style="border:0.5px solid #222; margin:20px 0;">
                <button class="btn-add" style="font-size:0.7rem;" onclick="exportData()">백업 코드 복사</button>
                <input id="import-input" class="input-field" placeholder="백업 코드 붙여넣기">
                <button class="btn-add" style="font-size:0.7rem;" onclick="importData()">데이터 복구하기</button>
            </div>
        </div>
    </main>
</div>

<!-- [C] 각종 모달들 -->
<!-- 캐릭터 생성 모달 -->
<div id="char-modal" class="modal hidden">
    <button onclick="closeModal()">✕ Close</button>
    <h2>Create Character</h2>
    <div onclick="document.getElementById('c-file').click()" style="text-align:center; margin-bottom:20px;">
        <img id="c-prev" src="https://via.placeholder.com/100" class="item-avatar" style="width:100px; height:100px;">
        <input type="file" id="c-file" hidden onchange="handleImg(this, 'c-prev')">
    </div>
    <input id="c-name" class="input-field" placeholder="이름 (필수, 25자)" maxlength="25">
    <input id="c-tagline" class="input-field" placeholder="한마디 (50자)" maxlength="50">
    <textarea id="c-desc" class="cai-textarea" placeholder="캐릭터 설정 / 프롬프트 (500자)" maxlength="500"></textarea>
    <textarea id="c-greet" class="cai-textarea" style="min-height:150px;" placeholder="인사말 (4096자)" maxlength="4096"></textarea>
    <button onclick="saveChar()" style="background:white; color:black; width:100%; padding:15px; border-radius:30px; font-weight:bold;">저장하기</button>
</div>

<!-- 페르소나 생성 모달 -->
<div id="persona-modal" class="modal hidden">
    <button onclick="closeModal()">✕ Close</button>
    <h2>Create Persona</h2>
    <div onclick="document.getElementById('p-file').click()" style="text-align:center; margin-bottom:20px;">
        <img id="p-prev" src="https://via.placeholder.com/100" class="item-avatar" style="width:80px; height:80px;">
        <input type="file" id="p-file" hidden onchange="handleImg(this, 'p-prev')">
    </div>
    <input id="p-name" class="input-field" placeholder="페르소나 이름 (25자)" maxlength="25">
    <textarea id="p-desc" class="cai-textarea" style="min-height:200px;" placeholder="상세 배경 설명 (무제한)"></textarea>
    <div style="margin-bottom:20px;"><input type="checkbox" id="p-default"> <label>기본값으로 설정</label></div>
    <button onclick="savePersona()" style="background:white; color:black; width:100%; padding:15px; border-radius:30px; font-weight:bold;">저장하기</button>
</div>

<!-- 채팅 화면 -->
<div id="chat-view" class="hidden">
    <header id="chat-header">
        <button onclick="exitChat()">←</button>
        <b id="chat-title">Ghost</b>
        <button onclick="deleteActiveSession()" style="color:red; font-size:0.7rem;">Delete</button>
    </header>
    <div id="chat-messages"></div>
    <div style="padding:15px; border-top:1px solid var(--border);">
        <div style="display:flex; gap:10px; background:var(--input); border-radius:25px; padding:5px 15px;">
            <input id="chat-input" style="flex:1; background:none; border:none; color:white; padding:10px; outline:none;" placeholder="Message..." onkeypress="if(event.key=='Enter') sendMessage()">
            <button onclick="sendMessage()" style="color:var(--accent); font-weight:bold;">➤</button>
        </div>
    </div>
</div>

<script>
    const DB_KEY = 'dreamer_v5_final';
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
        users: {}, currentUser: null, chars: [], personas: [], sessions: [], manual: "환영합니다!"
    };

    function save() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

    // --- 기능 로직 ---
    function handleSignup() {
        const email = document.getElementById('sign-email').value;
        const handle = document.getElementById('sign-handle').value;
        const pw = document.getElementById('sign-pw').value;
        if(!email.endsWith('@gmail.com')) return alert("지메일만 가능");
        if(db.users[handle]) return alert("중복 아이디");
        db.users[handle] = { email, pw, name: handle, avatar: "" };
        save(); alert("가입 성공"); showAuth('login');
    }

    function handleLogin() {
        const h = document.getElementById('login-handle').value;
        const p = document.getElementById('login-pw').value;
        if(db.users[h] && db.users[h].pw === p) { db.currentUser = h; save(); location.reload(); }
        else alert("실패");
    }

    function saveChar() {
        const c = { id: Date.now(), name: document.getElementById('c-name').value, tagline: document.getElementById('c-tagline').value, prompt: document.getElementById('c-desc').value, greeting: document.getElementById('c-greet').value, avatar: document.getElementById('c-prev').src };
        db.chars.push(c); save(); closeModal(); renderMain();
    }

    function savePersona() {
        const p = { id: Date.now(), name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value, avatar: document.getElementById('p-prev').src, isDefault: document.getElementById('p-default').checked };
        if(p.isDefault) db.personas.forEach(x => x.isDefault = false);
        db.personas.push(p); save(); closeModal(); renderMain();
    }

    // --- 채팅 엔진 ---
    let activeSid = null;

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim(); if(!text || !db.apiKey) return;
        const s = db.sessions.find(x => x.id === activeSid);
        const char = db.chars.find(x => x.id === s.charId);
        const persona = db.personas.find(x => x.isDefault) || db.personas[0] || {name:"User", desc:""};

        if(s.history.length === 0) {
            s.history.push({ role: "system", variants: [`${char.prompt}\n[USER_PERSONA]: ${persona.name} - ${persona.desc}`], cIdx: 0, id: 1 });
        }
        s.history.push({ role: "user", variants: [text], cIdx: 0, id: Date.now() });
        input.value = ""; 
        const aiId = Date.now()+1;
        s.history.push({ role: "assistant", variants: ["..."], cIdx: 0, id: aiId });
        renderChat();
        await regenerate(aiId);
    }

    async function regenerate(mid) {
        const s = db.sessions.find(x => x.id === activeSid);
        const m = s.history.find(x => x.id === mid);
        const idx = s.history.indexOf(m);
        const context = s.history.slice(0, idx).map(x => ({ role: x.role, content: x.variants[x.cIdx] }));

        const res = await fetch("https://api.infermatic.ai/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${db.apiKey}` },
            body: JSON.stringify({ model: db.selectedModel || "midnight-miqu-70b-v1.5", messages: context, temperature: 0.7 })
        });
        const data = await res.json();
        m.variants[m.cIdx] = data.choices[0].message.content;
        save(); renderChat();
    }

    // --- UI 관리 ---
    function renderChat() {
        const s = db.sessions.find(x => x.id === activeSid);
        const char = db.chars.find(x => x.id === s.charId);
        document.getElementById('chat-messages').innerHTML = s.history.filter(m => m.role !== 'system').map(m => `
            <div class="msg-wrapper">
                <div style="font-size:0.75rem; color:var(--dim); margin-bottom:5px;">${m.role==='user'?'Raven':char.name} <button onclick="editMsg(${m.id})" style="font-size:0.6rem; color:#444">✎</button></div>
                <div class="msg-content">${m.variants[m.cIdx].replace(/\*(.*?)\*/g, "<em>*$1*</em>")}</div>
                ${m.role==='assistant' ? `<div class="swipe-control"><button onclick="switchVariant(${m.id},-1)">〈</button><span>${m.cIdx+1}/${m.variants.length}</span><button onclick="switchVariant(${m.id},1)">〉</button><button onclick="regenerate(${m.id})">↻</button></div>` : ''}
            </div>`).join('');
        document.getElementById('chat-messages').scrollTop = 99999;
    }

    function editMsg(mid) {
        const s = db.sessions.find(x => x.id === activeSid);
        const m = s.history.find(x => x.id === mid);
        const t = prompt("Edit:", m.variants[m.cIdx]);
        if(t!==null) { m.variants[m.cIdx] = t; save(); renderChat(); }
    }

    function switchVariant(mid, d) {
        const s = db.sessions.find(x => x.id === activeSid);
        const m = s.history.find(x => x.id === mid);
        m.cIdx = Math.max(0, Math.min(m.variants.length-1, m.cIdx + d));
        renderChat();
    }

    // --- 유틸리티 ---
    function switchTab(el, id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); renderMain();
    }
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal() { document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden')); }
    function handleImg(input, id) {
        const r = new FileReader(); r.onload = (e) => document.getElementById(id).src = e.target.result;
        r.readAsDataURL(input.files[0]);
    }
    function startChat(cid, sid=null) {
        if(!sid) {
            const char = db.chars.find(c => c.id === cid);
            sid = Date.now();
            db.sessions.push({ id: sid, charId: cid, history: [{role:"assistant", variants:[char.greeting], cIdx:0, id:sid+1}] });
        }
        activeSid = sid; document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('chat-title').innerText = db.chars.find(c=>c.id===db.sessions.find(s=>s.id===sid).charId).name;
        renderChat();
    }
    function exitChat() { document.getElementById('chat-view').classList.add('hidden'); renderMain(); }
    function renderMain() {
        document.getElementById('char-list').innerHTML = db.chars.map(c => `<div class="item-card" onclick="startChat(${c.id})"><img src="${c.avatar}" class="item-avatar"><b>${c.name}</b></div>`).join('');
        document.getElementById('persona-list').innerHTML = db.personas.map(p => `<div class="item-card"><img src="${p.avatar}" class="item-avatar"><b>${p.name} ${p.isDefault?'(Def)':''}</b></div>`).join('');
        document.getElementById('session-list').innerHTML = db.sessions.map(s => `<div class="item-card" onclick="startChat(${s.charId},${s.id})">Chat with ${db.chars.find(c=>c.id===s.charId)?.name}</div>`).join('');
        document.getElementById('manual-text').innerText = db.manual;
        document.getElementById('api-key').value = db.apiKey || "";
    }
    function handleLogout() { db.currentUser = null; save(); location.reload(); }
    function showAuth(t) { document.getElementById('login-form').classList.toggle('hidden', t!=='login'); document.getElementById('signup-form').classList.toggle('hidden', t!=='signup'); }
    
    // 초기 로드
    if(db.currentUser) { document.getElementById('auth-overlay').classList.add('hidden'); renderMain(); }
</script>
</body>
</html>
