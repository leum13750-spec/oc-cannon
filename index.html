<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dreamer.ai</title>
    <style>
        :root {
            --bg: #0f0f0f; --panel: #181818; --accent: #bb86fc;
            --text: #e0e0e0; --dim: #9e9e9e; --border: #2a2a2a; --input: #242424;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        button { cursor: pointer; border: none; background: none; color: white; transition: 0.2s; }
        .hidden { display: none !important; }

        /* 상단 레이아웃 */
        #header-area { padding: 20px 20px 10px; text-align: center; border-bottom: 1px solid var(--border); }
        #site-title { font-size: 1.8rem; font-weight: 900; color: var(--accent); letter-spacing: -1px; margin-bottom: 10px; }
        #site-notice { background: #1a1a1a; padding: 10px; border-radius: 10px; font-size: 0.85rem; color: var(--dim); margin-bottom: 15px; border: 1px solid #222; }

        /* 네비게이션 바 */
        #nav-bar { display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 1px solid var(--border); background: var(--bg); }
        .nav-item { font-size: 0.8rem; font-weight: bold; color: var(--dim); display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: white; border-bottom: 2px solid white; padding-bottom: 5px; }

        /* 뷰 컨테이너 */
        .view { flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; }

        /* 유저 프로필 설정 스타일 */
        .profile-card { background: var(--panel); border-radius: 15px; padding: 25px; border: 1px solid var(--border); max-width: 500px; margin: 0 auto; }
        .user-avatar-main { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #333; margin-bottom: 15px; border: 2px solid var(--accent); }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { font-size: 0.8rem; color: var(--accent); margin-bottom: 8px; display: block; }
        .form-input { width: 100%; background: var(--input); border: 1px solid #333; border-radius: 10px; color: white; padding: 12px; box-sizing: border-box; outline: none; }

        /* 로그인 오버레이 */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }

        /* 공통 버튼 */
        .btn-primary { background: white; color: black; padding: 12px 25px; border-radius: 25px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-secondary { background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; }

        /* 캐릭터 카드/채팅 목록 */
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
        .char-card { background: var(--panel); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .char-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- 1단계: 로그인/회원가입 화면 -->
<div id="auth-overlay">
    <div class="auth-box">
        <h1 style="color:var(--accent)">dreamer.ai</h1>
        <p id="auth-msg" style="font-size:0.9rem; color:var(--dim)">로그인이 필요합니다.</p>
        
        <div id="login-form">
            <input id="login-handle" class="form-input" style="margin-bottom:10px" placeholder="핸들명(아이디)">
            <input type="password" id="login-pw" class="form-input" style="margin-bottom:20px" placeholder="비밀번호">
            <button class="btn-primary" onclick="handleLogin()">로그인</button>
            <button style="margin-top:15px; font-size:0.8rem; color:var(--dim)" onclick="showAuth('signup')">계정이 없으신가요? 가입하기</button>
        </div>

        <div id="signup-form" class="hidden">
            <input id="sign-email" class="form-input" style="margin-bottom:10px" placeholder="지메일 (@gmail.com 필수)">
            <input id="sign-handle" class="form-input" style="margin-bottom:10px" placeholder="사용할 핸들명(아이디)">
            <input type="password" id="sign-pw" class="form-input" style="margin-bottom:20px" placeholder="비밀번호 설정">
            <button class="btn-primary" onclick="handleSignup()">가입하기</button>
            <button style="margin-top:15px; font-size:0.8rem; color:var(--dim)" onclick="showAuth('login')">이미 계정이 있나요? 로그인</button>
        </div>
    </div>
</div>

<!-- 메인 인터페이스 -->
<div id="header-area">
    <div id="site-title">dreamer.ai</div>
    <div id="site-notice">공지: dreamer.ai에 오신 것을 환영합니다. 개인 설정에서 프로필을 꾸며보세요.</div>
</div>

<nav id="nav-bar">
    <div class="nav-item active" onclick="switchTab('chars')">👤 캐릭터</div>
    <div class="nav-item" onclick="switchTab('chats')">💬 대화</div>
    <div class="nav-item" onclick="switchTab('personas')">🎭 페르소나</div>
    <div class="nav-item" onclick="switchTab('api')">🔑 API</div>
    <div class="nav-item" onclick="switchTab('user')">⚙️ 설정</div>
</nav>

<!-- 각 탭별 뷰 -->
<main style="flex:1; overflow:hidden; position:relative;">
    <!-- 캐릭터 탭 -->
    <div id="view-chars" class="view">
        <button class="btn-secondary" onclick="alert('캐릭터 생성 모달 오픈')">+ 새 캐릭터</button>
        <div class="char-grid" style="margin-top:20px;" id="char-list"></div>
    </div>

    <!-- 대화 탭 -->
    <div id="view-chats" class="view hidden">
        <h3>최근 대화 내역</h3>
        <div id="session-list"></div>
    </div>

    <!-- 페르소나 탭 -->
    <div id="view-personas" class="view hidden">
        <button class="btn-secondary">+ 새 페르소나</button>
        <div id="persona-list" style="margin-top:20px;"></div>
    </div>

    <!-- API 설정 탭 -->
    <div id="view-api" class="view hidden">
        <div class="profile-card">
            <label class="form-label">Infermatic API Key</label>
            <input type="password" id="api-key" class="form-input" onchange="saveData()" placeholder="sk-...">
            <button class="btn-primary" style="margin-top:20px" onclick="alert('연동 확인됨')">키 적용 확인</button>
        </div>
    </div>

    <!-- 유저 개인설정 탭 -->
    <div id="view-user" class="view hidden">
        <div class="profile-card" style="text-align:center;">
            <div onclick="document.getElementById('u-file').click()">
                <img id="u-avatar" src="https://via.placeholder.com/100" class="user-avatar-main">
                <input type="file" id="u-file" hidden onchange="uploadUserImg(this)">
            </div>
            
            <div class="form-group">
                <label class="form-label">표시되는 이름</label>
                <input id="u-display-name" class="form-input" onchange="saveData()">
            </div>
            <div class="form-group">
                <label class="form-label">핸들명 (ID)</label>
                <input id="u-handle" class="form-input" disabled style="opacity:0.5">
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호 변경</label>
                <input type="password" id="u-new-pw" class="form-input" placeholder="새 비밀번호">
            </div>
            
            <button class="btn-primary" onclick="saveData()">설정 저장</button>
            <button class="btn-secondary" style="width:100%; margin-top:10px; background:#8b0000;" onclick="handleLogout()">로그아웃</button>
            
            <hr style="border:0.1px solid #222; margin:30px 0;">
            <div style="font-size:0.75rem; color:var(--dim)">데이터 동기화용 코드</div>
            <button class="btn-secondary" style="width:100%; margin-top:10px;" onclick="exportSyncData()">백업 코드 복사하기</button>
        </div>
    </div>
</main>

<script>
    // --- 데이터 엔진 ---
    let db = JSON.parse(localStorage.getItem('dreamer_cloud_db')) || {
        users: {}, // {handle: {pw, email, name, avatar}}
        currentUser: null,
        chars: [], sessions: [], personas: [], apiKey: ""
    };

    function saveData() {
        if(db.currentUser) {
            const user = db.users[db.currentUser];
            user.name = document.getElementById('u-display-name').value;
            if(document.getElementById('u-new-pw').value) user.pw = document.getElementById('u-new-pw').value;
            user.avatar = document.getElementById('u-avatar').src;
        }
        db.apiKey = document.getElementById('api-key').value;
        localStorage.setItem('dreamer_cloud_db', JSON.stringify(db));
    }

    // --- 인증 로직 ---
    function showAuth(type) {
        document.getElementById('login-form').classList.toggle('hidden', type !== 'login');
        document.getElementById('signup-form').classList.toggle('hidden', type !== 'signup');
    }

    function handleSignup() {
        const email = document.getElementById('sign-email').value;
        const handle = document.getElementById('sign-handle').value;
        const pw = document.getElementById('sign-pw').value;

        if(!email.endsWith('@gmail.com')) return alert("지메일(@gmail.com)만 가입 가능합니다.");
        if(db.users[handle]) return alert("이미 존재하는 핸들명입니다.");
        if(!handle || !pw) return alert("모든 칸을 채워주세요.");

        db.users[handle] = { email, pw, name: handle, avatar: "" };
        alert("가입 성공! 로그인 해주세요.");
        showAuth('login');
        saveData();
    }

    function handleLogin() {
        const handle = document.getElementById('login-handle').value;
        const pw = document.getElementById('login-pw').value;

        if(db.users[handle] && db.users[handle].pw === pw) {
            db.currentUser = handle;
            document.getElementById('auth-overlay').classList.add('hidden');
            initUser();
            saveData();
        } else {
            alert("아이디 또는 비밀번호가 틀립니다.");
        }
    }

    function handleLogout() {
        db.currentUser = null;
        localStorage.setItem('dreamer_cloud_db', JSON.stringify(db));
        location.reload();
    }

    // --- 유저 설정 로직 ---
    function initUser() {
        const user = db.users[db.currentUser];
        document.getElementById('u-display-name').value = user.name;
        document.getElementById('u-handle').value = db.currentUser;
        if(user.avatar) document.getElementById('u-avatar').src = user.avatar;
        document.getElementById('api-key').value = db.apiKey;
    }

    function uploadUserImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('u-avatar').src = e.target.result;
            saveData();
        };
        reader.readAsDataURL(input.files[0]);
    }

    // --- 데이터 이동 (Sync) ---
    function exportSyncData() {
        const dataStr = btoa(JSON.stringify(db)); // 베이스64 인코딩
        navigator.clipboard.writeText(dataStr);
        alert("전체 데이터가 복사되었습니다! 다른 주소의 사이트 설정 탭에서 붙여넣으세요.");
    }

    // --- 탭 전환 ---
    function switchTab(tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + tabId).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // 초기 실행
    if(db.currentUser) {
        document.getElementById('auth-overlay').classList.add('hidden');
        initUser();
    }
</script>
</body>
</html>
