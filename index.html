<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat Hub</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #bb86fc; --text: #e0e0e0; --dim: #9e9e9e; --border: #333; --input: #262626; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        button { cursor: pointer; border: none; background: none; color: white; transition: 0.2s; }
        .hidden { display: none !important; }
        .tab-header { display: flex; padding: 15px 20px; gap: 20px; border-bottom: 1px solid var(--border); background: var(--bg); z-index: 10; }
        .tab-btn { font-size: 0.9rem; color: var(--dim); font-weight: bold; padding-bottom: 5px; }
        .tab-btn.active { color: white; border-bottom: 2px solid white; }
        .section { padding: 20px; flex: 1; overflow-y: auto; }
        .list-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #222; }
        .list-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #333; }
        #chat-view { height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
        #chat-header { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 25px; }
        .msg-wrapper { display: flex; flex-direction: column; }
        .msg-header { font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .msg-content { font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; }
        .swipe-control { display: flex; align-items: center; gap: 10px; margin-top: 8px; color: var(--dim); font-size: 0.8rem; }
        #input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #userInput { flex: 1; background: #262626; border: none; padding: 12px 20px; border-radius: 25px; color: white; outline: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .cai-textarea { width: 100%; background: #262626; border: 1px solid #444; border-radius: 12px; color: white; padding: 15px; min-height: 80px; resize: none; outline: none; box-sizing: border-box; }
        .save-btn { background: white; color: black; width: 100%; padding: 12px; border-radius: 25px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="tab-header">
        <div class="tab-btn active" onclick="switchTab('chars')">Characters</div>
        <div class="tab-btn" onclick="switchTab('personas')">Personas</div>
        <div class="tab-btn" onclick="switchTab('settings')">Settings</div>
    </div>
    <div id="tab-chars" class="section">
        <button onclick="openCharModal()" style="color:var(--accent); margin-bottom:15px;">+ Create Character</button>
        <div id="char-list"></div>
        <h3 style="margin-top:30px;">Recent Chats</h3>
        <div id="session-list"></div>
    </div>
    <div id="tab-personas" class="section hidden">
        <button onclick="openPersonaModal()" style="color:var(--accent); margin-bottom:15px;">+ Create Persona</button>
        <div id="persona-list"></div>
    </div>
    <div id="tab-settings" class="section hidden">
        <h3>API Configuration</h3>
        <input type="password" id="api-key-input" class="cai-textarea" style="min-height:auto; margin-bottom:10px;" placeholder="Infermatic API Key" onchange="saveSettings()">
        <select id="model-select" class="cai-textarea" style="min-height:auto;" onchange="saveSettings()">
            <option value="midnight-miqu-70b-v1.5">Midnight Miqu 70B</option>
            <option value="llama-3.1-70b-instruct">Llama 3.1 70B</option>
        </select>
    </div>
</div>

<div id="chat-view" class="hidden">
    <header id="chat-header">
        <button onclick="exitChat()">←</button>
        <div id="h-name" style="font-weight:bold;"></div>
        <button onclick="deleteActiveSession()" style="color:red; font-size:0.8rem;">Delete</button>
    </header>
    <div id="chat-messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key=='Enter') send()">
        <button onclick="send()" style="color:var(--accent); font-weight:bold;">Send</button>
    </div>
</div>

<!-- 캐릭터 생성 모달 -->
<div id="char-modal" class="modal">
    <button onclick="closeModal()">✕ Close</button>
    <h2>Create Character</h2>
    <div onclick="document.getElementById('c-file').click()" style="text-align:center; margin-bottom:15px;">
        <img id="c-prev" src="https://via.placeholder.com/100" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #444;">
        <input type="file" id="c-file" hidden onchange="handleImg(this, 'c-prev')">
    </div>
    <input id="c-name" class="cai-textarea" style="min-height:auto; margin-bottom:10px;" placeholder="Name (Max 25)" maxlength="25">
    <textarea id="c-desc" class="cai-textarea" placeholder="Prompt (Character Logic)"></textarea>
    <textarea id="c-greet" class="cai-textarea" style="margin-top:10px;" placeholder="Greeting Message"></textarea>
    <button onclick="saveChar()" class="save-btn">Save Character</button>
</div>

<!-- 페르소나 생성 모달 -->
<div id="persona-modal" class="modal">
    <button onclick="closeModal()">✕ Close</button>
    <h2>Create Persona</h2>
    <input id="p-name" class="cai-textarea" style="min-height:auto; margin-bottom:10px;" placeholder="Persona Name" maxlength="25">
    <textarea id="p-desc" class="cai-textarea" placeholder="Background Info"></textarea>
    <div style="margin-top:10px;"><input type="checkbox" id="p-default"> <label>Make Default</label></div>
    <button onclick="savePersona()" class="save-btn">Save Persona</button>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('ghost_final_v1')) || {
        apiKey: "", selectedModel: "midnight-miqu-70b-v1.5", characters: [], personas: [], sessions: [], activeSid: null
    };
    function save() { localStorage.setItem('ghost_final_v1', JSON.stringify(state)); }

    function switchTab(t) {
        ['chars', 'personas', 'settings'].forEach(tab => document.getElementById('tab-'+tab).classList.toggle('hidden', tab !== t));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(t)));
        renderMain();
    }

    function handleImg(input, prevId) {
        const reader = new FileReader();
        reader.onload = (e) => document.getElementById(prevId).src = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    function saveSettings() {
        state.apiKey = document.getElementById('api-key-input').value;
        state.selectedModel = document.getElementById('model-select').value;
        save();
    }

    function saveChar() {
        const c = { id: Date.now(), name: document.getElementById('c-name').value, prompt: document.getElementById('c-desc').value, greeting: document.getElementById('c-greet').value, avatar: document.getElementById('c-prev').src };
        state.characters.push(c); save(); closeModal(); renderMain();
    }

    function savePersona() {
        const p = { id: Date.now(), name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value, isDefault: document.getElementById('p-default').checked };
        if(p.isDefault) state.personas.forEach(x => x.isDefault = false);
        state.personas.push(p); save(); closeModal(); renderMain();
    }

    function editMsg(mid) {
        const s = state.sessions.find(x => x.id == state.activeSid);
        const m = s.history.find(x => x.id == mid);
        const nextText = prompt("Edit message:", m.variants[m.cIdx]);
        if(nextText !== null) { m.variants[m.cIdx] = nextText; save(); renderMessages(); }
    }

    async function regenerate(mid) {
        const s = state.sessions.find(x => x.id == state.activeSid);
        const char = state.characters.find(c => c.id == s.charId);
        const m = s.history.find(x => x.id == mid);
        const idx = s.history.indexOf(m);
        const context = s.history.slice(0, idx).map(x => ({ role: x.role, content: x.variants[x.cIdx] }));

        m.variants.push("..."); m.cIdx = m.variants.length - 1;
        renderMessages();

        const res = await fetch("https://api.infermatic.ai/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${state.apiKey}` },
            body: JSON.stringify({ model: state.selectedModel, messages: context, temperature: 0.8, max_tokens: 350 })
        });
        const data = await res.json();
        m.variants[m.cIdx] = data.choices[0].message.content;
        save(); renderMessages();
    }

    function switchVariant(mid, dir) {
        const s = state.sessions.find(x => x.id == state.activeSid);
        const m = s.history.find(x => x.id == mid);
        m.cIdx = Math.max(0, Math.min(m.variants.length-1, m.cIdx + dir));
        renderMessages();
    }

    function startNewChat(cid) {
        const c = state.characters.find(x => x.id == cid);
        const p = state.personas.find(x => x.isDefault) || state.personas[0] || {name:"User", desc:""};
        const s = { id: Date.now(), charId: cid, personaId: p.id, history: [
            { role: "system", variants: [`${c.prompt}\n[USER]: ${p.name} - ${p.desc}`], cIdx: 0, id: 1 },
            { role: "assistant", variants: [c.greeting || "Hello."], cIdx: 0, id: 2 }
        ]};
        state.sessions.push(s); state.activeSid = s.id; save(); resumeChat(s.id);
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim(); if(!text || !state.apiKey) return;
        const s = state.sessions.find(x => x.id == state.activeSid);
        
        s.history.push({ role: "user", variants: [text], cIdx: 0, id: Date.now() });
        input.value = ""; 
        const aiId = Date.now()+1;
        s.history.push({ role: "assistant", variants: ["..."], cIdx: 0, id: aiId });
        renderMessages();
        await regenerate(aiId);
    }

    function renderMessages() {
        const s = state.sessions.find(x => x.id == state.activeSid);
        const char = state.characters.find(c => c.id == s.charId);
        const p = state.personas.find(x => x.id == s.personaId) || {name: "User"};
        document.getElementById('chat-messages').innerHTML = s.history.filter(m => m.role !== 'system').map(m => `
            <div class="msg-wrapper">
                <div class="msg-header">
                    <span style="color:${m.role=='user'?'#9e9e9e':'white'}">${m.role=='user'?p.name:char.name}</span>
                    <button class="edit-btn" onclick="editMsg(${m.id})">✎</button>
                </div>
                <div class="msg-content">${m.variants[m.cIdx]}</div>
                ${m.role=='assistant' ? `
                    <div class="swipe-control">
                        <button onclick="switchVariant(${m.id}, -1)">〈</button>
                        <span>${m.cIdx+1}/${m.variants.length}</span>
                        <button onclick="switchVariant(${m.id}, 1)">〉</button>
                        <button onclick="regenerate(${m.id})">↻</button>
                    </div>` : ''}
            </div>`).join('');
        document.getElementById('chat-messages').scrollTop = 99999;
    }

    function renderMain() {
        document.getElementById('char-list').innerHTML = state.characters.map(c => `<div class="list-item" onclick="startNewChat(${c.id})"><img src="${c.avatar}" class="list-avatar"><b>${c.name}</b></div>`).join('');
        document.getElementById('persona-list').innerHTML = state.personas.map(p => `<div class="list-item"><b>${p.name} ${p.isDefault?'(Def)':''}</b></div>`).join('');
        document.getElementById('session-list').innerHTML = state.sessions.map(s => `<div class="list-item" onclick="resumeChat(${s.id})">Chat with ${state.characters.find(c=>c.id==s.charId)?.name}</div>`).join('');
        document.getElementById('api-key-input').value = state.apiKey;
        document.getElementById('model-select').value = state.selectedModel;
    }

    function openCharModal() { document.getElementById('char-modal').style.display='block'; }
    function openPersonaModal() { document.getElementById('persona-modal').style.display='block'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    function exitChat() { document.getElementById('chat-view').classList.add('hidden'); renderMain(); }
    function resumeChat(sid) { state.activeSid = sid; document.getElementById('chat-view').classList.remove('hidden'); renderMessages(); }
    function deleteActiveSession() { if(confirm("Delete this chat?")) { state.sessions = state.sessions.filter(s=>s.id!==state.activeSid); save(); exitChat(); } }

    renderMain();
</script>
</body>
</html>
