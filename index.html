<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 아이폰 Safari 최적화 (Safe Area 및 확대 방지) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <link rel="stylesheet" href="style.css">
    <!-- 아이콘 폰트 (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- [1] 로그인 화면 (기본적으로 가려져 있음, JS로 제어) -->
    <div id="login-screen" class="screen-overlay hidden">
        <div class="login-container">
            <h1 class="logo">dreamer.ai</h1>
            <p class="subtitle">로그인이 필요합니다.</p>
            <div class="input-group">
                <input type="text" id="login-id" placeholder="핸들명(아이디) 또는 이메일">
            </div>
            <div class="input-group">
                <input type="password" id="login-pw" placeholder="비밀번호">
            </div>
            <button class="primary-btn" onclick="login()">로그인</button>
            <div class="login-links">
                <span class="link" onclick="showRegister()">계정이 없으신가요? 가입하기</span>
                <span class="link" onclick="showFindPassword()">비밀번호 찾기</span>
            </div>
        </div>
    </div>

    <!-- [2] 사이드바 (모든 화면에서 메인으로 갈 수 있음) -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <ul class="sidebar-menu">
            <li onclick="switchTab('character')"><i class="fas fa-users"></i> 캐릭터 리스트</li>
            <!-- 기존 '대화' 목록을 사이드바로 이동 -->
            <li onclick="showChatList()"><i class="fas fa-comments"></i> 내 대화 목록</li> 
            <li onclick="switchTab('persona')"><i class="fas fa-id-badge"></i> 페르소나</li>
            <li onclick="switchTab('api')"><i class="fas fa-key"></i> API 설정</li>
            <li onclick="switchTab('settings')"><i class="fas fa-cog"></i> 유저 설정</li>
            <li class="logout-menu" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 로그아웃</li>
        </ul>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- [3] 메인 어플리케이션 화면 -->
    <div id="app-content" class="app-content">
        <!-- 상단 헤더 -->
        <header class="app-header">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h1 class="logo header-logo">dreamer.ai</h1>
            <div style="width: 24px;"></div> <!-- 중앙 정렬을 위한 빈 공간 -->
        </header>

        <!-- 공지사항 (User Manual - 관리자만 수정 가능) -->
        <div class="notice-bar">
            <div class="notice-content">
                <span class="notice-tag">User Manual</span>
                <span class="notice-text">dreamer.ai에 오신 것을 환영합니다!</span>
            </div>
            <button class="edit-notice-btn" onclick="editNotice()"><i class="fas fa-edit"></i></button>
        </div>

        <!-- 메인 네비게이션 탭 (대화 -> 장면으로 변경) -->
        <nav class="main-tabs">
            <button class="tab-btn active" onclick="switchTab('character')" data-target="character">캐릭터</button>
            <button class="tab-btn" onclick="switchTab('scene')" data-target="scene">장면</button>
            <button class="tab-btn" onclick="switchTab('persona')" data-target="persona">페르소나</button>
            <button class="tab-btn" onclick="switchTab('api')" data-target="api">API</button>
            <button class="tab-btn" onclick="switchTab('settings')" data-target="settings">설정</button>
        </nav>

        <!-- 탭별 컨텐츠 영역 (스크롤 가능 영역) -->
        <main class="tab-content-area">
            <div id="tab-character" class="tab-pane active">
                <button class="create-btn">+ 새 캐릭터 만들기</button>
                <!-- 캐릭터 폴더 및 리스트가 들어갈 자리 -->
                <div id="character-list"></div>
            </div>
            
            <div id="tab-scene" class="tab-pane">
                <h2>저장된 장면(Scene)</h2>
                <p class="empty-state">아직 저장된 장면이 없습니다.</p>
                <!-- 보기 전용 장면 리스트가 들어갈 자리 -->
            </div>

            <!-- 페르소나, API, 설정 탭 내용 생략 (다음 단계에서 디테일 구현) -->
            <div id="tab-persona" class="tab-pane"><button class="create-btn">+ 새 페르소나 만들기</button></div>
            <div id="tab-api" class="tab-pane"><h2>API 설정</h2></div>
            <div id="tab-settings" class="tab-pane"><h2>유저 설정</h2></div>
        </main>
    </div>

    <!-- [4] 우측 하단 플로팅 버그 제보 버튼 -->
    <button class="bug-report-btn" onclick="openBugReport()">
        <i class="fas fa-bug"></i>
    </button>

    <script src="app.js"></script>
</body>
</html>
