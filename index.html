<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 기기(아이폰 등) 최적화: 확대 방지 및 Safe Area 적용 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <!-- 외부 CSS 파일 연결 -->
    <link rel="stylesheet" href="style.css">
    <!-- 아이콘 사용을 위한 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- [1] 로그인 & 회원가입 화면 (별도 레이어) -->
    <div id="login-screen" class="screen-overlay">
        <div class="login-container">
            <h1 class="logo">dreamer.ai</h1>
            <p class="subtitle">로그인이 필요합니다.</p>
            <div class="input-group">
                <input type="text" id="login-id" placeholder="핸들명(아이디)">
                <input type="password" id="login-pw" placeholder="비밀번호">
            </div>
            <button class="primary-btn" id="btn-login">로그인</button>
            <div class="login-links">
                <span class="link" id="link-register">가입하기</span>
                <span class="link" id="link-find-pw">비밀번호 찾기</span>
            </div>
        </div>
    </div>
    
    <!-- [2] 전역 사이드바 (메뉴 네비게이션) -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" id="btn-close-sidebar"><i class="fas fa-times"></i></button>
        </div>
        <ul class="sidebar-menu">
            <li data-target="character"><i class="fas fa-users"></i> 캐릭터 리스트</li>
            <!-- 기존 '대화' 메뉴를 사이드바로 이동 -->
            <li data-target="chat-history"><i class="fas fa-comments"></i> 최근 대화 목록</li>
            <li data-target="persona"><i class="fas fa-id-badge"></i> 페르소나</li>
            <li data-target="api"><i class="fas fa-key"></i> API 설정</li>
            <li data-target="settings"><i class="fas fa-cog"></i> 유저 설정</li>
            <li class="logout-menu" id="btn-logout"><i class="fas fa-sign-out-alt"></i> 로그아웃</li>
        </ul>
    </div>
    <!-- 사이드바 열릴 때 배경 어둡게 하는 오버레이 -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- [3] 메인 앱 인터페이스 -->
    <div id="app-content" class="app-content">
        <!-- 상단 헤더 -->
        <header class="app-header">
            <button class="menu-btn" id="btn-open-sidebar"><i class="fas fa-bars"></i></button>
            <h1 class="logo header-logo">dreamer.ai</h1>
            <div style="width: 24px;"></div> <!-- 중앙 정렬 맞춤용 공백 -->
        </header>

        <!-- 관리자 전용 공지사항 (User Manual) -->
        <div class="notice-bar">
            <div class="notice-content">
                <span class="notice-tag">User Manual</span>
                <span class="notice-text">dreamer.ai에 오신 것을 환영합니다!</span>
            </div>
            <button class="edit-notice-btn" id="btn-edit-notice">Edit</button>
        </div>

        <!-- 5대 핵심 메인 탭 (대화 -> 장면으로 변경됨) -->
        <nav class="main-tabs">
            <button class="tab-btn active" data-tab="character">캐릭터</button>
            <button class="tab-btn" data-tab="scene">장면</button>
            <button class="tab-btn" data-tab="persona">페르소나</button>
            <button class="tab-btn" data-tab="api">API</button>
            <button class="tab-btn" data-tab="settings">설정</button>
        </nav>

        <!-- 탭 하단 본문 (스크롤 가능 영역) -->
        <main class="tab-content-area">
            
            <!-- 캐릭터 탭 내용 -->
            <div id="tab-character" class="tab-pane active">
                <button class="create-btn">+ 새 캐릭터 만들기</button>
                <div class="content-list" id="character-list-container">
                    <!-- 캐릭터 리스트가 여기에 생성됨 -->
                </div>
            </div>

            <!-- 장면 탭 내용 (새로 추가됨) -->
            <div id="tab-scene" class="tab-pane">
                <h3 class="section-title">저장된 장면(Scene)</h3>
                <div class="content-list" id="scene-list-container">
                    <p class="empty-text">저장된 장면이 없습니다.</p>
                </div>
            </div>

            <!-- 페르소나 탭 내용 -->
            <div id="tab-persona" class="tab-pane">
                <button class="create-btn">+ 새 페르소나 만들기</button>
                <div class="content-list" id="persona-list-container"></div>
            </div>

            <!-- API 탭 내용 -->
            <div id="tab-api" class="tab-pane">
                <div class="api-container">
                    <span class="notice-tag">Infermatic API Key</span>
                    <input type="password" id="api-key-input" placeholder="sk-...">
                    <button class="link-btn" id="btn-check-api">연동 상태 확인</button>
                </div>
            </div>

            <!-- 유저 설정 탭 내용 -->
            <div id="tab-settings" class="tab-pane">
                <div class="settings-profile">
                    <div class="profile-img-placeholder"><i class="fas fa-question"></i></div>
                    <button class="sub-btn">데이터 백업 코드 복사</button>
                    <button class="sub-btn danger-text" id="btn-settings-logout">로그아웃</button>
                </div>
            </div>

        </main>
    </div>

    <!-- [4] 우측 하단 플로팅 버그 제보 버튼 -->
    <button class="bug-report-btn" id="btn-bug-report">
        <i class="fas fa-bug"></i>
    </button>

    <!-- 외부 JS 파일 연결 (이후 단계에서 작성) -->
    <script src="app.js"></script>
</body>
</html>
<style>
    /* ================= 1. 전역 변수 & 기본 초기화 ================= */
    :root {
        --bg-main: #0a0a0a;         /* 최하단 검은 배경 */
        --bg-surface: #151515;      /* 카드, 탭 배경 (딥 그레이) */
        --bg-surface-light: #202020;/* 인풋박스 등 살짝 밝은 배경 */
        --accent-color: #d8b4fe;    /* dreamer.ai 연보라색 포인트 */
        --text-primary: #ffffff;    /* 기본 텍스트 (흰색) */
        --text-secondary: #9ca3af;  /* 보조 텍스트 (회색) */
        --border-color: #262626;    /* 선 색상 */
        --danger-color: #ff6b6b;    /* 경고/로그아웃 색상 */
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent; /* 모바일 터치 시 회색 음영 제거 */
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        overflow: hidden; /* 모바일에서 전체 화면 밀림 방지 */
    }

    /* 아이폰 Safe Area 적용 (노치 및 하단 바 침범 방지) */
    .app-content {
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
    }

    /* ================= 2. 헤더 & 공지사항 ================= */
    .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
        background-color: var(--bg-main);
    }

    .logo {
        color: var(--accent-color);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    .menu-btn {
        background: none;
        border: none;
        color: var(--text-primary);
        font-size: 20px;
        cursor: pointer;
    }

    .notice-bar {
        margin: 0 16px 16px 16px;
        padding: 16px;
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .notice-tag {
        display: block;
        color: var(--text-secondary);
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 8px;
    }

    .notice-text {
        color: var(--text-primary);
        font-size: 14px;
        line-height: 1.4;
    }

    .edit-notice-btn {
        background: none;
        border: none;
        color: var(--accent-color);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
    }

    /* ================= 3. 메인 탭 네비게이션 ================= */
    .main-tabs {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid var(--border-color);
        padding: 0 16px;
        flex-shrink: 0;
    }

    .tab-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        padding: 12px 0;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        flex-grow: 1;
        position: relative;
        transition: color 0.2s;
    }

    .tab-btn.active {
        color: var(--text-primary);
    }

    .tab-btn.active::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 15%;
        width: 70%;
        height: 3px;
        background-color: var(--accent-color);
        border-radius: 3px 3px 0 0;
    }

    /* ================= 4. 탭 콘텐츠 영역 (스크롤) ================= */
    .tab-content-area {
        flex: 1;
        overflow-y: auto;
        padding: 24px 16px;
    }

    .tab-pane {
        display: none;
    }
    
    .tab-pane.active {
        display: block;
        animation: fadeIn 0.2s ease-in-out;
    }
    
    @keyframes fadeIn { 
        from { opacity: 0; } 
        to { opacity: 1; } 
    }

    .create-btn {
        width: 100%;
        background-color: var(--bg-surface);
        color: var(--accent-color);
        border: 1px solid var(--border-color);
        padding: 16px;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }
    
    .create-btn:hover { background-color: var(--bg-surface-light); }

    .section-title { font-size: 18px; margin-bottom: 16px; }
    .empty-text { color: var(--text-secondary); font-size: 14px; }

    /* API & 세팅 탭 전용 스타일 */
    .api-container {
        background-color: var(--bg-surface);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
    }
    
    .api-container input {
        width: 100%;
        padding: 14px;
        margin: 12px 0;
        background-color: var(--bg-surface-light);
        border: none;
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 14px;
    }
    
    .link-btn {
        background: none;
        border: none;
        color: var(--accent-color);
        font-size: 13px;
        cursor: pointer;
    }

    .settings-profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
    }
    
    .profile-img-placeholder {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid var(--accent-color);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        color: var(--accent-color);
        margin-bottom: 10px;
    }
    
    .sub-btn {
        width: 100%;
        padding: 16px;
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 14px;
        cursor: pointer;
    }
    
    .danger-text { color: var(--danger-color); border-color: rgba(255, 107, 107, 0.3); }

    /* ================= 5. 사이드바 (Sidebar) ================= */
    .sidebar {
        position: fixed;
        top: 0;
        left: -300px;
        width: 280px;
        height: 100%;
        background-color: var(--bg-surface);
        z-index: 1000;
        transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top);
    }
    
    .sidebar.open { left: 0; }
    
    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        border-bottom: 1px solid var(--border-color);
    }
    
    .sidebar-header h2 { font-size: 18px; color: var(--text-primary); }
    .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }
    
    .sidebar-menu { list-style: none; padding: 10px 0; overflow-y: auto; }
    .sidebar-menu li {
        padding: 16px 20px;
        font-size: 15px;
        color: var(--text-primary);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 16px;
    }
    .sidebar-menu li:hover { background-color: var(--bg-surface-light); }
    .sidebar-menu i { width: 20px; text-align: center; color: var(--text-secondary); }
    .sidebar-menu .logout-menu { color: var(--danger-color); margin-top: 20px; }

    .sidebar-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(2px);
        z-index: 999;
        opacity: 0; visibility: hidden;
        transition: all 0.3s;
    }
    
    .sidebar-overlay.show { opacity: 1; visibility: visible; }

    /* ================= 6. 플로팅 버그 제보 버튼 ================= */
    .bug-report-btn {
        position: fixed;
        bottom: calc(30px + env(safe-area-inset-bottom));
        right: 20px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background-color: var(--bg-surface);
        color: var(--accent-color);
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        font-size: 20px;
        cursor: pointer;
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* ================= 7. 로그인 화면 오버레이 ================= */
    .screen-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--bg-main);
        z-index: 2000;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        transition: opacity 0.3s, visibility 0.3s;
    }
    
    .screen-overlay.hidden { opacity: 0; visibility: hidden; }

    .login-container {
        width: 100%;
        max-width: 400px;
        background-color: var(--bg-surface);
        padding: 40px 24px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        text-align: center;
    }
    
    .login-container .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
    
    .input-group input {
        width: 100%;
        padding: 16px;
        margin-bottom: 16px;
        background-color: var(--bg-main);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 15px;
    }
    
    .primary-btn {
        width: 100%;
        padding: 16px;
        background-color: var(--text-primary);
        color: #000000;
        border: none;
        border-radius: 30px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        margin-bottom: 24px;
    }
    
    .login-links {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: var(--text-secondary);
    }
    
    .login-links .link { cursor: pointer; }
</style>
<script>
    // ================= [1] 로그인 화면 UI 제어 =================
    const loginScreen = document.getElementById('login-screen');
    const btnLogin = document.getElementById('btn-login');
    const linkRegister = document.getElementById('link-register');
    const linkFindPw = document.getElementById('link-find-pw');

    // 1. 로그인 버튼 클릭 시
    btnLogin.addEventListener('click', function() {
        const idInput = document.getElementById('login-id').value.trim();
        const pwInput = document.getElementById('login-pw').value.trim();

        // 빈칸 검사
        if(idInput === '' || pwInput === '') {
            alert('핸들명(또는 이메일)과 비밀번호를 모두 입력해주세요.');
            return;
        }

        // 로그인 성공 처리 (화면을 서서히 숨김)
        loginScreen.classList.add('hidden');
        
        // (참고) 실제 로그인 정보를 저장하는 세션 로직은 추후 백엔드/스토리지 연동 시 추가됩니다.
    });

    // 2. 가입하기 버튼 클릭 시
    linkRegister.addEventListener('click', function() {
        alert('회원가입 창이 열립니다.\n(기획서 반영: @gmail.com 계정만 가입 가능하도록 연결됩니다.)');
        // 향후 회원가입 모달창을 띄우는 함수로 교체됩니다.
    });

    // 3. 비밀번호 찾기 버튼 클릭 시
    linkFindPw.addEventListener('click', function() {
        alert('비밀번호 찾기 창이 열립니다.\n(기획서 반영: 가입된 이메일로 6자리 인증 코드가 발송됩니다.)');
        // 향후 인증번호 입력 모달창을 띄우는 함수로 교체됩니다.
    });

    // ================= [2] 사이드바 및 메인 탭 작동 코드 =================
    // 뼈대가 완벽하게 돌아가도록 네비게이션 기능도 함께 추가해 드립니다.

    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const btnOpenSidebar = document.getElementById('btn-open-sidebar');
    const btnCloseSidebar = document.getElementById('btn-close-sidebar');

    // 사이드바 열기/닫기 함수
    function toggleSidebar() {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('show');
    }

    btnOpenSidebar.addEventListener('click', toggleSidebar);
    btnCloseSidebar.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    // 탭 전환 로직
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabPanes = document.querySelectorAll('.tab-pane');

    tabBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            // 모든 탭 버튼 비활성화
            tabBtns.forEach(b => b.classList.remove('active'));
            // 모든 탭 내용 숨기기
            tabPanes.forEach(p => p.classList.remove('active'));

            // 클릭한 탭 활성화
            this.classList.add('active');
            const targetId = 'tab-' + this.getAttribute('data-tab');
            document.getElementById(targetId).classList.add('active');
        });
    });

    // 사이드바 메뉴 클릭 시 해당 탭으로 이동 및 사이드바 닫기
    const sidebarMenuItems = document.querySelectorAll('.sidebar-menu li[data-target]');
    sidebarMenuItems.forEach(item => {
        item.addEventListener('click', function() {
            const target = this.getAttribute('data-target');
            
            if(target === 'chat-history') {
                alert("최근 대화 목록이 열립니다."); // 임시 대화 목록
            } else {
                // 상단 탭 버튼 클릭 효과 트리거
                const targetTabBtn = document.querySelector(`.tab-btn[data-tab="${target}"]`);
                if(targetTabBtn) targetTabBtn.click();
            }
            toggleSidebar(); // 사이드바 닫기
        });
    });

    // 로그아웃 버튼 (사이드바 및 설정 탭)
    const btnLogout = document.getElementById('btn-logout');
    const btnSettingsLogout = document.getElementById('btn-settings-logout');

    function executeLogout() {
        alert("모든 기기에서 로그아웃 되었습니다. (세션 파기)");
        loginScreen.classList.remove('hidden'); // 로그인 화면 다시 띄우기
        if(sidebar.classList.contains('open')) toggleSidebar();
    }

    btnLogout.addEventListener('click', executeLogout);
    if(btnSettingsLogout) btnSettingsLogout.addEventListener('click', executeLogout);

</script>

<!-- [추가 1] 캐릭터 생성 풀스크린 에디터 -->
<div id="character-editor-screen" class="editor-screen hidden">
    <header class="editor-header">
        <button class="close-editor-btn" onclick="closeEditor('character')"><i class="fas fa-times"></i></button>
        <strong style="font-size: 16px;">새 캐릭터 만들기</strong>
        <button class="save-editor-btn" onclick="saveCharacter()">저장</button>
    </header>
    <div class="editor-body">
        <div class="form-group">
            <label>이름 (필수)</label>
            <input type="text" id="edit-char-name" maxlength="25" placeholder="캐릭터의 이름을 입력하세요.">
            <div class="char-count">0 / 25</div>
        </div>
        <div class="form-group">
            <label>한마디 (Slogan)</label>
            <input type="text" id="edit-char-sub" maxlength="40" placeholder="캐릭터를 한 문장으로 표현하세요.">
            <div class="char-count">0 / 40</div>
        </div>
        <div class="form-group">
            <label>관계 정의 (필수)</label>
            <select id="edit-char-relation">
                <option value="친구">친구</option>
                <option value="연인">연인</option>
                <option value="동료">동료</option>
                <option value="혐관">혐관(혐오 관계)</option>
                <option value="가족">가족</option>
                <option value="기타">기타</option>
            </select>
        </div>
        <div class="form-group">
            <label>언어 설정 (필수)</label>
            <select id="edit-char-lang">
                <option value="English" selected>English</option>
                <option value="Korean">Korean</option>
            </select>
        </div>
        <div class="form-group">
            <label>인사말 (첫 메시지)</label>
            <textarea id="edit-char-greeting" maxlength="4096" rows="4" placeholder="대화가 시작될 때 캐릭터가 건넬 첫 마디입니다."></textarea>
            <div class="char-count">0 / 4096</div>
        </div>
        <div class="form-group">
            <label>기본 프로필 & 성격</label>
            <textarea id="edit-char-profile" rows="4" placeholder="캐릭터의 상세 배경과 성격을 입력하세요."></textarea>
        </div>
        <div class="form-group">
            <label>외관 (Appearance)</label>
            <textarea id="edit-char-appearance" rows="3" placeholder="눈색, 머리색, 체형, 옷차림 등"></textarea>
        </div>
    </div>
</div>

<!-- [추가 2] 페르소나 생성 풀스크린 에디터 -->
<div id="persona-editor-screen" class="editor-screen hidden">
    <header class="editor-header">
        <button class="close-editor-btn" onclick="closeEditor('persona')"><i class="fas fa-times"></i></button>
        <strong style="font-size: 16px;">새 페르소나 만들기</strong>
        <button class="save-editor-btn" onclick="savePersona()">저장</button>
    </header>
    <div class="editor-body">
        <div class="form-group">
            <label>페르소나 이름 (필수)</label>
            <input type="text" id="edit-persona-name" maxlength="25" placeholder="대화에 사용할 당신의 이름">
            <div class="char-count">0 / 25</div>
        </div>
        <div class="form-group">
            <label>성별 / 나이</label>
            <input type="text" id="edit-persona-info" maxlength="40" placeholder="예: 남성 / 20대 후반">
            <div class="char-count">0 / 40</div>
        </div>
        <div class="form-group">
            <label>나의 외관 특징</label>
            <textarea id="edit-persona-appearance" rows="3" placeholder="캐릭터가 인식할 나의 외모적 특징을 적어주세요."></textarea>
        </div>
        <div class="form-group">
            <label>배경 및 성향</label>
            <textarea id="edit-persona-bg" rows="4" placeholder="나의 직업, 성격, 취향 등 캐릭터와의 대화에 반영될 설정"></textarea>
        </div>
    </div>
</div>

<!-- [추가 3] 디자인(CSS) 및 스크롤 기능 추가 -->
<style>
    /* 에디터 화면 전체 영역 (스크롤이 가능하도록 설정) */
    .editor-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--bg-main);
        z-index: 7000;
        display: flex; flex-direction: column;
        transition: opacity 0.3s, visibility 0.3s;
    }
    .editor-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    
    /* 에디터 상단 헤더 */
    .editor-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 20px;
        background-color: var(--bg-main);
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
        padding-top: calc(16px + env(safe-area-inset-top)); /* 노치 대응 */
    }
    
    .close-editor-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    .save-editor-btn { background: none; border: none; color: var(--accent-color); font-weight: bold; font-size: 16px; cursor: pointer; }

    /* ★스크롤이 작동하는 핵심 컨텐츠 영역★ */
    .editor-body {
        flex: 1;
        overflow-y: auto; /* 내용이 길면 스크롤 생성 */
        padding: 24px 20px;
        padding-bottom: calc(40px + env(safe-area-inset-bottom)); /* 하단 여백 */
    }

    /* 폼 입력창 스타일 */
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; color: var(--accent-color); font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .form-group input, .form-group textarea, .form-group select {
        width: 100%; background: var(--bg-surface); border: 1px solid var(--border-color);
        border-radius: 12px; padding: 14px; color: white; font-size: 15px; outline: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent-color); }
    .char-count { font-size: 11px; color: var(--text-secondary); text-align: right; margin-top: 4px; }
</style>

<!-- [추가 4] 동작 스크립트 (이벤트 연결) -->
<script>
    // 1. 버튼 찾아서 이벤트 연결하기 (기존 HTML 구조 탐색)
    const btnCreateCharacter = document.querySelector('#tab-character .create-btn');
    const btnCreatePersona = document.querySelector('#tab-persona .create-btn');

    // 캐릭터 생성 버튼 클릭
    if(btnCreateCharacter) {
        btnCreateCharacter.addEventListener('click', function() {
            document.getElementById('character-editor-screen').classList.remove('hidden');
        });
    }

    // 페르소나 생성 버튼 클릭
    if(btnCreatePersona) {
        btnCreatePersona.addEventListener('click', function() {
            document.getElementById('persona-editor-screen').classList.remove('hidden');
        });
    }

    // 2. 에디터 닫기 기능
    function closeEditor(type) {
        if(type === 'character') {
            document.getElementById('character-editor-screen').classList.add('hidden');
        } else if(type === 'persona') {
            document.getElementById('persona-editor-screen').classList.add('hidden');
        }
    }

    // 3. 캐릭터 저장 후 리스트에 띄우기 기능
    function saveCharacter() {
        const nameInput = document.getElementById('edit-char-name').value.trim();
        const subInput = document.getElementById('edit-char-sub').value.trim();

        if(!nameInput) {
            alert("캐릭터 이름은 필수 입력 사항입니다.");
            return;
        }

        // 기존 비어있다는 텍스트 제거
        const container = document.getElementById('character-list-container');
        if(container.querySelector('.empty-text') || container.innerHTML.trim() === '') {
            container.innerHTML = ''; 
        }

        // 새로운 카드 생성해서 추가
        const card = document.createElement('div');
        card.className = 'char-card';
        card.innerHTML = `<strong style="font-size:16px;">${nameInput}</strong><br><span style="font-size:13px; color:var(--text-secondary); margin-top:4px; display:inline-block;">${subInput || "설명이 없습니다."}</span>`;
        container.prepend(card);

        // 값 초기화 및 창 닫기
        document.getElementById('edit-char-name').value = '';
        document.getElementById('edit-char-sub').value = '';
        document.querySelectorAll('#character-editor-screen .char-count').forEach(el => el.innerText = '0 / ' + el.innerText.split('/')[1].trim());
        
        closeEditor('character');
        alert("캐릭터가 저장되었습니다.");
    }

    // 4. 페르소나 저장 후 리스트에 띄우기 기능
    function savePersona() {
        const nameInput = document.getElementById('edit-persona-name').value.trim();
        const infoInput = document.getElementById('edit-persona-info').value.trim();

        if(!nameInput) {
            alert("페르소나 이름은 필수 입력 사항입니다.");
            return;
        }

        const container = document.getElementById('persona-list-container');
        if(container.innerHTML.trim() === '') {
            container.innerHTML = '';
        }

        const card = document.createElement('div');
        card.className = 'char-card';
        card.innerHTML = `<strong style="font-size:16px;">${nameInput}</strong><br><span style="font-size:13px; color:var(--text-secondary); margin-top:4px; display:inline-block;">${infoInput || "기본 페르소나"}</span>`;
        container.prepend(card);

        document.getElementById('edit-persona-name').value = '';
        document.getElementById('edit-persona-info').value = '';
        document.querySelectorAll('#persona-editor-screen .char-count').forEach(el => el.innerText = '0 / ' + el.innerText.split('/')[1].trim());

        closeEditor('persona');
        alert("페르소나가 저장되었습니다.");
    }

    // 5. 글자 수 실시간 카운팅 기능 (캐릭터, 페르소나 공통 적용)
    document.querySelectorAll('.editor-screen input[maxlength], .editor-screen textarea[maxlength]').forEach(el => {
        el.addEventListener('input', function() {
            const countDiv = this.parentElement.querySelector('.char-count');
            if(countDiv) {
                const max = this.getAttribute('maxlength');
                countDiv.innerText = `${this.value.length} / ${max}`;
            }
        });
    });
</script>

<!-- [추가 6] 로그인 상태 유지(자동 로그인) 및 로그아웃 연동 기능 -->
<script>
    // 1. 페이지 접속 시, 로그인했던 기록이 있는지 확인하고 바로 메인 화면 띄우기
    if (localStorage.getItem('dreamer_logged_in') === 'true') {
        const loginScreenEl = document.getElementById('login-screen');
        if (loginScreenEl) {
            loginScreenEl.classList.add('hidden'); // 로그인 창 숨김 (자동 로그인)
        }
    }

    // 2. [로그인] 버튼 누를 때 로그인 상태를 브라우저에 저장하기
    const executeLoginStorage = document.getElementById('btn-login');
    if (executeLoginStorage) {
        executeLoginStorage.addEventListener('click', function() {
            const idInput = document.getElementById('login-id').value.trim();
            const pwInput = document.getElementById('login-pw').value.trim();
            
            // 둘 다 정상적으로 입력하고 로그인했을 때만 저장
            if(idInput !== '' && pwInput !== '') {
                localStorage.setItem('dreamer_logged_in', 'true');
            }
        });
    }

    // 3. [로그아웃] 버튼 누를 때 브라우저에 저장된 로그인 상태 완전 삭제하기
    const executeLogoutStorage = [
        document.getElementById('btn-logout'), 
        document.getElementById('btn-settings-logout')
    ];
    
    executeLogoutStorage.forEach(function(btn) {
        if (btn) {
            btn.addEventListener('click', function() {
                localStorage.removeItem('dreamer_logged_in'); // 로그인 기록 삭제
            });
        }
    });
</script>
