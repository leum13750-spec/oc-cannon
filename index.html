<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <style>
        :root {
            --bg: #0d0d0d; --panel: #181818; --accent: #bb86fc;
            --text: #e0e0e0; --dim: #9e9e9e; --border: #262626; --input: #222;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* [1] 레이아웃: 스크롤 가능하도록 수정 */
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-y: auto; /* 고정 해제 */
        }
        
        button { cursor: pointer; border: none; background: none; color: white; }
        .hidden { display: none !important; }

        /* [2] 상단 로고 및 가이드 영역 */
        #top-brand { 
            padding: 40px 20px 20px; text-align: center; 
            background: linear-gradient(to bottom, #1a1a1a, var(--bg));
        }
        #site-logo { font-size: 2.2rem; font-weight: 900; color: var(--accent); letter-spacing: -1.5px; margin-bottom: 10px; }
        #site-guide { 
            background: rgba(187, 134, 252, 0.05); border: 1px solid rgba(187, 134, 252, 0.2);
            margin: 10px auto; padding: 15px; border-radius: 12px; 
            font-size: 0.85rem; color: var(--dim); max-width: 500px; line-height: 1.5;
        }

        /* [3] 네비게이션 탭 (상단 고정) */
        #nav-bar { 
            display: flex; background: var(--bg); border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000; padding: 5px;
        }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 0.75rem; font-weight: bold; color: var(--dim); }
        .nav-item.active { color: white; border-bottom: 2px solid var(--accent); }

        /* [4] 메인 콘텐츠 뷰 */
        .view { padding: 25px 20px; max-width: 600px; margin: 0 auto; width: 100%; }

        /* 카드 및 아이템 스타일 */
        .profile-card { background: var(--panel); border-radius: 20px; padding: 25px; border: 1px solid var(--border); text-align: center; }
        .u-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin-bottom: 15px; }
        .input-label { font-size: 0.75rem; color: var(--accent); text-align: left; display: block; margin: 15px 0 6px; font-weight: bold; }
        .input-field { width: 100%; background: var(--input); border: 1px solid #333; border-radius: 12px; color: white; padding: 14px; font-size: 0.95rem; outline: none; }

        /* 로그인 오버레이 */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--panel); padding: 35px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--border); }
        .btn-full { background: white; color: black; padding: 15px; border-radius: 30px; font-weight: 900; width: 100%; margin-top: 15px; font-size: 1rem; }

        /* [5] 비밀번호 변경 모달 */
        .pw-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

<!-- [A] 로그인 화면 -->
<div id="auth-overlay">
    <div class="auth-box">
        <h1 style="color:var(--accent); font-size: 2.2rem;">dreamer.ai</h1>
        <p id="auth-msg" style="color:var(--dim); margin-bottom:30px;">당신만의 이야기를 시작하세요.</p>
        
        <div id="login-form">
            <input id="login-handle" class="input-field" placeholder="핸들명 (ID)">
            <input type="password" id="login-pw" class="input-field" placeholder="비밀번호">
            <button class="btn-full" onclick="handleLogin()">로그인</button>
            <button style="margin-top:25px; font-size:0.8rem; color:var(--dim)" onclick="showAuth('signup')">새 계정 만들기</button>
        </div>

        <div id="signup-form" class="hidden">
            <input id="sign-email" class="input-field" placeholder="지메일 (@gmail.com)">
            <input id="sign-handle" class="input-field" placeholder="사용할 핸들명 (ID)">
            <input type="password" id="sign-pw" class="input-field" placeholder="비밀번호">
            <button class="btn-full" onclick="handleSignup()">가입하기</button>
            <button style="margin-top:25px; font-size:0.8rem; color:var(--dim)" onclick="showAuth('login')">이미 계정이 있나요? 로그인</button>
        </div>
    </div>
</div>

<!-- [B] 메인 스크롤 레이아웃 -->
<div id="main-content">
    <div id="top-brand">
        <div id="site-logo">dreamer.ai</div>
        <div id="site-guide">
            <b>User Guide:</b><br>
            캐릭터와 페르소나를 설정하고 API 키를 등록하세요.<br>
            모든 대화는 기기에 안전하게 저장됩니다.
        </div>
    </div>

    <nav id="nav-bar">
        <div class="nav-item active" onclick="switchTab(this, 'chars')">캐릭터</div>
        <div class="nav-item" onclick="switchTab(this, 'chats')">대화</div>
        <div class="nav-item" onclick="switchTab(this, 'personas')">페르소나</div>
        <div class="nav-item" onclick="switchTab(this, 'api')">API</div>
        <div class="nav-item" onclick="switchTab(this, 'user')">설정</div>
    </nav>

    <main>
        <!-- 탭 섹션들은 이전과 동일 (생략 없이 통합) -->
        <div id="view-chars" class="view">
            <button class="btn-full" style="background:var(--panel); color:var(--accent); border:1px solid var(--border)">+ 새 캐릭터 만들기</button>
            <div id="char-list"></div>
        </div>

        <div id="view-chats" class="view hidden">
            <h3>최근 대화</h3>
            <div id="session-list"></div>
        </div>

        <div id="view-personas" class="view hidden">
            <button class="btn-full" style="background:var(--panel); color:var(--accent); border:1px solid var(--border)">+ 새 페르소나</button>
            <div id="persona-list"></div>
        </div>

        <div id="view-api" class="view hidden">
            <div class="profile-card">
                <label class="input-label">Infermatic API Key</label>
                <input type="password" id="api-key" class="input-field" placeholder="sk-...">
                <button class="btn-full" onclick="saveData()">키 저장</button>
            </div>
        </div>

        <div id="view-user" class="view hidden">
            <div class="profile-card">
                <div onclick="document.getElementById('u-file').click()">
                    <img id="u-avatar" src="https://via.placeholder.com/100" class="u-avatar">
                    <input type="file" id="u-file" hidden onchange="uploadUserImg(this)">
                </div>
                
                <label class="input-label">표시 이름</label>
                <input id="u-display-name" class="input-field">
                
                <label class="input-label">핸들명 (ID)</label>
                <input id="u-handle" class="input-field" disabled style="opacity:0.4">

                <button class="btn-full" style="background:#222; color:white; border: 1px solid #444;" onclick="openPwModal()">비밀번호 변경 (이메일 인증)</button>
                <button class="btn-full" onclick="saveData()">설정 저장</button>
                <button class="btn-full" style="background:#3d0a0a; color:#ff6b6b; margin-top:30px;" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>
    </main>
</div>

<!-- [C] 비밀번호 변경 인증 모달 -->
<div id="pw-modal" class="pw-modal">
    <div class="auth-box">
        <h3>비밀번호 보안 변경</h3>
        <p style="font-size:0.8rem; color:var(--dim)">가입하신 지메일로 인증 코드가 발송됩니다.</p>
        
        <div id="pw-step-1">
            <input type="password" id="new-pw-input" class="input-field" placeholder="새 비밀번호 입력">
            <button class="btn-full" onclick="sendVeriCode()">인증 코드 발송</button>
        </div>

        <div id="pw-step-2" class="hidden">
            <input id="veri-code-input" class="input-field" placeholder="6자리 코드 입력">
            <button class="btn-full" onclick="confirmPwChange()">코드 확인 및 변경</button>
        </div>
        
        <button style="margin-top:20px; color:var(--dim)" onclick="closePwModal()">취소</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dreamer_v4_db')) || {
        users: {}, currentUser: null, apiKey: ""
    };

    let tempVeriCode = null;

    function save() { localStorage.setItem('dreamer_v4_db', JSON.stringify(db)); }

    // --- 인증 로직 ---
    function handleSignup() {
        const email = document.getElementById('sign-email').value;
        const handle = document.getElementById('sign-handle').value;
        const pw = document.getElementById('sign-pw').value;
        if(!email.endsWith('@gmail.com')) return alert("지메일만 가입 가능합니다.");
        if(db.users[handle]) return alert("중복된 핸들입니다.");
        db.users[handle] = { email, pw, name: handle, avatar: "" };
        save(); alert("가입 완료! 로그인하세요."); showAuth('login');
    }

    function handleLogin() {
        const handle = document.getElementById('login-handle').value;
        const pw = document.getElementById('login-pw').value;
        if(db.users[handle] && db.users[handle].pw === pw) {
            db.currentUser = handle; save();
            location.reload();
        } else alert("정보 불일치.");
    }

    // --- 비밀번호 변경 엔진 (이메일 시뮬레이션) ---
    function openPwModal() { document.getElementById('pw-modal').style.display = 'flex'; }
    function closePwModal() { document.getElementById('pw-modal').style.display = 'none'; }

    function sendVeriCode() {
        if(!document.getElementById('new-pw-input').value) return alert("새 비밀번호를 입력하세요.");
        tempVeriCode = Math.floor(100000 + Math.random() * 900000); // 6자리 랜덤 코드
        
        // 실제 서버가 없으므로 알림창으로 코드를 전송함 (이메일 발송 시뮬레이션)
        alert(`[dreamer.ai 알림]\n${db.users[db.currentUser].email}로 인증 코드가 발송되었습니다.\n\n코드: ${tempVeriCode}`);
        
        document.getElementById('pw-step-1').classList.add('hidden');
        document.getElementById('pw-step-2').classList.remove('hidden');
    }

    function confirmPwChange() {
        const inputCode = document.getElementById('veri-code-input').value;
        if(inputCode == tempVeriCode) {
            db.users[db.currentUser].pw = document.getElementById('new-pw-input').value;
            alert("비밀번호가 변경되었습니다. 모든 기기에서 로그아웃됩니다.");
            handleLogout(); // 강제 로그아웃
        } else {
            alert("인증 코드가 틀립니다.");
        }
    }

    function handleLogout() { db.currentUser = null; save(); location.reload(); }

    function switchTab(el, tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + tabId).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        window.scrollTo(0, 0); // 탭 전환 시 상단으로
    }

    function showAuth(type) {
        document.getElementById('login-form').classList.toggle('hidden', type !== 'login');
        document.getElementById('signup-form').classList.toggle('hidden', type !== 'signup');
    }

    function init() {
        if(db.currentUser) {
            document.getElementById('auth-overlay').classList.add('hidden');
            const user = db.users[db.currentUser];
            document.getElementById('u-display-name').value = user.name;
            document.getElementById('u-handle').value = db.currentUser;
            document.getElementById('api-key').value = db.apiKey;
            if(user.avatar) document.getElementById('u-avatar').src = user.avatar;
        }
    }

    function saveData() {
        const user = db.users[db.currentUser];
        user.name = document.getElementById('u-display-name').value;
        user.avatar = document.getElementById('u-avatar').src;
        db.apiKey = document.getElementById('api-key').value;
        save(); alert("저장 완료");
    }

    function uploadUserImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => { document.getElementById('u-avatar').src = e.target.result; save(); };
        reader.readAsDataURL(input.files[0]);
    }

    init();
</script>
</body>
</html>
