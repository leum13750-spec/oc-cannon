<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 기존 스타일 전체 포함 */
        :root { --bg-main: #0a0a0a; --bg-surface: #151515; --bg-surface-light: #202020; --accent-color: #d8b4fe; --text-primary: #ffffff; --text-secondary: #9ca3af; --border-color: #262626; --danger-color: #ff6b6b; }
        /* [요청 사항: 구분선 및 필수 표시 스타일 추가] */
        .msg-separator { border-top: 1px solid #222; margin: 12px 0; }
        .required::after { content: " *"; color: red; }
        /* 나머지 기존 스타일은 그대로 유지 */
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: -apple-system, sans-serif; }
        .editor-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 7000; display: flex; flex-direction: column; transition: 0.3s; }
        .hidden { display: none !important; }
        .msg-block { padding: 12px; border-radius: 12px; }
    </style>
</head>
<body>

<!-- ... (기존 HTML 구조는 유지하되 에디터 항목명 변경) ... -->
<!-- 캐릭터 에디터 항목 수정 예시 -->
<div class="form-group"><label class="required">Name</label><input type="text" id="edit-char-name"></div>
<div class="form-group"><label>Tagline</label><input type="text" id="edit-char-sub"></div>
<div class="form-group"><label class="required">Greeting</label><textarea id="edit-char-greeting"></textarea></div>
<div class="form-group"><label>Definition</label><textarea id="edit-char-definition" placeholder="캐릭터의 성격, 말투, 상세 설정 등을 입력하세요"></textarea></div>
<div class="form-group"><label>Relation</label><textarea id="edit-char-relation" placeholder="캐릭터가 알고 있는 유저의 정보"></textarea></div>
<div class="form-group"><label>Story</label><textarea id="edit-char-story" placeholder="기억해야 할 주요 사건"></textarea></div>

<!-- 우측 사이드바 내 모델 변경 및 장면 저장 -->
<div id="sidebar-right" style="position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: #151515; z-index: 10001;">
    <select id="model-select" onchange="saveSettings()" style="width: 90%; margin: 20px; padding: 10px;">
        <option value="midnight-miqu-70b">Midnight Miqu v1.5 70B</option>
        <option value="llama-3.1-hanami-70b">Llama3.1 Hanami x1 70B</option>
    </select>
    <button onclick="saveCurrentScene()" style="width: 90%; margin: 0 20px; padding: 10px;">장면으로 남기기</button>
</div>

<script>
    // [1] 전역 변수 및 상태 관리
    let currentChatHistory = JSON.parse(localStorage.getItem('last_chat_history')) || [];
    let settings = JSON.parse(localStorage.getItem('dreamer_settings')) || { apiKey: '', model: 'midnight-miqu-70b' };

    // [2] API 연동 로직
    async function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        // 버그 수정: 배열 누적 (기존 인사말 유지)
        currentChatHistory.push({ role: 'user', content: text });
        renderChatLog();
        input.value = '';

        try {
            const res = await fetch('https://api.infermatic.ai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${settings.apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: settings.model, messages: currentChatHistory })
            });
            const data = await res.json();
            currentChatHistory.push({ role: 'char', content: data.choices[0].message.content });
            saveChat();
            renderChatLog();
        } catch (e) { alert("API 오류 발생"); }
    }

    // [3] 채팅 로그 렌더링 (구분선 추가)
    function renderChatLog() {
        const logBox = document.getElementById('chat-log');
        logBox.innerHTML = '';
        currentChatHistory.forEach((msg, index) => {
            logBox.innerHTML += `
                <div class="msg-block">
                    <div class="msg-header">${msg.role === 'user' ? 'User' : 'Character'}</div>
                    <div class="msg-content">${msg.content}</div>
                    <div class="msg-separator"></div>
                </div>`;
        });
        logBox.scrollTop = logBox.scrollHeight;
    }

    // [4] 새로고침 유지 및 저장
    function saveChat() { localStorage.setItem('last_chat_history', JSON.stringify(currentChatHistory)); }
    
    // [5] 장면(Scene) 저장 기능
    function saveCurrentScene() {
        const sceneName = prompt("장면의 이름을 정해주세요:");
        if (!sceneName) return;
        const scenes = JSON.parse(localStorage.getItem('saved_scenes') || '[]');
        scenes.push({ name: sceneName, history: currentChatHistory });
        localStorage.setItem('saved_scenes', JSON.stringify(scenes));
        alert("장면 저장 완료");
    }

    // [6] 프로필 저장 기능
    document.getElementById('btn-save-profile').onclick = () => {
        localStorage.setItem('user_nickname', document.getElementById('settings-nickname').value);
        localStorage.setItem('user_handle', document.getElementById('settings-handle').value);
        alert("프로필 저장 완료");
    };

    // [7] 초기화
    window.onload = () => {
        renderChatLog();
        // 기타 기존 UI 초기화 로직들...
    };
</script>

<!-- (이후 기존 파이어베이스 코드 그대로 유지) -->
</body>
</html>
