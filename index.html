<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 기기(아이폰 등) 최적화: 확대 방지 및 Safe Area 적용 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <!-- 외부 CSS 파일 연결 -->
    <link rel="stylesheet" href="style.css">
    <!-- 아이콘 사용을 위한 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- [추가 7] 로그인 화면 깜빡임 완벽 방지 코드 (깨진 부분 복구됨) -->
    <script>
        if (localStorage.getItem('dreamer_logged_in') === 'true') {
            const hideStyle = document.createElement('style');
            hideStyle.innerHTML = '#login-screen { display: none !important; opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }';
            document.head.appendChild(hideStyle);
        }
    </script>
</head>
<body>

    <!-- [1] 로그인 & 회원가입 화면 (별도 레이어) -->
    <div id="login-screen" class="screen-overlay">
        <div class="login-container">
            <h1 class="logo">dreamer.ai</h1>
            <p class="subtitle">로그인이 필요합니다.</p>
            <div class="input-group">
                <input type="text" id="login-id" placeholder="핸들명(아이디)">
                <input type="password" id="login-pw" placeholder="비밀번호">
            </div>
            <button class="primary-btn" id="btn-login">로그인</button>
            <div class="login-links">
                <span class="link" id="link-register">가입하기</span>
                <span class="link" id="link-find-pw">비밀번호 찾기</span>
            </div>
        </div>
    </div>
    
    <!-- [2] 전역 사이드바 (메뉴 네비게이션) -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" id="btn-close-sidebar"><i class="fas fa-times"></i></button>
        </div>
        <ul class="sidebar-menu">
            <!-- 요청에 따라 기존 탭 이동용 메뉴들을 전부 삭제하고 백업(톡썰메이커) 버튼 추가 -->
            <li id="btn-open-talk-maker"><i class="fas fa-comments"></i> 수동 대화 백업</li>
            <li class="logout-menu" id="btn-logout"><i class="fas fa-sign-out-alt"></i> 로그아웃</li>
        </ul>
    </div>
    <!-- 사이드바 열릴 때 배경 어둡게 하는 오버레이 -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- [3] 메인 앱 인터페이스 -->
    <div id="app-content" class="app-content">
        <!-- 상단 헤더 -->
        <header class="app-header">
            <button class="menu-btn" id="btn-open-sidebar"><i class="fas fa-bars"></i></button>
            <h1 class="logo header-logo">dreamer.ai</h1>
            <div style="width: 24px;"></div> <!-- 중앙 정렬 맞춤용 공백 -->
        </header>

        <!-- 관리자 전용 공지사항 (User Manual) -->
        <div class="notice-bar">
            <div class="notice-content">
                <span class="notice-tag">User Manual</span>
                <span class="notice-text">dreamer.ai에 오신 것을 환영합니다!</span>
            </div>
            <button class="edit-notice-btn" id="btn-edit-notice">Edit</button>
        </div>

        <!-- 5대 핵심 메인 탭 (대화 -> 장면으로 변경됨) -->
        <nav class="main-tabs">
            <button class="tab-btn active" data-tab="character">캐릭터</button>
            <button class="tab-btn" data-tab="scene">장면</button>
            <button class="tab-btn" data-tab="persona">페르소나</button>
            <button class="tab-btn" data-tab="api">API</button>
            <button class="tab-btn" data-tab="settings">설정</button>
        </nav>

        <!-- 탭 하단 본문 (스크롤 가능 영역) -->
        <main class="tab-content-area">
            
            <!-- 캐릭터 탭 내용 -->
            <div id="tab-character" class="tab-pane active">
                <button class="create-btn">+ 새 캐릭터 만들기</button>
                <div class="content-list" id="character-list-container">
                    <!-- 캐릭터 리스트가 여기에 생성됨 -->
                </div>
            </div>

            <!-- 장면 탭 내용 (새로 추가됨) -->
            <div id="tab-scene" class="tab-pane">
                <h3 class="section-title">저장된 장면(Scene)</h3>
                <div class="content-list" id="scene-list-container">
                    <p class="empty-text">저장된 장면이 없습니다.</p>
                </div>
            </div>

            <!-- 페르소나 탭 내용 -->
            <div id="tab-persona" class="tab-pane">
                <button class="create-btn">+ 새 페르소나 만들기</button>
                <div class="content-list" id="persona-list-container"></div>
            </div>

            <!-- API 탭 내용 -->
            <div id="tab-api" class="tab-pane">
                <div class="api-container">
                    <span class="notice-tag">Infermatic API Key</span>
                    <input type="password" id="api-key-input" placeholder="sk-...">
                    <button class="link-btn" id="btn-check-api">연동 상태 확인</button>
                </div>
            </div>

            <!-- 유저 설정 탭 내용 -->
            <div id="tab-settings" class="tab-pane">
                <div class="settings-profile">
                    <!-- 유저 정보 설정 영역 추가 (닉네임, 핸들명) -->
                    <div class="form-group" style="width: 100%; text-align: left;">
                        <label>닉네임</label>
                        <input type="text" id="settings-nickname" placeholder="유저 닉네임" style="width: 100%; padding: 14px; background: var(--bg-surface-light); border: none; border-radius: 12px; color: white; margin-top: 8px;">
                    </div>
                    <div class="form-group" style="width: 100%; text-align: left;">
                        <label>핸들명 (아이디)</label>
                        <input type="text" id="settings-handle" placeholder="@handle" style="width: 100%; padding: 14px; background: var(--bg-surface-light); border: none; border-radius: 12px; color: white; margin-top: 8px;">
                    </div>
                    <button class="primary-btn" id="btn-save-profile" style="margin-bottom: 0;">프로필 저장</button>
                    
                    <hr style="width: 100%; border-color: var(--border-color); margin: 16px 0;">

                    <button class="sub-btn">데이터 백업 코드 복사</button>
                    <button class="sub-btn danger-text" id="btn-settings-logout">로그아웃</button>
                </div>
            </div>

        </main>
    </div>

    <!-- [4] 우측 하단 플로팅 버그 제보 버튼 -->
    <button class="bug-report-btn" id="btn-bug-report">
        <i class="fas fa-bug"></i>
    </button>

</body>
</html>

<!-- 질문자님의 원래 CSS 코드 + 사진 리스트 CSS 통합 -->
<style>
    /* ================= 1. 전역 변수 & 기본 초기화 ================= */
    :root {
        --bg-main: #0a0a0a;         /* 최하단 검은 배경 */
        --bg-surface: #151515;      /* 카드, 탭 배경 (딥 그레이) */
        --bg-surface-light: #202020;/* 인풋박스 등 살짝 밝은 배경 */
        --accent-color: #d8b4fe;    /* dreamer.ai 연보라색 포인트 */
        --text-primary: #ffffff;    /* 기본 텍스트 (흰색) */
        --text-secondary: #9ca3af;  /* 보조 텍스트 (회색) */
        --border-color: #262626;    /* 선 색상 */
        --danger-color: #ff6b6b;    /* 경고/로그아웃 색상 */
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent; /* 모바일 터치 시 회색 음영 제거 */
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        overflow: hidden; /* 모바일에서 전체 화면 밀림 방지 */
    }

    /* 아이폰 Safe Area 적용 (노치 및 하단 바 침범 방지) */
    .app-content {
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
    }

    /* ================= 2. 헤더 & 공지사항 ================= */
    .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
        background-color: var(--bg-main);
    }

    .logo {
        color: var(--accent-color);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    .menu-btn {
        background: none;
        border: none;
        color: var(--text-primary);
        font-size: 20px;
        cursor: pointer;
    }

    .notice-bar {
        margin: 0 16px 16px 16px;
        padding: 16px;
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .notice-tag {
        display: block;
        color: var(--text-secondary);
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 8px;
    }

    .notice-text {
        color: var(--text-primary);
        font-size: 14px;
        line-height: 1.4;
    }

    .edit-notice-btn {
        background: none;
        border: none;
        color: var(--accent-color);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
    }

    /* ================= 3. 메인 탭 네비게이션 ================= */
    .main-tabs {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid var(--border-color);
        padding: 0 16px;
        flex-shrink: 0;
    }

    .tab-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        padding: 12px 0;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        flex-grow: 1;
        position: relative;
        transition: color 0.2s;
    }

    .tab-btn.active {
        color: var(--text-primary);
    }

    .tab-btn.active::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 15%;
        width: 70%;
        height: 3px;
        background-color: var(--accent-color);
        border-radius: 3px 3px 0 0;
    }

    /* ================= 4. 탭 콘텐츠 영역 (스크롤) ================= */
    .tab-content-area {
        flex: 1;
        overflow-y: auto;
        padding: 24px 16px;
    }

    .tab-pane {
        display: none;
    }
    
    .tab-pane.active {
        display: block;
        animation: fadeIn 0.2s ease-in-out;
    }
    
    @keyframes fadeIn { 
        from { opacity: 0; } 
        to { opacity: 1; } 
    }

    .create-btn {
        width: 100%;
        background-color: var(--bg-surface);
        color: var(--accent-color);
        border: 1px solid var(--border-color);
        padding: 16px;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-bottom: 16px;
    }
    
    .create-btn:hover { background-color: var(--bg-surface-light); }

    .section-title { font-size: 18px; margin-bottom: 16px; }
    .empty-text { color: var(--text-secondary); font-size: 14px; }

    /* API & 세팅 탭 전용 스타일 */
    .api-container {
        background-color: var(--bg-surface);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
    }
    
    .api-container input {
        width: 100%;
        padding: 14px;
        margin: 12px 0;
        background-color: var(--bg-surface-light);
        border: none;
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 14px;
    }
    
    .link-btn {
        background: none;
        border: none;
        color: var(--accent-color);
        font-size: 13px;
        cursor: pointer;
    }

    .settings-profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
    }
    
    .profile-img-placeholder {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid var(--accent-color);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        color: var(--accent-color);
        margin-bottom: 10px;
    }
    
    .sub-btn {
        width: 100%;
        padding: 16px;
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 14px;
        cursor: pointer;
    }
    
    .danger-text { color: var(--danger-color); border-color: rgba(255, 107, 107, 0.3); }

    /* ================= 5. 사이드바 (Sidebar) ================= */
    .sidebar {
        position: fixed;
        top: 0;
        left: -300px;
        width: 280px;
        height: 100%;
        background-color: var(--bg-surface);
        z-index: 1000;
        transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top);
    }
    
    .sidebar.open { left: 0; }
    
    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        border-bottom: 1px solid var(--border-color);
    }
    
    .sidebar-header h2 { font-size: 18px; color: var(--text-primary); }
    .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }
    
    .sidebar-menu { list-style: none; padding: 10px 0; overflow-y: auto; }
    .sidebar-menu li {
        padding: 16px 20px;
        font-size: 15px;
        color: var(--text-primary);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 16px;
    }
    .sidebar-menu li:hover { background-color: var(--bg-surface-light); }
    .sidebar-menu i { width: 20px; text-align: center; color: var(--text-secondary); }
    .sidebar-menu .logout-menu { color: var(--danger-color); margin-top: 20px; }

    .sidebar-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(2px);
        z-index: 999;
        opacity: 0; visibility: hidden;
        transition: all 0.3s;
    }
    
    .sidebar-overlay.show { opacity: 1; visibility: visible; }

    /* ================= 6. 플로팅 버그 제보 버튼 ================= */
    .bug-report-btn {
        position: fixed;
        bottom: calc(30px + env(safe-area-inset-bottom));
        right: 20px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background-color: var(--bg-surface);
        color: var(--accent-color);
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        font-size: 20px;
        cursor: pointer;
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* ================= 7. 로그인 화면 오버레이 ================= */
    .screen-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--bg-main);
        z-index: 2000;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        transition: opacity 0.3s, visibility 0.3s;
    }
    
    .screen-overlay.hidden { opacity: 0; visibility: hidden; }

    .login-container {
        width: 100%;
        max-width: 400px;
        background-color: var(--bg-surface);
        padding: 40px 24px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        text-align: center;
    }
    
    .login-container .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
    
    .input-group input {
        width: 100%;
        padding: 16px;
        margin-bottom: 16px;
        background-color: var(--bg-main);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 15px;
    }
    
    .primary-btn {
        width: 100%;
        padding: 16px;
        background-color: var(--text-primary);
        color: #000000;
        border: none;
        border-radius: 30px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        margin-bottom: 24px;
    }
    
    .login-links {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: var(--text-secondary);
    }
    
    .login-links .link { cursor: pointer; }

    /* ================= 8. 사진 + 정보 리스트 (CAI 스타일 & 스와이프 기능 추가) ================= */
    .swipe-container {
        position: relative;
        width: 100%;
        overflow: hidden;
        border-radius: 16px;
        margin-bottom: 12px;
        background: var(--bg-surface);
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .delete-btn-bg {
        position: absolute;
        top: 0; right: 0; bottom: 0;
        width: 80px;
        background-color: var(--danger-color);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        cursor: pointer;
        z-index: 1;
    }
    .list-card {
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--bg-surface);
        padding: 16px;
        border-radius: 16px;
        position: relative;
        cursor: pointer;
        transition: transform 0.3s ease;
        z-index: 2;
        width: 100%;
    }
    .list-img {
        width: 56px; height: 56px;
        border-radius: 50%;
        object-fit: cover;
        background-color: var(--bg-surface-light);
        flex-shrink: 0;
    }
    .list-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
    .list-title { font-size: 16px; font-weight: 700; color: white; display: block; margin-bottom: 4px; }
    .list-sub { 
        font-size: 13px; color: var(--text-secondary); line-height: 1.3;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; white-space: normal; 
    }
    .edit-btn {
        position: absolute; top: 16px; right: 16px;
        background: none; border: none; color: var(--text-secondary); font-size: 16px; cursor: pointer; padding: 4px;
    }
    .edit-btn:hover { color: var(--accent-color); }
</style>

<!-- 질문자님의 원래 JS 코드 (건드리지 않음) -->
<script>
    // ================= [1] 로그인 화면 UI 제어 =================
    const loginScreen = document.getElementById('login-screen');
    const btnLogin = document.getElementById('btn-login');
    const linkRegister = document.getElementById('link-register');
    const linkFindPw = document.getElementById('link-find-pw');

    // 1. 로그인 버튼 클릭 시
    btnLogin.addEventListener('click', function() {
        const idInput = document.getElementById('login-id').value.trim();
        const pwInput = document.getElementById('login-pw').value.trim();

        // 빈칸 검사
        if(idInput === '' || pwInput === '') {
            alert('핸들명(또는 이메일)과 비밀번호를 모두 입력해주세요.');
            return;
        }

        // 로그인 성공 처리 (화면을 서서히 숨김)
        loginScreen.classList.add('hidden');
        
        // (참고) 실제 로그인 정보를 저장하는 세션 로직은 추후 백엔드/스토리지 연동 시 추가됩니다.
    });

    // 2. 가입하기 버튼 클릭 시
    linkRegister.addEventListener('click', function() {
        alert('회원가입 창이 열립니다.\n(기획서 반영: @gmail.com 계정만 가입 가능하도록 연결됩니다.)');
        // 향후 회원가입 모달창을 띄우는 함수로 교체됩니다.
    });

    // 3. 비밀번호 찾기 버튼 클릭 시
    linkFindPw.addEventListener('click', function() {
        alert('비밀번호 찾기 창이 열립니다.\n(기획서 반영: 가입된 이메일로 6자리 인증 코드가 발송됩니다.)');
        // 향후 인증번호 입력 모달창을 띄우는 함수로 교체됩니다.
    });

    // ================= [2] 사이드바 및 메인 탭 작동 코드 =================
    // 뼈대가 완벽하게 돌아가도록 네비게이션 기능도 함께 추가해 드립니다.

    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const btnOpenSidebar = document.getElementById('btn-open-sidebar');
    const btnCloseSidebar = document.getElementById('btn-close-sidebar');

    // 사이드바 열기/닫기 함수
    function toggleSidebar() {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('show');
    }

    btnOpenSidebar.addEventListener('click', toggleSidebar);
    btnCloseSidebar.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    // 탭 전환 로직
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabPanes = document.querySelectorAll('.tab-pane');

    tabBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            // 모든 탭 버튼 비활성화
            tabBtns.forEach(b => b.classList.remove('active'));
            // 모든 탭 내용 숨기기
            tabPanes.forEach(p => p.classList.remove('active'));

            // 클릭한 탭 활성화
            this.classList.add('active');
            const targetId = 'tab-' + this.getAttribute('data-tab');
            document.getElementById(targetId).classList.add('active');
        });
    });

    // 사이드바 메뉴 클릭 시 해당 탭으로 이동 및 사이드바 닫기 (기존 탭이동 주석처리, 톡썰메이커 연동으로 변경)
    /*
    const sidebarMenuItems = document.querySelectorAll('.sidebar-menu li[data-target]');
    sidebarMenuItems.forEach(item => {
        item.addEventListener('click', function() {
            const target = this.getAttribute('data-target');
            
            if(target === 'chat-history') {
                alert("최근 대화 목록이 열립니다."); // 임시 대화 목록
            } else {
                // 상단 탭 버튼 클릭 효과 트리거
                const targetTabBtn = document.querySelector(`.tab-btn[data-tab="${target}"]`);
                if(targetTabBtn) targetTabBtn.click();
            }
            toggleSidebar(); // 사이드바 닫기
        });
    });
    */

    // 로그아웃 버튼 (사이드바 및 설정 탭)
    const btnLogout = document.getElementById('btn-logout');
    const btnSettingsLogout = document.getElementById('btn-settings-logout');

    function executeLogout() {
        alert("모든 기기에서 로그아웃 되었습니다. (세션 파기)");
        loginScreen.classList.remove('hidden'); // 로그인 화면 다시 띄우기
        if(sidebar.classList.contains('open')) toggleSidebar();
    }

    btnLogout.addEventListener('click', executeLogout);
    if(btnSettingsLogout) btnSettingsLogout.addEventListener('click', executeLogout);

</script>

<!-- [추가 4, 6, 8] 에디터 제어, 자동로그인, 데이터 영구보존, 스와이프 로직 스크립트 -->
<script>
    // 사이드바 톡썰메이커 버튼 연결
    document.getElementById('btn-open-talk-maker').addEventListener('click', function() {
        document.getElementById('talk-maker-screen').classList.remove('hidden');
        toggleSidebar(); // 사이드바 닫기
    });

    // 톡썰메이커 메시지 추가 로직
    window.addTalkMakerMsg = function(type) {
        const chatBox = document.getElementById('talk-maker-chat');
        const msgInput = document.getElementById('tm-msg-input');
        const text = msgInput.value.trim();
        if(!text) return;

        const name = type === 'char' ? (document.getElementById('tm-char-name').value || '캐릭터') : (document.getElementById('tm-user-name').value || '나');
        const bubble = document.createElement('div');
        bubble.style.marginBottom = '16px';
        bubble.style.display = 'flex';
        bubble.style.flexDirection = 'column';

        if(type === 'char') {
            bubble.style.alignItems = 'flex-start';
            bubble.innerHTML = `
                <span style="font-size: 13px; font-weight: bold; color: white; margin-bottom: 6px; margin-left: 4px;">${name}</span>
                <div style="background: var(--bg-surface-light); color: white; padding: 12px 16px; border-radius: 18px 18px 18px 4px; max-width: 85%; word-break: break-word; font-size: 15px; line-height: 1.4;">${text}</div>
            `;
        } else {
            bubble.style.alignItems = 'flex-end';
            bubble.innerHTML = `
                <span style="font-size: 13px; font-weight: bold; color: white; margin-bottom: 6px; margin-right: 4px;">${name}</span>
                <div style="background: var(--accent-color); color: black; padding: 12px 16px; border-radius: 18px 18px 4px 18px; max-width: 85%; word-break: break-word; font-size: 15px; line-height: 1.4;">${text}</div>
            `;
        }
        chatBox.appendChild(bubble);
        msgInput.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    // 스와이프 기능 부여 공통 함수 (CAI 스타일 리스트 호환)
    window.attachSwipeEvents = function(cardElement) {
        let startX = 0;
        let currentX = 0;
        const threshold = -60;

        cardElement.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            cardElement.style.transition = 'none';
        }, {passive: true});

        cardElement.addEventListener('touchmove', (e) => {
            currentX = e.touches[0].clientX - startX;
            if (currentX < 0 && currentX > -100) {
                cardElement.style.transform = `translateX(${currentX}px)`;
            }
        }, {passive: true});

        cardElement.addEventListener('touchend', () => {
            cardElement.style.transition = 'transform 0.3s ease';
            if (currentX < threshold) {
                cardElement.style.transform = `translateX(-80px)`;
            } else {
                cardElement.style.transform = `translateX(0px)`;
            }
            currentX = 0;
        });
    };

    // 공통 삭제 확인 창 및 로직 연동
    window.executeDelete = async function(id, name, type, isFirebase) {
        if(confirm(`정말 '${name}'을(를) 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) {
            if(isFirebase) {
                try {
                    const user = window.firebaseAuth.currentUser;
                    await window.firebaseDeleteDoc(window.firebaseDoc(window.firebaseDb, `users/${user.uid}/${type}/${id}`));
                    fetchRealData(user.uid);
                    alert('삭제가 완료되었습니다.');
                } catch(e) { alert('삭제 실패: ' + e.message); }
            } else {
                let storageKey = type === 'characters' ? 'dreamer_characters' : 'dreamer_personas';
                let saved = JSON.parse(localStorage.getItem(storageKey) || '[]');
                saved = saved.filter(item => item.id.toString() !== id.toString());
                localStorage.setItem(storageKey, JSON.stringify(saved));
                if(type === 'characters') renderCharacters();
                else renderPersonas();
                alert('삭제가 완료되었습니다.');
            }
        } else {
            // 취소 시 스와이프 원위치 복구
            if(!isFirebase) {
                if(type === 'characters') renderCharacters();
                else renderPersonas();
            } else {
                const user = window.firebaseAuth?.currentUser;
                if(user) fetchRealData(user.uid);
            }
        }
    };

    // 버튼 이벤트 연결
    const btnCreateCharacter = document.querySelector('#tab-character .create-btn');
    const btnCreatePersona = document.querySelector('#tab-persona .create-btn');

    if(btnCreateCharacter) {
        btnCreateCharacter.addEventListener('click', function() {
            window.openCharEditor();
        });
    }

    if(btnCreatePersona) {
        btnCreatePersona.addEventListener('click', function() {
            window.openPersonaEditor();
        });
    }

    // 에디터 닫기
    function closeEditor(type) {
        if(type === 'character') {
            document.getElementById('character-editor-screen').classList.add('hidden');
        } else if(type === 'persona') {
            document.getElementById('persona-editor-screen').classList.add('hidden');
        }
    }

    // 글자 수 실시간 카운팅
    document.querySelectorAll('.editor-screen input[maxlength], .editor-screen textarea[maxlength]').forEach(el => {
        el.addEventListener('input', function() {
            const countDiv = this.parentElement.querySelector('.char-count');
            if(countDiv) {
                const max = this.getAttribute('maxlength');
                countDiv.innerText = `${this.value.length} / ${max}`;
            }
        });
    });

    // 자동 로그인 설정 (로그인/로그아웃 버튼에 저장소 연결)
    const executeLoginStorage = document.getElementById('btn-login');
    if (executeLoginStorage) {
        executeLoginStorage.addEventListener('click', function() {
            const idInput = document.getElementById('login-id').value.trim();
            const pwInput = document.getElementById('login-pw').value.trim();
            if(idInput !== '' && pwInput !== '') {
                localStorage.setItem('dreamer_logged_in', 'true');
            }
        });
    }

    const executeLogoutStorage = [
        document.getElementById('btn-logout'), 
        document.getElementById('btn-settings-logout')
    ];
    executeLogoutStorage.forEach(function(btn) {
        if (btn) {
            btn.addEventListener('click', function() {
                localStorage.removeItem('dreamer_logged_in'); 
            });
        }
    });

    // 화면 켜질 때 데이터 불러오기
    function loadSavedData() {
        renderCharacters();
        renderPersonas();
        
        const savedApiKey = localStorage.getItem('dreamer_api_key');
        if (savedApiKey && document.getElementById('api-key-input')) {
            document.getElementById('api-key-input').value = savedApiKey;
        }
    }

    // 캐릭터 그리기 (로컬 스토리지용 - CAI 스타일 및 스와이프 삭제 포함)
    function renderCharacters() {
        const container = document.getElementById('character-list-container');
        const savedChars = JSON.parse(localStorage.getItem('dreamer_characters') || '[]');
        
        if (savedChars.length === 0) {
            container.innerHTML = '<p class="empty-text" style="color:var(--text-secondary); font-size:14px; text-align:center; padding-top:20px;">생성된 캐릭터가 없습니다.</p>';
            return;
        }

        container.innerHTML = '';
        const placeholderImg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="%23666"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';

        savedChars.forEach(char => {
            const wrapper = document.createElement('div');
            wrapper.className = 'swipe-container';
            const imgSrc = char.photoUrl ? char.photoUrl : placeholderImg;

            wrapper.innerHTML = `
                <div class="delete-btn-bg" onclick="executeDelete('${char.id}', '${char.name}', 'characters', false)"><i class="fas fa-trash"></i></div>
                <div class="list-card swipe-card">
                    <img src="${imgSrc}" class="list-img">
                    <div class="list-info">
                        <span class="list-title">${char.name}</span>
                        <span class="list-sub">${char.sub || "설명이 없습니다."}</span>
                    </div>
                    <button class="edit-btn"><i class="fas fa-edit"></i></button>
                </div>
            `;
            
            const card = wrapper.querySelector('.swipe-card');
            attachSwipeEvents(card);

        });

    // 캐릭터 저장/수정 기능 (로컬 스토리지용)
    function saveCharacter() {
        if(window.firebaseAuth && window.firebaseAuth.currentUser) {
            window.saveCharacterFirebase();
            return;
        }

        const nameInput = document.getElementById('edit-char-name').value.trim();
        const subInput = document.getElementById('edit-char-sub').value.trim();
        const relationInput = document.getElementById('edit-char-relation').value;
        const langInput = document.getElementById('edit-char-lang').value;
        const greetingInput = document.getElementById('edit-char-greeting').value;
        const profileInput = document.getElementById('edit-char-profile').value;
        const appearanceInput = document.getElementById('edit-char-appearance').value;

        if(!nameInput) {
            alert("캐릭터 이름은 필수 입력 사항입니다.");
            return;
        }

        let savedChars = JSON.parse(localStorage.getItem('dreamer_characters') || '[]');
        
        if(editingCharId) {
            let index = savedChars.findIndex(c => c.id.toString() === editingCharId.toString());
            if(index !== -1) {
                savedChars[index].name = nameInput;
                savedChars[index].sub = subInput;
                savedChars[index].relation = relationInput;
                savedChars[index].lang = langInput;
                savedChars[index].greeting = greetingInput;
                savedChars[index].profile = profileInput;
                savedChars[index].appearance = appearanceInput;
                if(tempCharBase64) savedChars[index].photoUrl = tempCharBase64;
            }
        } else {
            savedChars.unshift({
                id: Date.now(), 
                name: nameInput,
                sub: subInput,
                relation: relationInput,
                lang: langInput,
                greeting: greetingInput,
                profile: profileInput,
                appearance: appearanceInput,
                photoUrl: tempCharBase64
            });
        }

        localStorage.setItem('dreamer_characters', JSON.stringify(savedChars));
        closeEditor('character');
        renderCharacters(); 
        alert("캐릭터가 안전하게 저장되었습니다.");
    }

    // 페르소나 저장/수정 기능 (로컬 스토리지용)

    // 앱 실행 시 데이터 불러오기
    window.addEventListener('DOMContentLoaded', loadSavedData);

    // 사진 용량을 강제로 줄이는 압축 함수
    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const maxSize = 400; // 가로세로 최대 400px 압축

                if (width > height) {
                    if (width > maxSize) { height *= maxSize / width; width = maxSize; }
                } else {
                    if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7); // 화질 70%
                callback(compressedBase64);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

        try {
            const personaSnap = await getDocs(collection(db, `users/${uid}/personas`));
            personaContainer.innerHTML = personaSnap.empty ? '<p class="empty-text" style="color:var(--text-secondary); font-size:14px; text-align:center; padding-top:20px;">서버에 저장된 페르소나가 없습니다.</p>' : '';
            
            personaSnap.forEach(documentSnapshot => {
                const perId = documentSnapshot.id;
                const per = documentSnapshot.data();
                
                const wrapper = document.createElement('div');
                wrapper.className = "swipe-container";
                const imgSrc = per.photoUrl ? per.photoUrl : placeholderImg;
                
                wrapper.innerHTML = `
                    <div class="delete-btn-bg" onclick="executeDelete('${perId}', '${per.name}', 'personas', true)"><i class="fas fa-trash"></i></div>
                    <div class="list-card swipe-card">
                        <img src="${imgSrc}" class="list-img">
                        <div class="list-info">
                            <span class="list-title">${per.name}</span>
                            <span class="list-sub">${per.info || per.bg || "기본 페르소나"}</span>
                        </div>
                        <button class="edit-btn"><i class="fas fa-edit"></i></button>
                    </div>
                `;
                
                const card = wrapper.querySelector('.swipe-card');
                window.attachSwipeEvents(card);

                card.querySelector('.edit-btn').onclick = (e) => {
                    e.stopPropagation();
                    openPersonaEditor(perId, per);
                };
                personaContainer.appendChild(wrapper);
            });
        } catch(e) { console.error("페르소나 불러오기 실패", e); }
    }

    async function loadUserProfile(uid) {
        try {
            const userDoc = await getDoc(doc(db, "users", uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('settings-nickname').value = data.nickname || '';
                document.getElementById('settings-handle').value = data.handle || '';
            }
        } catch(e) { console.error("프로필 불러오기 실패", e); }
    }

    document.getElementById('btn-save-profile').addEventListener('click', async () => {
        const user = auth.currentUser;
        if(!user) return;
        
        const nickname = document.getElementById('settings-nickname').value.trim();
        const handle = document.getElementById('settings-handle').value.trim();
        const btn = document.getElementById('btn-save-profile');
        
        btn.innerText = "저장 중...";
        try {
            await setDoc(doc(db, "users", user.uid), {
                nickname: nickname,
                handle: handle,
                updatedAt: Date.now()
            }, { merge: true });
            alert("프로필이 저장되었습니다!");
        } catch(e) {
            alert("저장 실패: " + e.message);
        } finally {
            btn.innerText = "프로필 저장";
        }
    });
</script>
