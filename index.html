<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 기기(아이폰 등) 최적화: 확대 방지 및 Safe Area 적용 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <!-- 외부 CSS 파일 연결 -->
    <link rel="stylesheet" href="style.css">
    <!-- 아이콘 사용을 위한 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================= 1. 전역 변수 & 기본 초기화 ================= */
        :root {
            --bg-main: #0a0a0a;         /* 최하단 검은 배경 */
            --bg-surface: #151515;      /* 카드, 탭 배경 (딥 그레이) */
            --bg-surface-light: #202020;/* 인풋박스 등 살짝 밝은 배경 */
            --accent-color: #d8b4fe;    /* dreamer.ai 연보라색 포인트 */
            --text-primary: #ffffff;    /* 기본 텍스트 (흰색) */
            --text-secondary: #9ca3af;  /* 보조 텍스트 (회색) */
            --border-color: #262626;    /* 선 색상 */
            --danger-color: #ff6b6b;    /* 경고/로그아웃 색상 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 시 회색 음영 제거 */
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-y: auto; /* 수정: 전체 화면 스크롤 허용 */
        }

        /* 아이폰 Safe Area 적용 (노치 및 하단 바 침범 방지) */
        .app-content {
            min-height: 100vh; /* 수정: 고정 높이에서 최소 높이로 변경 */
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* ================= 2. 헤더 & 공지사항 ================= */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: var(--bg-main);
        }

        .logo {
            color: var(--accent-color);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
        }

        .notice-bar {
            margin: 0 16px 16px 16px;
            padding: 16px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column; /* 수정: 상하 정렬 유지 */
        }

        .notice-tag {
            display: inline-block;
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .notice-text {
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.4;
        }

        .edit-notice-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end; /* 우측 상단 배치 */
        }

        /* ================= 3. 메인 탭 네비게이션 ================= */
        .main-tabs {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding: 0 16px;
            flex-shrink: 0;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            flex-grow: 1;
            position: relative;
            transition: color 0.2s;
        }

        .tab-btn.active {
            color: var(--text-primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 15%;
            width: 70%;
            height: 3px;
            background-color: var(--accent-color);
            border-radius: 3px 3px 0 0;
        }

        /* ================= 4. 탭 콘텐츠 영역 (스크롤) ================= */
        .tab-content-area {
            flex: 1;
            overflow-y: visible; /* 수정: 부모 스크롤을 따르도록 변경 */
            padding: 24px 16px;
        }

        .tab-pane {
            display: none;
        }
        
        .tab-pane.active {
            display: block;
            animation: fadeIn 0.2s ease-in-out;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }

        .create-btn {
            width: 100%;
            background-color: var(--bg-surface);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 15px;
        }
        
        .create-btn:hover { background-color: var(--bg-surface-light); }

        .section-title { font-size: 18px; margin-bottom: 16px; }
        .empty-text { color: var(--text-secondary); font-size: 14px; text-align: center; margin-top: 20px; }

        /* API & 세팅 탭 전용 스타일 */
        .api-container {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        
        .api-container input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background-color: var(--bg-surface-light);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .link-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 13px;
            cursor: pointer;
        }

        .settings-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .profile-img-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: var(--accent-color);
            margin-bottom: 10px;
        }
        
        .sub-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }
        
        .danger-text { color: var(--danger-color); border-color: rgba(255, 107, 107, 0.3); }

        /* ================= 5. 사이드바 (Sidebar) ================= */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background-color: var(--bg-surface);
            z-index: 1000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        
        .sidebar.open { left: 0; }
        
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .sidebar-header h2 { font-size: 18px; color: var(--text-primary); }
        .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }
        
        .sidebar-menu { list-style: none; padding: 10px 0; overflow-y: auto; }
        .sidebar-menu li {
            padding: 16px 20px;
            font-size: 15px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .sidebar-menu li:hover { background-color: var(--bg-surface-light); }
        .sidebar-menu i { width: 20px; text-align: center; color: var(--text-secondary); }
        .sidebar-menu .logout-menu { color: var(--danger-color); margin-top: 20px; }

        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 999;
            opacity: 0; visibility: hidden;
            transition: all 0.3s;
        }
        
        .sidebar-overlay.show { opacity: 1; visibility: visible; }

        /* ================= 6. 플로팅 버그 제보 버튼 ================= */
        .bug-report-btn {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom));
            right: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: var(--bg-surface);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= 7. 로그인 화면 오버레이 ================= */
        .screen-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.3s, visibility 0.3s;
        }
        
        .screen-overlay.hidden { opacity: 0; visibility: hidden; }

        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-surface);
            padding: 40px 24px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        
        .login-container .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
        
        .input-group input {
            width: 100%;
            padding: 16px;
            margin-bottom: 16px;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
        }
        
        .primary-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--text-primary);
            color: #000000;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 24px;
        }
        
        .login-links {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .login-links .link { cursor: pointer; }

        /* 모달 스타일 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 5000; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: var(--bg-surface); width: 100%; max-width: 400px;
            padding: 30px 24px; border-radius: 24px; border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <!-- [1] 로그인 & 회원가입 화면 (수정: 태그 완성 및 입력필드 추가) -->
    <div id="login-screen" class="screen-overlay">
        <div class="login-container">
            <h1 class="logo">dreamer.ai</h1>
            <p class="subtitle">Welcome to dreamer.ai</p>
            <div class="input-group">
                <input type="text" id="login-id" placeholder="핸들명 또는 이메일">
                <input type="password" id="login-pw" placeholder="비밀번호">
            </div>
            <button class="primary-btn" id="btn-login">로그인</button>
            <div class="login-links">
                <span class="link" id="link-register">가입하기</span>
                <span class="link" id="link-find-pw">비밀번호 찾기</span>
            </div>
        </div>
    </div>

    <!-- [2] 전역 사이드바 -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" id="btn-close-sidebar"><i class="fas fa-times"></i></button>
        </div>
        <ul class="sidebar-menu">
            <li data-target="character"><i class="fas fa-users"></i> 캐릭터 리스트</li>
            <li data-target="chat-history"><i class="fas fa-comments"></i> 최근 대화 목록</li>
            <li data-target="persona"><i class="fas fa-id-badge"></i> 페르소나</li>
            <li data-target="api"><i class="fas fa-key"></i> API 설정</li>
            <li data-target="settings"><i class="fas fa-cog"></i> 유저 설정</li>
            <li class="logout-menu" id="btn-logout"><i class="fas fa-sign-out-alt"></i> 로그아웃</li>
        </ul>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- [3] 메인 앱 인터페이스 -->
    <div id="app-content" class="app-content hidden">
        <header class="app-header">
            <button class="menu-btn" id="btn-open-sidebar"><i class="fas fa-bars"></i></button>
            <h1 class="logo header-logo">dreamer.ai</h1>
            <div style="width: 24px;"></div>
        </header>

        <div class="notice-bar">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="notice-tag">User Manual</span>
                <button class="edit-notice-btn" id="btn-edit-notice">Edit</button>
            </div>
            <span class="notice-text" id="notice-text">dreamer.ai에 오신 것을 환영합니다!</span>
        </div>

        <nav class="main-tabs">
            <button class="tab-btn active" data-tab="character">캐릭터</button>
            <button class="tab-btn" data-tab="scene">장면</button>
            <button class="tab-btn" data-tab="persona">페르소나</button>
            <button class="tab-btn" data-tab="api">API</button>
            <button class="tab-btn" data-tab="settings">설정</button>
        </nav>

        <main class="tab-content-area">
            <div id="tab-character" class="tab-pane active">
                <button class="create-btn" onclick="alert('캐릭터 제작 창이 열립니다.')">+ 새 캐릭터 만들기</button>
                <div class="content-list" id="character-list-container">
                    <!-- 리스트 로직 연동 -->
                </div>
            </div>

            <div id="tab-scene" class="tab-pane">
                <h3 class="section-title">저장된 장면(Scene)</h3>
                <div id="scene-list-container">
                    <p class="empty-text">저장된 장면이 없습니다.</p>
                </div>
            </div>

            <div id="tab-persona" class="tab-pane">
                <button class="create-btn">+ 새 페르소나 만들기</button>
                <div id="persona-list-container"></div>
            </div>

            <div id="tab-api" class="tab-pane">
                <div class="api-container">
                    <span class="notice-tag">Infermatic API Key</span>
                    <input type="password" id="api-key-input" placeholder="sk-...">
                    <button class="link-btn" id="btn-check-api">연동 상태 확인</button>
                </div>
            </div>

            <div id="tab-settings" class="tab-pane">
                <div class="settings-profile">
                    <div class="profile-img-placeholder"><i class="fas fa-question"></i></div>
                    <button class="sub-btn">데이터 백업 코드 복사</button>
                    <button class="sub-btn danger-text" id="btn-settings-logout">로그아웃</button>
                </div>
            </div>
        </main>
    </div>

    <!-- [4] 캐릭터 상세 정보 모달 -->
    <div id="char-info-modal" class="modal">
        <div class="modal-content">
            <div style="text-align:center; margin-bottom:20px;">
                <div id="info-img" style="width:100px; height:100px; background:#333; border-radius:20px; margin:0 auto 15px; border:2px solid var(--accent-color);"></div>
                <h2 id="info-name" style="font-size:22px;">캐릭터 이름</h2>
                <p id="info-sub" style="color:var(--text-secondary); font-size:14px;">한마디 설명</p>
            </div>
            
            <div style="background:var(--bg-surface-light); padding:15px; border-radius:15px; margin-bottom:20px;">
                <p style="font-size:12px; color:var(--accent-color); font-weight:bold;">관계 설정</p>
                <p id="info-relation" style="font-size:15px; margin-top:5px;">친구</p>
                <p style="font-size:12px; color:var(--accent-color); font-weight:bold; margin-top:10px;">언어 설정</p>
                <p id="info-lang" style="font-size:15px; margin-top:5px;">English</p>
            </div>

            <div style="display:flex; gap:10px;">
                <button class="primary-btn" style="flex:2;" onclick="alert('채팅방으로 이동합니다.')">대화 시작</button>
                <button class="primary-btn" style="flex:1; background:var(--bg-surface-light); color:white;" onclick="ui.closeModal('char-info-modal')">닫기</button>
            </div>
        </div>
    </div>

    <button class="bug-report-btn" id="btn-bug-report"><i class="fas fa-bug"></i></button>

    <script>
        /* [공통 UI 제어 로직] */
        const ui = {
            toggleSidebar(show) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                if(show) {
                    sidebar.classList.add('open');
                    overlay.classList.add('show');
                } else {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('show');
                }
            },
            switchTab(tabId) {
                const tabBtns = document.querySelectorAll('.tab-btn');
                const tabPanes = document.querySelectorAll('.tab-pane');
                
                tabBtns.forEach(b => b.classList.remove('active'));
                tabPanes.forEach(p => p.classList.remove('active'));

                const targetBtn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
                const targetPane = document.getElementById('tab-' + tabId);
                
                if(targetBtn) targetBtn.classList.add('active');
                if(targetPane) targetPane.classList.add('active');
            },
            openInfoModal(charData) {
                document.getElementById('info-name').innerText = charData.name;
                document.getElementById('info-sub').innerText = charData.sub || "설명이 없습니다.";
                document.getElementById('info-relation').innerText = charData.relation;
                document.getElementById('info-lang').innerText = charData.lang || "English";
                document.getElementById('char-info-modal').style.display = 'flex';
            },
            closeModal(id) {
                document.getElementById(id).style.display = 'none';
            }
        };

        const logic = {
            init() {
                // 1. 로그인 버튼
                document.getElementById('btn-login').addEventListener('click', () => {
                    const id = document.getElementById('login-id').value;
                    const pw = document.getElementById('login-pw').value;
                    if(id && pw) {
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('app-content').classList.remove('hidden');
                        localStorage.setItem('dreamer_session', 'active');
                        this.renderCharacters();
                    } else {
                        alert("정보를 입력하세요.");
                    }
                });

                // 2. 탭 버튼 클릭 이벤트
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => ui.switchTab(btn.dataset.tab));
                });

                // 3. 사이드바 제어
                document.getElementById('btn-open-sidebar').onclick = () => ui.toggleSidebar(true);
                document.getElementById('btn-close-sidebar').onclick = () => ui.toggleSidebar(false);
                document.getElementById('sidebar-overlay').onclick = () => ui.toggleSidebar(false);

                // 4. 사이드바 메뉴 이동
                document.querySelectorAll('.sidebar-menu li[data-target]').forEach(item => {
                    item.onclick = () => {
                        const target = item.dataset.target;
                        if(target !== 'chat-history') ui.switchTab(target);
                        ui.toggleSidebar(false);
                    };
                });

                // 5. 공지사항 수정
                document.getElementById('btn-edit-notice').onclick = () => {
                    const pw = prompt("관리자 암호:");
                    if(pw === "dreamer") {
                        const txt = prompt("새 공지내용:");
                        if(txt) document.getElementById('notice-text').innerText = txt;
                    }
                };

                // 6. 로그아웃
                const logoutAction = () => {
                    localStorage.removeItem('dreamer_session');
                    location.reload();
                };
                document.getElementById('btn-logout').onclick = logoutAction;
                document.getElementById('btn-settings-logout').onclick = logoutAction;

                // 세션 체크 (자동 로그인)
                if(localStorage.getItem('dreamer_session')) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-content').classList.remove('hidden');
                    this.renderCharacters();
                }
            },
            renderCharacters() {
                const container = document.getElementById('character-list-container');
                const samples = [
                    { name: "엘리나", sub: "조용한 숲의 안내자", relation: "절친", lang: "English" },
                    { name: "레오나르도", sub: "냉철한 전략가", relation: "라이벌", lang: "Korean" }
                ];
                
                container.innerHTML = "";
                samples.forEach(char => {
                    const card = document.createElement('div');
                    card.className = "create-btn"; // 기존 스타일 재활용
                    card.style.textAlign = "left";
                    card.innerHTML = `<strong>${char.name}</strong><br><span style="font-size:12px; color:var(--text-secondary);">${char.sub}</span>`;
                    card.onclick = () => ui.openInfoModal(char);
                    container.appendChild(card);
                });
            }
        };

        window.onload = () => logic.init();
    </script>
