<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamer.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // 화면 깜빡임 방지
        if (localStorage.getItem('dreamer_logged_in') === 'true') {
            const hideStyle = document.createElement('style');
            hideStyle.innerHTML = '#login-screen { display: none !important; }';
            document.head.appendChild(hideStyle);
        }
    </script>
</head>
<body>

    <!-- [1] 로그인 화면 -->
    <div id="login-screen" class="screen-overlay">
        <div class="login-container">
            <h1 class="logo">dreamer.ai</h1>
            <p class="subtitle">로그인이 필요합니다.</p>
            <div class="input-group">
                <input type="text" id="login-id" placeholder="핸들명(아이디)">
                <input type="password" id="login-pw" placeholder="비밀번호">
            </div>
            <button class="primary-btn" id="btn-login">로그인</button>
            <div class="login-links">
                <span class="link" onclick="alert('가입 창이 열립니다.')">가입하기</span>
                <span class="link" onclick="alert('비밀번호 찾기 창이 열립니다.')">비밀번호 찾기</span>
            </div>
        </div>
    </div>
    
    <!-- [2] 사이드바 (좌측 메뉴) -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" id="btn-close-sidebar"><i class="fas fa-times"></i></button>
        </div>
        <ul class="sidebar-menu">
            <!-- [추가됨] 홈 버튼 -->
            <li id="btn-go-home"><i class="fas fa-home"></i> 홈 (메인 화면)</li>
            <li id="btn-open-talk-maker"><i class="fas fa-comments"></i> 수동 대화 백업</li>
            <li class="logout-menu" id="btn-logout"><i class="fas fa-sign-out-alt"></i> 로그아웃</li>
        </ul>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- [3] 메인 앱 인터페이스 -->
    <div id="app-content" class="app-content">
        <header class="app-header">
            <button class="menu-btn" id="btn-open-sidebar"><i class="fas fa-bars"></i></button>
            <h1 class="logo">dreamer.ai</h1>
            <div style="width: 24px;"></div>
        </header>

        <nav class="main-tabs">
            <button class="tab-btn active" data-tab="character">캐릭터</button>
            <button class="tab-btn" data-tab="scene">장면</button>
            <button class="tab-btn" data-tab="persona">페르소나</button>
            <button class="tab-btn" data-tab="settings">설정</button>
        </nav>

        <main class="tab-content-area">
            <div id="tab-character" class="tab-pane active">
                <button class="create-btn" onclick="openCharEditor()">+ 새 캐릭터 만들기</button>
                <div class="content-list" id="character-list-container"></div>
            </div>
            <div id="tab-scene" class="tab-pane">
                <h3 class="section-title">저장된 장면(Scene)</h3>
                <div class="content-list" id="scene-list-container">
                    <p class="empty-text">저장된 장면이 없습니다.</p>
                </div>
            </div>
            <div id="tab-persona" class="tab-pane">
                <button class="create-btn" onclick="openPersonaEditor()">+ 새 페르소나 만들기</button>
                <div class="content-list" id="persona-list-container"></div>
            </div>
            <div id="tab-settings" class="tab-pane">
                <div class="settings-profile">
                    <div class="form-group" style="width: 100%; text-align: left;">
                        <label>닉네임</label>
                        <input type="text" id="settings-nickname" placeholder="유저 닉네임" style="width: 100%; padding: 14px; background: var(--bg-surface-light); border: none; border-radius: 12px; color: white; margin-top: 8px;">
                    </div>
                    <div class="form-group" style="width: 100%; text-align: left;">
                        <label>핸들명 (아이디)</label>
                        <input type="text" id="settings-handle" placeholder="@handle" style="width: 100%; padding: 14px; background: var(--bg-surface-light); border: none; border-radius: 12px; color: white; margin-top: 8px;">
                    </div>
                    <button class="primary-btn" id="btn-save-profile" style="margin-bottom: 0;">프로필 저장</button>
                    <hr style="width: 100%; border-color: var(--border-color); margin: 16px 0;">
                    <button class="sub-btn">데이터 백업 코드 복사</button>
                    <button class="sub-btn danger-text" id="btn-settings-logout">로그아웃</button>
                </div>
            </div>
        </main>
    </div>

    <button class="bug-report-btn"><i class="fas fa-bug"></i></button>

<!-- ========================================================= -->
<!-- ▼ 모달창 및 풀스크린 에디터 UI ▼ -->
<!-- ========================================================= -->

<!-- 1. 캐릭터 에디터 -->
<div id="character-editor-screen" class="editor-screen hidden">
    <header class="editor-header">
        <button class="close-editor-btn" onclick="closeEditor('character')"><i class="fas fa-arrow-left"></i></button>
        <strong style="font-size: 16px;" id="char-editor-title">새 캐릭터 만들기</strong>
        <button class="save-editor-btn" onclick="saveCharacter()">저장</button>
    </header>
    <div class="editor-body">
        <div class="form-group" style="text-align: center;">
            <div id="edit-char-img-preview" onclick="document.getElementById('edit-char-img-input').click()" style="width: 100px; height: 100px; border-radius: 50%; background: var(--bg-surface-light); border: 2px dashed var(--border-color); display: inline-flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; color: var(--text-secondary); font-size: 12px; margin: 0 auto;">
                + 사진 추가
            </div>
            <input type="file" id="edit-char-img-input" accept="image/*" style="display: none;">
        </div>
        <div class="form-group"><label>이름 (필수)</label><input type="text" id="edit-char-name" maxlength="25"><div class="char-count">0 / 25</div></div>
        <div class="form-group"><label>한마디 (Slogan)</label><input type="text" id="edit-char-sub" maxlength="40"><div class="char-count">0 / 40</div></div>
        <div class="form-group"><label>인사말 (첫 메시지)</label><textarea id="edit-char-greeting" maxlength="4096" rows="4"></textarea><div class="char-count">0 / 4096</div></div>
        <div class="form-group"><label>기본 프로필 & 성격</label><textarea id="edit-char-profile" rows="4"></textarea></div>
        <div class="form-group"><label>외관 (Appearance)</label><textarea id="edit-char-appearance" rows="3"></textarea></div>
    </div>
</div>

<!-- 2. 페르소나 에디터 -->
<div id="persona-editor-screen" class="editor-screen hidden">
    <header class="editor-header">
        <button class="close-editor-btn" onclick="closeEditor('persona')"><i class="fas fa-arrow-left"></i></button>
        <strong style="font-size: 16px;" id="persona-editor-title">새 페르소나 만들기</strong>
        <button class="save-editor-btn" onclick="savePersona()">저장</button>
    </header>
    <div class="editor-body">
        <div class="form-group" style="text-align: center;">
            <div id="edit-persona-img-preview" onclick="document.getElementById('edit-persona-img-input').click()" style="width: 100px; height: 100px; border-radius: 50%; background: var(--bg-surface-light); border: 2px dashed var(--border-color); display: inline-flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; color: var(--text-secondary); font-size: 12px; margin: 0 auto;">
                + 사진 추가
            </div>
            <input type="file" id="edit-persona-img-input" accept="image/*" style="display: none;">
        </div>
        <div class="form-group"><label>페르소나 이름 (필수)</label><input type="text" id="edit-persona-name" maxlength="25"><div class="char-count">0 / 25</div></div>
        <div class="form-group"><label>나의 외관 특징</label><textarea id="edit-persona-appearance" rows="3"></textarea></div>
        <div class="form-group"><label>배경 및 성향</label><textarea id="edit-persona-bg" rows="4"></textarea></div>
        <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-top: 10px;">
            <input type="checkbox" id="edit-persona-default" style="width: auto; margin: 0;">
            <label for="edit-persona-default" style="margin: 0; cursor: pointer; font-size: 14px;">기본 페르소나로 설정</label>
        </div>
     </div>
</div>

<!-- 3. 상세 정보 화면 -->
<div id="character-detail-screen" class="editor-screen hidden" style="z-index: 6000;">
    <header class="editor-header">
        <button class="close-editor-btn" onclick="document.getElementById('character-detail-screen').classList.add('hidden')"><i class="fas fa-arrow-left"></i></button>
        <strong style="font-size: 16px;">캐릭터 프로필</strong>
        <div style="width: 24px;"></div>
    </header>
    <div class="editor-body" style="padding-top: 32px;">
        <img id="detail-img" src="" class="detail-img-large">
        <div id="detail-name" class="detail-name-text">이름</div>
        <div id="detail-sub" class="detail-sub-text">짧은 설명</div>

        <div style="padding: 0 16px; margin-top: 24px;">
            <button class="action-btn-filled" onclick="OpenChat()"><i class="fas fa-plus"></i> 새 채팅 시작하기</button>
            <button class="action-btn-outline" onclick="alert('기존 대화방으로 연결 예정입니다.')"><i class="fas fa-comments"></i> 기존 채팅 이어보기</button>
            <button class="action-btn-outline" id="btn-detail-edit" style="color: var(--accent-color); border-color: rgba(216, 180, 254, 0.5);"><i class="fas fa-edit"></i> 이 캐릭터 수정하기</button>
        </div>
    </div>
</div>

<!-- 4. 톡썰메이커 -->
<div id="talk-maker-screen" class="editor-screen hidden">
    <header class="editor-header">
        <button class="close-editor-btn" onclick="document.getElementById('talk-maker-screen').classList.add('hidden')"><i class="fas fa-times"></i></button>
        <strong style="font-size: 16px;">수동 대화 백업</strong>
        <div style="width: 24px;"></div>
    </header>
    <div class="editor-body" style="display: flex; flex-direction: column; height: 100%; padding: 0;">
        <div id="talk-maker-chat" style="flex: 1; overflow-y: auto; padding: 16px; background: var(--bg-main);">
            <div style="text-align: center; color: var(--text-secondary); font-size: 12px; margin-bottom: 20px;">수동으로 대화를 작성해보세요.</div>
        </div>
        <div style="padding: 16px; background: var(--bg-surface); border-top: 1px solid var(--border-color); padding-bottom: calc(16px + env(safe-area-inset-bottom));">
            <textarea id="tm-msg-input" rows="2" placeholder="메시지를 입력하세요..." style="width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--bg-surface-light); color: white; margin-bottom: 8px; resize: none; outline: none;"></textarea>
            <div style="display: flex; gap: 8px;">
                <button onclick="addTalkMakerMsg('char')" style="flex: 1; padding: 14px; border-radius: 8px; border: none; background: #333; color: white; font-weight: bold; cursor: pointer;">캐릭터 전송</button>
                <button onclick="addTalkMakerMsg('user')" style="flex: 1; padding: 14px; border-radius: 8px; border: none; background: var(--accent-color); color: black; font-weight: bold; cursor: pointer;">내 전송</button>
            </div>
        </div>
    </div>
</div>

<!-- ========================================================= -->
<!-- [추가됨] 5. 진짜 채팅방 화면 (c.ai 스타일 + 분기점 + 우측 사이드바) -->
<!-- ========================================================= -->
<div id="real-chat-screen" class="editor-screen" style="display: none; flex-direction: column; background-color: #121212; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;">
    
    <header class="editor-header" style="border-bottom: 1px solid #222; background: #181818; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; height: 65px;">
        <div style="display: flex; align-items: center; gap: 14px;">
            <!-- 좌측 사이드바 여는 버튼 -->
            <button onclick="toggleSidebar()" style="background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 0;"><i class="fas fa-bars"></i></button>
            <img id="chat-header-img" src="" style="width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #444;">
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <strong id="chat-header-name" style="color: #fff; font-size: 16px; margin-bottom: 2px;">이름</strong>
                <small id="chat-header-handle" style="color: #999; font-size: 12px;">By @user</small>
            </div>
        </div>
        <div style="display: flex; gap: 8px;">
            <button style="width: 36px; height: 36px; border-radius: 50%; background: transparent; border: 1px solid #444; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer;"><i class="fas fa-volume-mute"></i></button>
            <!-- 우측 사이드바 여는 점점점 버튼 -->
            <button onclick="toggleRightSidebar()" style="width: 36px; height: 36px; border-radius: 50%; background: transparent; border: 1px solid #444; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer;"><i class="fas fa-ellipsis-h"></i></button>
        </div>
    </header>

    <div id="chat-log" style="flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 24px; background: #121212;">
        <!-- 메시지가 여기에 추가됩니다 -->
    </div>

    <footer style="padding: 15px 15px 40px 15px; background: #121212; border-top: 1px solid #222; position: relative; z-index: 10000;">
        <div style="display: flex; align-items: flex-end; background: #252525; border-radius: 20px; padding: 10px 16px; border: 1px solid #444;">
            <textarea id="chat-input" placeholder="메시지 입력 (마크다운 사용 가능)..." rows="1" style="flex: 1; max-height: 120px; background: none; border: none; color: white; outline: none; resize: none; font-size: 15px; line-height: 1.4;"></textarea>
            <button onclick="sendChatMessage()" style="background: none; border: none; color: #d8b4fe; font-weight: bold; font-size: 18px; cursor: pointer; margin-left: 12px; padding-bottom: 2px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </footer>
</div>

<!-- 우측 사이드바 (채팅 설정 및 페르소나 변경) -->
<div id="sidebar-right" style="position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: #151515; z-index: 10001; transition: right 0.3s; display: flex; flex-direction: column; border-left: 1px solid #222;">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #222;">
        <h2 style="font-size: 18px; color: white;">채팅 설정</h2>
        <button onclick="toggleRightSidebar()" style="background: none; border: none; color: #999; font-size: 20px; cursor: pointer;"><i class="fas fa-times"></i></button>
    </div>
    <div style="padding: 20px; text-align: center; border-bottom: 1px solid #222;">
        <img id="right-sidebar-img" src="" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #333; margin-bottom: 12px;">
        <strong id="right-sidebar-name" style="font-size: 18px; color: white; display: block;">캐릭터 이름</strong>
        <button onclick="alert('캐릭터 설정 수정 기능으로 연결됩니다.')" style="margin-top: 12px; width: 100%; padding: 10px; background: #252525; border: 1px solid #444; color: #d8b4fe; border-radius: 8px; cursor: pointer;"><i class="fas fa-edit"></i> 캐릭터 설정 수정</button>
    </div>
    <div style="padding: 20px;">
        <h3 style="font-size: 14px; color: #999; margin-bottom: 12px;">현재 내 페르소나</h3>
        <div id="current-persona-display" style="background: #181818; padding: 16px; border-radius: 12px; border: 1px solid #333; color: white; margin-bottom: 12px;">기본 페르소나</div>
        <button onclick="alert('페르소나 변경 창이 열립니다.')" style="width: 100%; padding: 10px; background: #d8b4fe; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">페르소나 교체/수정</button>
    </div>
</div>

<!-- 하단 액션 시트 (메시지 클릭 시 뜨는 옵션) -->
<div id="action-sheet-overlay" onclick="closeActionSheet()" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10002; opacity: 0; visibility: hidden; transition: 0.2s;"></div>
<div id="action-sheet" style="position: fixed; bottom: -300px; left: 0; width: 100%; background: #181818; border-radius: 20px 20px 0 0; z-index: 10003; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); transition: bottom 0.3s cubic-bezier(0.1, 0.8, 0.2, 1); display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #333;">
    <button onclick="doEditMessage()" style="background: #252525; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; font-size: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px;"><i class="fas fa-pencil-alt" style="color: #d8b4fe; width: 20px;"></i> 메시지 수정</button>
    <button onclick="doCopyMessage()" style="background: #252525; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; font-size: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px;"><i class="fas fa-copy" style="color: #d8b4fe; width: 20px;"></i> 메시지 복사</button>
    <button onclick="doRewindMessage()" style="background: #252525; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; font-size: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px;"><i class="fas fa-history" style="color: #ff6b6b; width: 20px;"></i> 여기로 되돌리기 (기억 및 아래 대화 일괄 삭제)</button>
    <button onclick="doBranchMessage()" style="background: #252525; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; font-size: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px;"><i class="fas fa-code-branch" style="color: #4dabf7; width: 20px;"></i> 분기점 만들기 (새 채팅방으로 분리)</button>
</div>

<!-- ========================================================= -->
<!-- ▼ CSS 디자인 영역 ▼ -->
<!-- ========================================================= -->
<style>
    :root {
        --bg-main: #0a0a0a; --bg-surface: #151515; --bg-surface-light: #202020;
        --accent-color: #d8b4fe; --text-primary: #ffffff; --text-secondary: #9ca3af;
        --border-color: #262626; --danger-color: #ff6b6b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg-main); color: var(--text-primary); overflow-y: auto !important; overflow-x: hidden !important; }
    .app-content { min-height: 100vh; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

    .app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background-color: var(--bg-main); }
    .logo { color: var(--accent-color); font-size: 22px; font-weight: 800; }
    .menu-btn { background: none; border: none; color: var(--text-primary); font-size: 20px; cursor: pointer; }

    .notice-bar { margin: 0 16px 16px 16px; padding: 16px; background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 16px; }
    .notice-tag { display: block; color: var(--text-secondary); font-weight: 700; font-size: 14px; margin-bottom: 8px; }
    .notice-text { color: var(--text-primary); font-size: 14px; }

    .main-tabs { display: flex; border-bottom: 1px solid var(--border-color); padding: 0 16px; }
    .tab-btn { background: none; border: none; color: var(--text-secondary); padding: 12px 0; font-size: 14px; font-weight: 600; cursor: pointer; flex-grow: 1; position: relative; }
    .tab-btn.active { color: var(--text-primary); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 15%; width: 70%; height: 3px; background-color: var(--accent-color); border-radius: 3px 3px 0 0; }

    .tab-content-area { padding: 24px 16px; padding-bottom: 100px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .create-btn { width: 100%; background: var(--bg-surface); color: var(--accent-color); border: 1px solid var(--border-color); padding: 16px; border-radius: 16px; font-weight: 600; cursor: pointer; margin-bottom: 16px; }
    .empty-text { color: var(--text-secondary); font-size: 14px; text-align: center; margin-top: 20px; }

    .swipe-container { position: relative; width: 100%; overflow: hidden; border-radius: 16px; margin-bottom: 12px; background: var(--bg-surface); }
    .delete-btn-bg { position: absolute; top: 0; right: 0; bottom: 0; width: 80px; background-color: var(--danger-color); color: white; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; z-index: 1; }
    .list-card { display: flex; align-items: center; gap: 14px; background: var(--bg-surface); padding: 14px 16px; border-radius: 16px; position: relative; cursor: pointer; z-index: 2; width: 100%; transition: transform 0.3s ease; }
    
    .char-img { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; flex-shrink: 0; background: var(--bg-surface-light); }
    .persona-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--bg-surface-light); }
    
    .list-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
    .list-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px; }
    .list-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .edit-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--text-secondary); font-size: 16px; cursor: pointer; padding: 4px; }

    .editor-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 7000; display: flex; flex-direction: column; transition: 0.3s; }
    .editor-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .editor-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--bg-main); border-bottom: 1px solid var(--border-color); padding-top: calc(16px + env(safe-area-inset-top)); }
    .close-editor-btn, .save-editor-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    .save-editor-btn { color: var(--accent-color); font-weight: bold; font-size: 16px; }
    .editor-body { flex: 1; overflow-y: auto; padding: 24px 20px; padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
    
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; color: var(--accent-color); font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; color: white; font-size: 15px; outline: none; }
    .char-count { font-size: 11px; color: var(--text-secondary); text-align: right; margin-top: 4px; }

    .detail-img-large { width: 100px; height: 100px; border-radius: 20px; object-fit: cover; margin: 0 auto 16px auto; display: block; border: 1px solid var(--border-color); }
    .detail-name-text { font-size: 22px; font-weight: 800; color: white; text-align: center; margin-bottom: 8px; }
    .detail-sub-text { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 32px; padding: 0 20px; line-height: 1.5; }
    .action-btn-outline, .action-btn-filled { width: 100%; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
    .action-btn-outline { background: transparent; border: 1px solid var(--border-color); color: white; }
    .action-btn-filled { background: var(--text-primary); color: black; border: none; }

    .screen-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 20px; transition: 0.3s; }
    .screen-overlay.hidden { opacity: 0; visibility: hidden; }
    .login-container { width: 100%; max-width: 400px; background: var(--bg-surface); padding: 40px 24px; border-radius: 20px; border: 1px solid var(--border-color); text-align: center; }
    .login-container .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
    .input-group input { width: 100%; padding: 16px; margin-bottom: 16px; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 12px; color: white; }
    .primary-btn { width: 100%; padding: 16px; background: var(--text-primary); color: black; border: none; border-radius: 30px; font-weight: 700; font-size: 16px; cursor: pointer; margin-bottom: 24px; }
    .login-links { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); }

    .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--bg-surface); z-index: 10001; transition: left 0.3s; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
    .sidebar.open { left: 0; }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border-color); }
    .sidebar-menu { list-style: none; padding: 10px 0; }
    .sidebar-menu li { padding: 16px 20px; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #1a1a1a; }
    .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; opacity: 0; visibility: hidden; transition: 0.3s; }
    .sidebar-overlay.show { opacity: 1; visibility: visible; }
    .bug-report-btn { position: fixed; bottom: 30px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--bg-surface); color: var(--accent-color); border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; }

    /* c.ai 스타일 메시지 블록 & 마크다운 CSS */
    .md-action { color: #8a8a8e; font-style: italic; }
    .md-bold { font-weight: bold; color: #fff; }
    .msg-block { display: flex; flex-direction: column; width: 100%; cursor: pointer; padding: 8px; border-radius: 12px; transition: background 0.2s; }
    .msg-block:active { background: #1a1a1a; }
    .msg-header { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .msg-content { font-size: 15px; line-height: 1.6; color: #e0e0e0; word-break: break-word; }
</style>

<!-- ========================================================= -->
<!-- ▼ 자바스크립트 영역 (기본 시스템 & 챗봇 핵심 로직) ▼ -->
<!-- ========================================================= -->
<script>
    window.editingCharId = null;
    window.editingPersonaId = null;
    window.tempCharBase64 = null;
    window.tempPersonaBase64 = null;
    const defaultImg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="%23666"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';

    // 로그인 제어
    document.getElementById('btn-login').addEventListener('click', function() {
        if(document.getElementById('login-id').value === '') return alert('아이디를 입력해주세요.');
        localStorage.setItem('dreamer_logged_in', 'true');
        document.getElementById('login-screen').classList.add('hidden');
    });

    // 좌측 햄버거 사이드바
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    window.toggleSidebar = function() { 
        sidebar.classList.toggle('open'); 
        sidebarOverlay.classList.toggle('show'); 
    };
    document.getElementById('btn-open-sidebar').onclick = toggleSidebar;
    document.getElementById('btn-close-sidebar').onclick = toggleSidebar;
    sidebarOverlay.onclick = function() {
        sidebar.classList.remove('open');
        document.getElementById('sidebar-right').style.right = '-300px';
        sidebarOverlay.classList.remove('show');
    };

    // 홈 버튼: 누르면 모든 화면이 닫히고 메인으로 옴
    document.getElementById('btn-go-home').onclick = () => {
        document.getElementById('real-chat-screen').style.display = 'none';
        document.getElementById('character-detail-screen').classList.add('hidden');
        document.getElementById('talk-maker-screen').classList.add('hidden');
        toggleSidebar();
    };

    function executeLogout() {
        localStorage.removeItem('dreamer_logged_in');
        document.getElementById('login-screen').classList.remove('hidden');
        if(sidebar.classList.contains('open')) toggleSidebar();
    }
    document.getElementById('btn-logout').onclick = executeLogout;
    document.getElementById('btn-settings-logout').onclick = executeLogout;

    // 탭 이동 로직
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('tab-' + this.getAttribute('data-tab')).classList.add('active');
        });
    });

    // 글자 수 카운팅
    document.querySelectorAll('.editor-screen input[maxlength], .editor-screen textarea[maxlength]').forEach(el => {
        el.addEventListener('input', function() {
            const countDiv = this.parentElement.querySelector('.char-count');
            if(countDiv) countDiv.innerText = `${this.value.length} / ${this.getAttribute('maxlength')}`;
        });
    });

    // 톡썰메이커 
    document.getElementById('btn-open-talk-maker').onclick = () => {
        document.getElementById('talk-maker-screen').classList.remove('hidden');
        toggleSidebar(); 
    };
    window.addTalkMakerMsg = function(type) {
        const chatBox = document.getElementById('talk-maker-chat');
        const text = document.getElementById('tm-msg-input').value.trim();
        if(!text) return;
        const name = type === 'char' ? '캐릭터' : '나';
        const bubble = document.createElement('div');
        bubble.style.marginBottom = '16px'; bubble.style.display = 'flex'; bubble.style.flexDirection = 'column';
        if(type === 'char') {
            bubble.style.alignItems = 'flex-start';
            bubble.innerHTML = `<span style="font-size: 13px; font-weight: bold; color: white; margin-bottom: 6px;">${name}</span>
                                <div style="background: var(--bg-surface-light); color: white; padding: 12px 16px; border-radius: 18px 18px 18px 4px; max-width: 85%; font-size: 15px;">${text}</div>`;
        } else {
            bubble.style.alignItems = 'flex-end';
            bubble.innerHTML = `<span style="font-size: 13px; font-weight: bold; color: white; margin-bottom: 6px;">${name}</span>
                                <div style="background: var(--accent-color); color: black; padding: 12px 16px; border-radius: 18px 18px 4px 18px; max-width: 85%; font-size: 15px;">${text}</div>`;
        }
        chatBox.appendChild(bubble);
        document.getElementById('tm-msg-input').value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    // 사진 자동 압축
    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height, max = 400;
                if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                callback(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    document.getElementById('edit-char-img-input').onchange = e => { if(e.target.files[0]) compressImage(e.target.files[0], b64 => { window.tempCharBase64 = b64; document.getElementById('edit-char-img-preview').innerHTML = `<img src="${b64}" style="width:100%;height:100%;object-fit:cover;">`; }); };
    document.getElementById('edit-persona-img-input').onchange = e => { if(e.target.files[0]) compressImage(e.target.files[0], b64 => { window.tempPersonaBase64 = b64; document.getElementById('edit-persona-img-preview').innerHTML = `<img src="${b64}" style="width:100%;height:100%;object-fit:cover;">`; }); };

    // 에디터 열기 및 닫기
    window.openCharEditor = function(id = null, data = null) {
        window.editingCharId = id; window.tempCharBase64 = null;
        document.getElementById('char-editor-title').innerText = id ? "캐릭터 수정하기" : "새 캐릭터 만들기";
        document.getElementById('edit-char-name').value = data ? (data.name || '') : '';
        document.getElementById('edit-char-sub').value = data ? (data.sub || '') : '';
        document.getElementById('edit-char-greeting').value = data ? (data.greeting || '') : '';
        document.getElementById('edit-char-profile').value = data ? (data.profile || '') : '';
        document.getElementById('edit-char-appearance').value = data ? (data.appearance || '') : '';
        document.getElementById('edit-char-img-preview').innerHTML = (data && data.photoUrl) ? `<img src="${data.photoUrl}" style="width:100%;height:100%;object-fit:cover;">` : '+ 사진 추가';
        document.getElementById('character-editor-screen').classList.remove('hidden');
    };

    window.openPersonaEditor = function(id = null, data = null) {
        window.editingPersonaId = id; window.tempPersonaBase64 = null;
        document.getElementById('persona-editor-title').innerText = id ? "페르소나 수정하기" : "새 페르소나 만들기";
        document.getElementById('edit-persona-name').value = data ? (data.name || '') : '';
        document.getElementById('edit-persona-appearance').value = data ? (data.appearance || '') : '';
        document.getElementById('edit-persona-bg').value = data ? (data.bg || '') : '';
        document.getElementById('edit-persona-img-preview').innerHTML = (data && data.photoUrl) ? `<img src="${data.photoUrl}" style="width:100%;height:100%;object-fit:cover;">` : '+ 사진 추가';
        document.getElementById('persona-editor-screen').classList.remove('hidden');
    };
    window.closeEditor = function(type) { document.getElementById(`${type}-editor-screen`).classList.add('hidden'); };

    // 상세 프로필 창 띄우기
    window.openCharacterDetail = function(id, data) {
        document.getElementById('detail-img').src = data.photoUrl || defaultImg;
        document.getElementById('detail-name').innerText = data.name;
        document.getElementById('detail-sub').innerText = data.sub || data.greeting || '설명이 없습니다.';
        document.getElementById('btn-detail-edit').onclick = () => { document.getElementById('character-detail-screen').classList.add('hidden'); openCharEditor(id, data); };
        document.getElementById('character-detail-screen').classList.remove('hidden');
    };

    // 저장 및 삭제, 그리기 로직 (완벽 보존)
    window.executeDelete = function(id, name, type) {
        if(!confirm(`'${name}'을(를) 삭제하시겠습니까?`)) { renderData(); return; }
        let storageKey = type === 'characters' ? 'dreamer_characters' : 'dreamer_personas';
        let saved = JSON.parse(localStorage.getItem(storageKey) || '[]');
        localStorage.setItem(storageKey, JSON.stringify(saved.filter(item => item.id.toString() !== id.toString())));
        renderData();
        if(typeof window.bgSyncDelete === 'function') window.bgSyncDelete(type, id);
    };

    window.attachSwipeEvents = function(cardElement) {
        let startX = 0, currentX = 0;
        cardElement.addEventListener('touchstart', e => { startX = e.touches[0].clientX; cardElement.style.transition = 'none'; }, {passive: true});
        cardElement.addEventListener('touchmove', e => { currentX = e.touches[0].clientX - startX; if(currentX < 0 && currentX > -100) cardElement.style.transform = `translateX(${currentX}px)`; }, {passive: true});
        cardElement.addEventListener('touchend', () => { cardElement.style.transition = 'transform 0.3s'; cardElement.style.transform = currentX < -50 ? 'translateX(-80px)' : 'translateX(0px)'; currentX = 0; });
    };

    window.saveCharacter = function() {
        const nameInput = document.getElementById('edit-char-name').value.trim();
        if(!nameInput) return alert("캐릭터 이름은 필수 입력 사항입니다.");
        let savedChars = JSON.parse(localStorage.getItem('dreamer_characters') || '[]');
        let charData = {
            id: window.editingCharId || Date.now().toString(), name: nameInput,
            sub: document.getElementById('edit-char-sub').value.trim(), greeting: document.getElementById('edit-char-greeting').value.trim(),
            profile: document.getElementById('edit-char-profile').value.trim(), appearance: document.getElementById('edit-char-appearance').value.trim()
        };
        if(window.tempCharBase64) charData.photoUrl = window.tempCharBase64;
        if(window.editingCharId) {
            let index = savedChars.findIndex(c => c.id.toString() === window.editingCharId.toString());
            if(index !== -1) { if(!window.tempCharBase64 && savedChars[index].photoUrl) charData.photoUrl = savedChars[index].photoUrl; savedChars[index] = charData; }
        } else { savedChars.unshift(charData); }
        localStorage.setItem('dreamer_characters', JSON.stringify(savedChars));
        closeEditor('character'); renderData();
        if(typeof window.bgSyncSave === 'function') window.bgSyncSave('characters', charData);
    };

    window.savePersona = function() {
        const nameInput = document.getElementById('edit-persona-name').value.trim();
        if(!nameInput) return alert("페르소나 이름은 필수 입력 사항입니다.");
        let savedPersonas = JSON.parse(localStorage.getItem('dreamer_personas') || '[]');
        let personaData = {
            id: window.editingPersonaId || Date.now().toString(), name: nameInput,
            appearance: document.getElementById('edit-persona-appearance').value.trim(), bg: document.getElementById('edit-persona-bg').value.trim()
        };
        if(window.tempPersonaBase64) personaData.photoUrl = window.tempPersonaBase64;
        if(window.editingPersonaId) {
            let index = savedPersonas.findIndex(p => p.id.toString() === window.editingPersonaId.toString());
            if(index !== -1) { if(!window.tempPersonaBase64 && savedPersonas[index].photoUrl) personaData.photoUrl = savedPersonas[index].photoUrl; savedPersonas[index] = personaData; }
        } else { savedPersonas.unshift(personaData); }
        localStorage.setItem('dreamer_personas', JSON.stringify(savedPersonas));
        closeEditor('persona'); renderData();
        if(typeof window.bgSyncSave === 'function') window.bgSyncSave('personas', personaData);
    };

    window.renderData = function() {
        const cBox = document.getElementById('character-list-container');
        const pBox = document.getElementById('persona-list-container');
        const cList = JSON.parse(localStorage.getItem('dreamer_characters') || '[]');
        cBox.innerHTML = cList.length === 0 ? '<p class="empty-text">저장된 캐릭터가 없습니다.</p>' : '';
        cList.forEach(c => {
            const w = document.createElement('div'); w.className = 'swipe-container';
            w.innerHTML = `
                <div class="delete-btn-bg" onclick="executeDelete('${c.id}', '${c.name}', 'characters')"><i class="fas fa-trash"></i></div>
                <div class="list-card swipe-card">
                    <img src="${c.photoUrl || defaultImg}" class="char-img">
                    <div class="list-info"><span class="list-title">${c.name}</span><span class="list-sub">${c.sub || c.greeting || "설명이 없습니다."}</span></div>
                    <button class="edit-btn"><i class="fas fa-edit"></i></button>
                </div>`;
            const card = w.querySelector('.swipe-card'); attachSwipeEvents(card);
            card.onclick = () => openCharacterDetail(c.id, c);
            w.querySelector('.edit-btn').onclick = (e) => { e.stopPropagation(); openCharEditor(c.id, c); };
            cBox.appendChild(w);
        });

        const pList = JSON.parse(localStorage.getItem('dreamer_personas') || '[]');
        pBox.innerHTML = pList.length === 0 ? '<p class="empty-text">저장된 페르소나가 없습니다.</p>' : '';
        pList.forEach(p => {
            const w = document.createElement('div'); w.className = 'swipe-container';
            w.innerHTML = `
                <div class="delete-btn-bg" onclick="executeDelete('${p.id}', '${p.name}', 'personas')"><i class="fas fa-trash"></i></div>
                <div class="list-card swipe-card">
                    <img src="${p.photoUrl || defaultImg}" class="persona-img">
                    <div class="list-info"><span class="list-title">${p.name}</span><span class="list-sub">${p.appearance || p.bg || "기본 페르소나"}</span></div>
                    <button class="edit-btn"><i class="fas fa-edit"></i></button>
                </div>`;
            const card = w.querySelector('.swipe-card'); attachSwipeEvents(card);
            w.querySelector('.edit-btn').onclick = (e) => { e.stopPropagation(); openPersonaEditor(p.id, p); };
            pBox.appendChild(w);
        });
    };
    window.addEventListener('DOMContentLoaded', renderData);

    // =========================================================
    // ▼ 여기서부터 [새로운 채팅 로직 (마크다운 & 액션 메뉴)] ▼
    // =========================================================
    let currentChatHistory = [];
    let selectedMsgIndex = null;

    // 마크다운 변환 함수
    function parseMarkdown(text) {
        if (!text) return "";
        return text
            .replace(/\*\*\*(.*?)\*\*\*/g, '<span class="md-bold md-action">$1</span>') // 굵은 이텔릭
            .replace(/\*\*(.*?)\*\*/g, '<span class="md-bold">$1</span>')             // 볼드
            .replace(/\*(.*?)\*/g, '<span class="md-action">$1</span>')              // 행동 (이텔릭)
            .replace(/\n/g, '<br>');
    }

    // 채팅 로그 그리기
    function renderChatLog() {
        const logBox = document.getElementById('chat-log');
        logBox.innerHTML = '';
        currentChatHistory.forEach((msg, index) => {
            const block = document.createElement('div');
            block.className = 'msg-block';
            block.onclick = () => openActionSheet(index); // 누르면 옵션 메뉴 뜸
            
            const senderName = msg.role === 'char' ? msg.name : (document.getElementById('login-id')?.value.split('@')[0] || "유저");
            block.innerHTML = `
                <div class="msg-header">${senderName}</div>
                <div class="msg-content">${parseMarkdown(msg.content)}</div>
            `;
            logBox.appendChild(block);
        });
        logBox.scrollTop = logBox.scrollHeight;
    }

    // 유저가 채팅 보내기
    window.sendChatMessage = function() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        currentChatHistory.push({ role: 'user', content: text });
        input.value = '';
        renderChatLog();

        // 봇 대답 시뮬레이션 (추후 AI 연동)
        setTimeout(() => {
            const botName = document.getElementById('chat-header-name').innerText;
            currentChatHistory.push({ role: 'char', name: botName, content: `*${botName}이(가) 고개를 끄덕입니다.*\n"계속해."` });
            renderChatLog();
        }, 800);
    }
    
    // 엔터로 전송
    document.getElementById('chat-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
    });

    // 채팅방 열기 함수 (상세 페이지에서 클릭 시)
    window.OpenChat = function() {
        const chatScreen = document.getElementById('real-chat-screen');
        if (!chatScreen) return;
        chatScreen.style.display = 'flex';

        const nameVal = document.getElementById('detail-name')?.innerText || "캐릭터";
        const imgVal = document.getElementById('detail-img')?.src || "";
        const greetingVal = document.getElementById('detail-sub')?.innerText || "*미소지으며* 반가워요.";

        // 상단 헤더, 우측 사이드바 데이터 동기화
        document.getElementById('chat-header-name').innerText = nameVal;
        document.getElementById('chat-header-img').src = imgVal;
        document.getElementById('right-sidebar-name').innerText = nameVal;
        document.getElementById('right-sidebar-img').src = imgVal;
        
        let handle = document.getElementById('login-id')?.value.split('@')[0] || "user";
        document.getElementById('chat-header-handle').innerText = `By @${handle}`;

        // 기록 초기화 후 첫마디 넣기
        currentChatHistory = [{ role: 'char', name: nameVal, content: greetingVal }];
        renderChatLog();
    }

    // 우측 사이드바 제어
    window.toggleRightSidebar = function() {
        const sidebar = document.getElementById('sidebar-right');
        const overlay = document.getElementById('sidebar-overlay');
        if(sidebar.style.right === '0px') {
            sidebar.style.right = '-300px';
            overlay.classList.remove('show');
        } else {
            sidebar.style.right = '0px';
            overlay.classList.add('show');
        }
    }

    // 액션 시트 제어 (메시지 옵션)
    window.openActionSheet = function(index) {
        selectedMsgIndex = index;
        document.getElementById('action-sheet').style.bottom = '0px';
        document.getElementById('action-sheet-overlay').style.opacity = '1';
        document.getElementById('action-sheet-overlay').style.visibility = 'visible';
    }
    window.closeActionSheet = function() {
        document.getElementById('action-sheet').style.bottom = '-300px';
        document.getElementById('action-sheet-overlay').style.opacity = '0';
        document.getElementById('action-sheet-overlay').style.visibility = 'hidden';
        selectedMsgIndex = null;
    }

    // 기능 버튼들
    window.doEditMessage = function() {
        const newText = prompt("메시지를 수정하세요:", currentChatHistory[selectedMsgIndex].content);
        if (newText !== null && newText.trim() !== '') {
            currentChatHistory[selectedMsgIndex].content = newText;
            renderChatLog();
        }
        closeActionSheet();
    }
    window.doCopyMessage = function() {
        navigator.clipboard.writeText(currentChatHistory[selectedMsgIndex].content).then(() => {
            alert('메시지가 복사되었습니다.'); closeActionSheet();
        });
    }
    window.doRewindMessage = function() {
        if (confirm("이 메시지를 포함하여 아래의 대화가 모두 삭제됩니다. 계속할까요?")) {
            currentChatHistory = currentChatHistory.slice(0, selectedMsgIndex + 1);
            renderChatLog(); closeActionSheet();
        }
    }
    window.doBranchMessage = function() {
        alert("현재 대화를 바탕으로 새 채팅방(분기점)이 생성되었습니다!");
        currentChatHistory = currentChatHistory.slice(0, selectedMsgIndex + 1);
        renderChatLog(); closeActionSheet();
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({
        apiKey: "AIzaSyCdHtTtuyoZpTMLdObLRUkO5RS_C9BOglI",
        authDomain: "dreamer-ai-a837c.firebaseapp.com",
        projectId: "dreamer-ai-a837c",
        storageBucket: "dreamer-ai-a837c.firebasestorage.app"
    });
    
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUserUid = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUserUid = user.uid;
            try {
                const cSnap = await getDocs(collection(db, `users/${user.uid}/characters`));
                let cList = []; cSnap.forEach(d => { cList.push({ id: d.id, ...d.data() }) });
                if(cList.length > 0) { localStorage.setItem('dreamer_characters', JSON.stringify(cList)); window.renderData(); }

                const pSnap = await getDocs(collection(db, `users/${user.uid}/personas`));
                let pList = []; pSnap.forEach(d => { pList.push({ id: d.id, ...d.data() }) });
                if(pList.length > 0) { localStorage.setItem('dreamer_personas', JSON.stringify(pList)); window.renderData(); }
            } catch(e) { console.warn("서버 동기화 지연됨"); }
        }
    });

    document.getElementById('btn-login').addEventListener('click', () => {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value.trim();
        const validEmail = id.includes('@') ? id : `${id}@dreamer.ai`;
        if(id && pw) signInWithEmailAndPassword(auth, validEmail, pw).catch(()=>{}); 
    });

    window.bgSyncSave = async function(type, data) {
        if(!currentUserUid) return;
        try { await setDoc(doc(db, `users/${currentUserUid}/${type}`, data.id.toString()), data); } catch(e) {}
    };

    window.bgSyncDelete = async function(type, id) {
        if(!currentUserUid) return;
        try { await deleteDoc(doc(db, `users/${currentUserUid}/${type}`, id.toString())); } catch(e) {}
    };
</script>
